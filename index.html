    <script>
        // Auto-refresh when a new version is deployed
        fetch('version.json?t=' + Date.now()).then(r => r.json()).then(d => {
            var key = '_app_version', prev = localStorage.getItem(key);
            localStorage.setItem(key, d.version);
            if (prev && prev !== d.version) location.reload();
        }).catch(function(){});
    </script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
    <script>
        // Apply saved colormap accent colors BEFORE stylesheet loads to prevent flash
        (function() {
            var accents = {
                solar:   { color: '#ff6b35', rgb: '255, 107, 53', bg: 'linear-gradient(135deg, #1a0f0a, #100805)', pageBg: '#3a2b2b' },
                turbo:   { color: '#23a6d5', rgb: '35, 166, 213', bg: 'linear-gradient(135deg, #1a2830, #0f1a20)', pageBg: '#2b303a' },
                viridis: { color: '#21918c', rgb: '33, 145, 140', bg: 'linear-gradient(135deg, #1e2830, #121c22)', pageBg: '#2b3535' },
                jet:     { color: '#5dadec', rgb: '93, 173, 236', bg: 'linear-gradient(135deg, #1e2438, #121820)', pageBg: '#2b2b3a' },
                aurora:  { color: '#9b4dca', rgb: '155, 77, 202', bg: 'linear-gradient(135deg, #2a2540, #1a1428)', pageBg: '#332b3a' },
                plasma:  { color: '#22d3ee', rgb: '34, 211, 238', bg: 'linear-gradient(135deg, #1c2530, #101820)', pageBg: '#2b333a' },
                inferno: { color: '#808080', rgb: '128, 128, 128', bg: 'linear-gradient(135deg, #252a40, #161a28)', pageBg: '#2b2b3a' }
            };
            var saved = localStorage.getItem('colormap');
            var a = accents[saved] || accents.inferno;
            var r = document.documentElement;
            r.style.setProperty('--accent-color', a.color);
            r.style.setProperty('--accent-rgb', a.rgb);
            r.style.setProperty('--accent-glow', 'rgba(' + a.rgb + ', 0.25)');
            r.style.setProperty('--accent-border', 'rgba(' + a.rgb + ', 0.2)');
            r.style.setProperty('--accent-soft', 'rgba(' + a.rgb + ', 0.12)');
            r.style.setProperty('--accent-bg', a.bg);
            r.style.setProperty('--page-bg', a.pageBg);
            r.style.background = a.pageBg;
        })();
    </script>

        /* Segmented date/time input wrappers */
        .date-wrap, .time-wrap {
            display: flex; align-items: center;
            border: 2px solid rgba(102, 126, 234, 0.3); border-radius: 6px;
            background: rgba(255, 255, 255, 0.8);

            padding: 0 4px 0 0;
            transition: border-color 0.15s, box-shadow 0.15s;

        .date-wrap input[type="text"], .time-wrap input[type="text"] {
            border: none !important; background: none !important; outline: none !important; box-shadow: none !important;
            padding: 6px 4px 6px 10px; font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-variant-numeric: tabular-nums;

            border-color: #667eea;

        }
        .cal-btn {
            background: none; border: none;
            cursor: pointer; padding: 2px 6px; font-size: 15px; line-height: 1;
            color: #999; transition: color 0.15s; flex-shrink: 0;
        }
        .cal-btn:hover { color: #667eea; }
        /* Hidden date inputs used only for the system calendar picker */
        .date-picker-hidden { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
        /* Meta-variables for axis tick label styling */
        :root {
            --axis-label-font-size: 14px;      /* Size of tick labels */
            --axis-label-color: #bbb;          /* Brightness/color of tick label text */
            --axis-tick-color: #666;           /* Color of tick marks (lines) */
        }
        /* Share button states */
        #shareBtn:disabled {
            background: linear-gradient(135deg, #999 0%, #777 100%) !important;
            cursor: not-allowed;
            opacity: 0.6;
        }
        #shareBtn:not(:disabled) {
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.5);
        }
        #shareBtn:not(:disabled):hover {
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.7);
        }

        /* Settings drawer styles in styles.css */

        /* Instant tooltip pinned over just the de-tone checkbox */
        .denoise-tip-anchor { position: relative; display: inline-flex; }
        .denoise-tip-anchor::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            z-index: 10000;
        }
        .denoise-tip-anchor:hover::after {
            opacity: 1;
            visibility: visible;
        }
    </style>

    <!-- Responsive spectrogram height: fill viewport so bottom edge sits at window edge -->
    <script>
    (function() {
        const MIN_HEIGHT = 250;
        const MAX_HEIGHT = 1200;
        let rafPending = false;
        let fitting = false;

        function fitSpectrogram() {
            if (fitting) return;
            fitting = true;

            const spec = document.getElementById('spectrogram');
            if (!spec) { fitting = false; return; }

            const vizPanel = spec.closest('.panel-visualization');
            if (!vizPanel) { fitting = false; return; }

            // Use download buttons as bottom anchor if visible, else viz panel
            const dlContainer = document.getElementById('downloadAudioContainer');
            const anchor = (dlContainer && dlContainer.offsetHeight > 0) ? dlContainer : vizPanel;

            const bodyPadBottom = parseFloat(getComputedStyle(document.body).paddingBottom) || 0;
            const anchorRect = anchor.getBoundingClientRect();
            const gap = window.innerHeight - anchorRect.bottom - bodyPadBottom;

            const currentH = spec.offsetHeight;
            const newH = Math.round(Math.min(MAX_HEIGHT, Math.max(MIN_HEIGHT, currentH + gap)));

            if (newH !== currentH) {
                spec.style.setProperty('--spec-height', newH + 'px');
                requestAnimationFrame(() => window.dispatchEvent(new Event('resize')));
            }

            fitting = false;
        }

        fitSpectrogram();
        window.addEventListener('load', fitSpectrogram);
        window.addEventListener('resize', () => {
            if (rafPending || fitting) return;
            rafPending = true;
            requestAnimationFrame(() => { rafPending = false; fitSpectrogram(); });
        });

        // Re-fit when download buttons appear/disappear
        const dlc = document.getElementById('downloadAudioContainer');
        if (dlc) {
            const obs = new MutationObserver(() => {
                if (rafPending || fitting) return;
                rafPending = true;
                requestAnimationFrame(() => { rafPending = false; fitSpectrogram(); });
            });
            obs.observe(dlc, { attributes: true, attributeFilter: ['style'] });
        }
    })();
    </script>

    <!-- Loading message tester (localhost only) -->
    <script>
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        const panel = document.createElement('div');
        panel.id = 'msgTestPanel';
        panel.style.cssText = 'position:fixed;bottom:10px;right:10px;background:#1a1a2e;border:1px solid #444;border-radius:8px;padding:12px;z-index:9999;font-size:13px;color:#ccc;display:flex;gap:8px;align-items:center;';
        panel.innerHTML = `
            <select id="msgTestTime" style="padding:4px;background:#222;color:#ccc;border:1px solid #555;border-radius:4px;">
                <option value="5">5s</option>
                <option value="15">15s</option>
                <option value="25">25s</option>
                <option value="30" selected>30s</option>
                <option value="40">40s</option>
                <option value="55">55s</option>
                <option value="75">75s</option>
                <option value="120">120s</option>
            </select>
            <button id="msgTestBtn" style="padding:4px 10px;background:#333;color:#ccc;border:1px solid #555;border-radius:4px;cursor:pointer;">Show Message</button>
            <button id="msgTestFlame" style="padding:4px 10px;background:#441111;color:#ff6644;border:1px solid #663333;border-radius:4px;cursor:pointer;">🔥</button>
        `;
        document.body.appendChild(panel);

        document.getElementById('msgTestBtn').addEventListener('click', async () => {
            const elapsed = parseInt(document.getElementById('msgTestTime').value) * 1000;
            const sc = document.getElementById('spacecraft')?.value || 'PSP';
            const { GENERAL_FACTS, PATIENCE_MESSAGES, SPACECRAFT_FACTS, PSP_FACTS, WIND_FACTS, MMS_FACTS, THEMIS_FACTS, SOLO_FACTS, GOES_FACTS } = await import('./js/loading-messages.js');
            const scMap = { PSP: PSP_FACTS, Wind: WIND_FACTS, MMS: MMS_FACTS, THEMIS: THEMIS_FACTS, SolO: SOLO_FACTS, GOES: GOES_FACTS };
            const specific = scMap[sc] || [];
            const pChance = elapsed < 30000 ? 0 : elapsed < 50000 ? 0.25 : elapsed < 70000 ? 0.33 : 0.5;
            let pool;
            if (elapsed < 5000) {
                pool = ['CDAWeb is now preparing your audio files'];
            } else if (Math.random() < pChance && PATIENCE_MESSAGES.length) {
                pool = PATIENCE_MESSAGES;
            } else if (specific.length && Math.random() < 0.5) {
                pool = specific;
            } else {
                pool = GENERAL_FACTS;
            }
            const msg = pool[Math.floor(Math.random() * pool.length)];
            const statusEl = document.getElementById('status');
            if (statusEl) {
                statusEl.innerHTML = '<span class="status-message"></span>';
                statusEl.querySelector('.status-message').textContent = msg;
                statusEl.className = 'status loading';
            }
        });

        document.getElementById('msgTestFlame').addEventListener('click', () => {
            const statusEl = document.getElementById('status');
            if (statusEl) {
                statusEl.innerHTML = '<span class="status-message"></span>';
                statusEl.querySelector('.status-message').textContent = 'Check this out...';
                statusEl.className = 'status loading';
            }
            if (window.enterOverheatMode) {
                window.enterOverheatMode();
                setTimeout(() => window.exitOverheatMode(), 4000);
            }
        });
    }
    </script>
