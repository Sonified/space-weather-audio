<!DOCTYPE html>
<html>
<head>
    <title>WebGPU + Three.js Foundation Test</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: monospace; padding: 20px; }
        canvas { border: 1px solid #444; display: block; margin: 10px 0; }
        .pass { color: #4CAF50; font-weight: bold; }
        .fail { color: #f44336; font-weight: bold; }
        .info { color: #90CAF9; }
        .warn { color: #FFC107; font-weight: bold; }
        #log { white-space: pre-wrap; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>
    <h2>WebGPU + Three.js Foundation Test</h2>
    <p class="info">Tests: WebGPU availability, Three.js WebGPURenderer, DataTexture with TSL node materials</p>
    <div id="log"></div>
    <canvas id="canvas" width="512" height="256"></canvas>

<script type="importmap">
{
    "imports": {
        "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.webgpu.js",
        "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.webgpu.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
}
</script>

<script type="module">

const log = document.getElementById('log');
function emit(msg, cls = '') {
    const span = document.createElement('span');
    span.className = cls;
    span.textContent = msg + '\n';
    log.appendChild(span);
}

async function runTests() {
    // ─── Test 1: WebGPU API exists ─────────────────────────────────────
    emit('TEST 1: navigator.gpu exists');
    if (!navigator.gpu) {
        emit('  FAIL — WebGPU not available in this browser', 'fail');
        return;
    }
    emit('  PASS', 'pass');

    // ─── Test 2: Can get adapter + device ──────────────────────────────
    emit('TEST 2: WebGPU adapter + device');
    const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
    if (!adapter) {
        emit('  FAIL — No WebGPU adapter', 'fail');
        return;
    }
    const device = await adapter.requestDevice();
    const adapterInfo = adapter.info || (adapter.requestAdapterInfo ? await adapter.requestAdapterInfo() : {});
    emit(`  PASS — ${adapterInfo.vendor || 'unknown vendor'}`, 'pass');

    // ─── Test 3: Import Three.js WebGPU bundle ────────────────────────
    emit('TEST 3: Import three/webgpu (single bundle, no duplicate THREE)');
    let THREE;
    try {
        THREE = await import('three/webgpu');
        emit(`  PASS — WebGPURenderer: ${typeof THREE.WebGPURenderer}`, 'pass');

        // Verify key classes come from same bundle
        const hasScene = typeof THREE.Scene === 'function';
        const hasMesh = typeof THREE.Mesh === 'function';
        const hasDataTexture = typeof THREE.DataTexture === 'function';
        emit(`  INFO: Scene=${hasScene}, Mesh=${hasMesh}, DataTexture=${hasDataTexture}`, 'info');
    } catch (e) {
        emit(`  FAIL — ${e.message}`, 'fail');
        console.error(e);
        return;
    }

    // ─── Test 4: Create WebGPURenderer on existing canvas ──────────────
    emit('TEST 4: Create WebGPURenderer on canvas');
    const canvas = document.getElementById('canvas');
    let renderer;
    try {
        renderer = new THREE.WebGPURenderer({
            canvas: canvas,
            antialias: false,
        });
        await renderer.init();
        renderer.setSize(512, 256);
        emit(`  PASS — Renderer initialized, size: ${renderer.domElement.width}x${renderer.domElement.height}`, 'pass');
    } catch (e) {
        emit(`  FAIL — ${e.message}`, 'fail');
        console.error(e);
        return;
    }

    // ─── Test 5: Render a basic scene with MeshBasicMaterial ──────────
    emit('TEST 5: Render a colored quad (MeshBasicMaterial)');
    try {
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const geometry = new THREE.PlaneGeometry(2, 2);
        const material = new THREE.MeshBasicMaterial({ color: 0x4CAF50 });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        await renderer.renderAsync(scene, camera);
        emit('  PASS — Green quad rendered', 'pass');
    } catch (e) {
        emit(`  FAIL — ${e.message}`, 'fail');
        console.error(e);
        return;
    }

    // ─── Test 6: DataTexture with TSL NodeMaterial ───────────────────
    emit('TEST 6: DataTexture (R8) + TSL node material (colormap simulation)');
    try {
        // Import TSL functions for node-based shading
        const TSL = await import('three/tsl');

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        // Create a 256x256 gradient texture (simulating spectrogram tile)
        const width = 256, height = 256;
        const data = new Uint8Array(width * height);
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                data[y * width + x] = Math.floor((x / width) * 255);
            }
        }

        const texture = new THREE.DataTexture(data, width, height, THREE.RedFormat, THREE.UnsignedByteType);
        texture.needsUpdate = true;

        // TSL node material: read R channel, apply orange-ish colormap
        const material = new THREE.MeshBasicNodeMaterial();
        const texNode = TSL.texture(texture);
        const val = texNode.r;  // red channel = our single-channel data
        material.colorNode = TSL.vec4(val, val.mul(0.5), val.mul(0.2), 1.0);

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        await renderer.renderAsync(scene, camera);
        emit('  PASS — DataTexture + TSL node material rendered (orange gradient)', 'pass');
        emit('  KEY FINDING: GLSL ShaderMaterial does NOT work with WebGPURenderer', 'warn');
        emit('  Must use TSL (Three Shading Language) node materials instead', 'warn');
    } catch (e) {
        emit(`  FAIL — ${e.message}`, 'fail');
        console.error(e);
        return;
    }

    // ─── Test 7: Shared GPUDevice access ───────────────────────────────
    emit('TEST 7: Access GPUDevice from WebGPURenderer');
    try {
        const backend = renderer.backend;
        const threeDevice = backend?.device || null;

        if (threeDevice) {
            emit(`  PASS — Got GPUDevice from renderer.backend.device`, 'pass');
            emit(`  INFO: Same device can run our FFT compute shaders!`, 'info');

            // Verify it's the real deal
            const canCreateBuffer = typeof threeDevice.createBuffer === 'function';
            const canCreatePipeline = typeof threeDevice.createComputePipeline === 'function';
            emit(`  INFO: createBuffer=${canCreateBuffer}, createComputePipeline=${canCreatePipeline}`, 'info');
        } else {
            emit(`  INFO — renderer.backend.device not directly accessible`, 'info');
            emit(`  Checking renderer internals...`, 'info');

            if (backend) {
                const keys = Object.keys(backend).filter(k => !k.startsWith('_')).join(', ');
                emit(`  Backend keys: ${keys}`, 'info');
            }
            emit(`  PARTIAL — Device access may need different path`, 'warn');
        }
    } catch (e) {
        emit(`  INFO — ${e.message} (non-blocking)`, 'info');
    }

    // ─── Test 8: External GPUTexture → Three.js rendering ─────────────
    // THIS IS THE CRITICAL TEST for zero-readback pipeline.
    // Can we create a GPUTexture on the shared device, fill it via
    // copyBufferToTexture, and render it through Three.js?
    emit('TEST 8: Render externally-created GPUTexture through Three.js');
    try {
        const gpuDevice = renderer.backend.device;
        if (!gpuDevice) throw new Error('No shared GPUDevice available');

        const texW = 256, texH = 256;

        // Step 1: Create gradient data (simulating FFT output)
        const pixelData = new Uint8Array(texW * texH);
        for (let y = 0; y < texH; y++) {
            for (let x = 0; x < texW; x++) {
                pixelData[y * texW + x] = Math.floor((y / texH) * 255);
            }
        }
        emit('  Step 1: Created gradient data (vertical ramp)', 'info');

        // Step 2: Upload to GPUBuffer
        // Row alignment: WebGPU requires bytesPerRow to be multiple of 256
        const bytesPerRow = Math.ceil(texW / 256) * 256; // 256 for r8unorm
        const bufferSize = bytesPerRow * texH;
        const stagingBuffer = gpuDevice.createBuffer({
            size: bufferSize,
            usage: GPUBufferUsage.COPY_SRC,
            mappedAtCreation: true,
        });
        const mapped = new Uint8Array(stagingBuffer.getMappedRange());
        // Copy row-by-row with padding
        for (let y = 0; y < texH; y++) {
            mapped.set(pixelData.subarray(y * texW, y * texW + texW), y * bytesPerRow);
        }
        stagingBuffer.unmap();
        emit('  Step 2: Uploaded to GPUBuffer (staging)', 'info');

        // Step 3: Create GPUTexture on shared device
        const gpuTexture = gpuDevice.createTexture({
            size: [texW, texH],
            format: 'r8unorm',
            usage: GPUTextureUsage.COPY_DST | GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.RENDER_ATTACHMENT,
        });
        emit('  Step 3: Created GPUTexture (r8unorm)', 'info');

        // Step 4: copyBufferToTexture
        const encoder = gpuDevice.createCommandEncoder();
        encoder.copyBufferToTexture(
            { buffer: stagingBuffer, bytesPerRow: bytesPerRow, rowsPerImage: texH },
            { texture: gpuTexture },
            [texW, texH],
        );
        gpuDevice.queue.submit([encoder.finish()]);
        stagingBuffer.destroy();
        emit('  Step 4: copyBufferToTexture submitted', 'info');

        // Step 5: Try to wrap the external GPUTexture for Three.js rendering
        // Approach A: Use Three.js internal texture utils to register external texture
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const geometry = new THREE.PlaneGeometry(2, 2);

        // Create a Three.js DataTexture as a "shell" and replace its GPU resource
        const dummyData = new Uint8Array(texW * texH);
        const threeTex = new THREE.DataTexture(dummyData, texW, texH, THREE.RedFormat, THREE.UnsignedByteType);
        threeTex.needsUpdate = true;
        threeTex.minFilter = THREE.LinearFilter;
        threeTex.magFilter = THREE.LinearFilter;

        // Build material with TSL — reads R channel, applies green gradient
        const TSL = await import('three/tsl');
        const material = new THREE.MeshBasicNodeMaterial();
        const texNode = TSL.texture(threeTex);
        const val = texNode.r;
        material.colorNode = TSL.vec4(val.mul(0.2), val, val.mul(0.3), 1.0);

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // First render: let Three.js create its internal GPU texture from the dummy data
        await renderer.renderAsync(scene, camera);
        emit('  Step 5a: Initial render with dummy DataTexture — OK', 'info');

        // Now the critical part: replace Three.js's internal GPU texture with ours
        const textureUtils = renderer.backend.textureUtils || renderer.backend;
        const textureProperties = renderer.backend.get ? renderer.backend.get(threeTex) : null;

        let replaced = false;
        let approachUsed = '';

        // Approach A: Direct property replacement on backend texture data
        if (textureProperties && textureProperties.texture) {
            const oldTex = textureProperties.texture;
            textureProperties.texture = gpuTexture;
            approachUsed = 'A: backend.get(tex).texture replacement';
            replaced = true;
            oldTex.destroy();
        }

        // Approach B: Check if there's a textureUtils with assignTexture-style method
        if (!replaced && textureUtils) {
            const utilKeys = Object.getOwnPropertyNames(Object.getPrototypeOf(textureUtils) || {})
                .filter(k => k !== 'constructor');
            emit(`  Step 5b: textureUtils methods: [${utilKeys.join(', ')}]`, 'info');
        }

        // Approach C: Try renderer.backend.set() to overwrite texture record
        if (!replaced && renderer.backend.set) {
            try {
                renderer.backend.set(threeTex, { texture: gpuTexture });
                approachUsed = 'C: backend.set(tex, {texture: gpuTexture})';
                replaced = true;
            } catch (setErr) {
                emit(`  Step 5c: backend.set failed: ${setErr.message}`, 'info');
            }
        }

        if (replaced) {
            emit(`  Step 5: Replaced internal GPU texture via ${approachUsed}`, 'info');

            // Step 6: Re-render — should now show our vertical gradient (green ramp)
            // Mark texture as not needing re-upload
            threeTex.needsUpdate = false;
            await renderer.renderAsync(scene, camera);
            emit('  PASS — External GPUTexture rendered through Three.js!', 'pass');
            emit('  KEY FINDING: Zero-readback pipeline IS viable', 'pass');
            emit(`  Approach: ${approachUsed}`, 'info');
        } else {
            // Explore what properties are available
            if (textureProperties) {
                const propKeys = Object.keys(textureProperties).join(', ');
                emit(`  INFO: backend texture properties: [${propKeys}]`, 'info');
            }

            // Check if there are utils on the backend for texture creation
            const backendKeys = Object.getOwnPropertyNames(Object.getPrototypeOf(renderer.backend) || {})
                .filter(k => k !== 'constructor');
            emit(`  INFO: backend methods: [${backendKeys.join(', ')}]`, 'info');

            emit('  PARTIAL — Could not replace internal texture. Need different approach.', 'warn');
            emit('  Zero-readback may need: custom texture wrapper or patch Three.js internals', 'warn');
        }

        gpuTexture.destroy();
    } catch (e) {
        emit(`  FAIL — ${e.message}`, 'fail');
        console.error(e);
        emit('  Zero-readback pipeline may need alternative approach', 'warn');
    }

    // ─── Summary ───────────────────────────────────────────────────────
    emit('');
    emit('═══════════════════════════════════════════', 'pass');
    emit('  ALL CORE TESTS PASSED', 'pass');
    emit('  WebGPU + Three.js WebGPURenderer is viable', 'pass');
    emit('═══════════════════════════════════════════', 'pass');
    emit('');
    emit('MIGRATION NOTES:', 'info');
    emit('  1. Import from "three/webgpu" only (NOT "three" separately)', 'info');
    emit('  2. Replace GLSL ShaderMaterial → TSL MeshBasicNodeMaterial', 'info');
    emit('  3. Use renderAsync() instead of render()', 'info');
    emit('  4. Compute shaders can share renderer.backend.device', 'info');
    emit('  5. See Test 8 results for external GPUTexture approach', 'info');
}

runTests().catch(e => {
    emit(`FATAL: ${e.message}`, 'fail');
    console.error(e);
});

</script>
</body>
</html>
