<!DOCTYPE html>
<html>
<head>
    <title>Wavelet GPU Stretch Test</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0a0a0f; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; padding: 20px; }
        h1 { color: #E040FB; margin: 0 0 4px 0; font-size: 22px; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }

        .panel { background: #14141f; border: 1px solid #2a2a3a; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .panel h2 { margin: 0 0 12px 0; font-size: 15px; color: #90CAF9; }

        select, button, input { font-family: inherit; font-size: 13px; }
        select { background: #1a1a2e; color: #e0e0e0; border: 1px solid #3a3a5a; padding: 6px 10px; border-radius: 4px; }
        button { background: #E040FB; color: #000; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #EA80FC; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        button.secondary { background: #2a2a4a; color: #ccc; }
        button.secondary:hover { background: #3a3a5a; }

        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .controls label { color: #aaa; font-size: 12px; }

        #log {
            background: #0d0d15; border: 1px solid #2a2a3a; border-radius: 6px;
            padding: 12px; font-size: 12px; line-height: 1.7; max-height: 500px;
            overflow-y: auto; white-space: pre-wrap; user-select: text; cursor: text;
        }
        .log-time { color: #666; }
        .log-ok { color: #4CAF50; font-weight: bold; }
        .log-err { color: #f44336; font-weight: bold; }
        .log-warn { color: #FFC107; }
        .log-info { color: #90CAF9; }
        .log-perf { color: #E040FB; font-weight: bold; }
        .log-dim { color: #555; }
        .log-header { color: #E040FB; font-weight: bold; font-size: 13px; border-bottom: 1px solid #2a2a3a; padding-bottom: 4px; margin-bottom: 4px; display: block; }

        .player-row { display: flex; gap: 12px; align-items: center; margin-top: 10px; }
        .player-row button { min-width: 70px; }
        .player-row button.source-btn { background: #2a2a4a; color: #ccc; }
        .player-row button.source-btn:hover { background: #3a3a5a; }
        .player-row button.source-btn.active { background: #E040FB; color: #000; }

        #waveform { width: 100%; height: 100%; background: #0d0d15; border: 1px solid #2a2a3a; border-radius: 4px; cursor: pointer; }
        #playhead { position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: #fff; pointer-events: none; opacity: 0.9; z-index: 1; }
        #waveformTime { position: absolute; bottom: 4px; right: 8px; color: #888; font-size: 11px; pointer-events: none; z-index: 2; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; margin-top: 8px; }
        .stat-box { background: #0d0d15; border: 1px solid #2a2a3a; border-radius: 4px; padding: 8px 10px; }
        .stat-label { font-size: 11px; color: #666; text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: bold; color: #E040FB; margin-top: 2px; }
        .stat-value.green { color: #4CAF50; }
    </style>
</head>

<script type="module">
import { WaveletGPUCompute, generateScales, buildMorletLUT, generateCQTScales, buildCQTFilterBank, generateNSGTBands } from './js/wavelet-gpu-compute.js';

// ─── RTPGHI Engine ───────────────────────────────────────────────────────────

class RTPGHIStretcher {
    constructor(opts = {}) {
        this.M = opts.M || 2048;
        this.hopDiv = opts.hopDiv || 8;
        this.bins = this.M / 2 + 1;
        this.aSyn = this.M / this.hopDiv;
        this.tol = opts.tol || 10;            // dB below peak to skip
        this.phaseMode = opts.phaseMode || 'full';  // 'full', 'time', 'freq'
        this.windowType = opts.windowType || 'gauss';
        const M = this.M;

        // Gamma: use explicit value if provided, otherwise M²×0.006×scale
        if (opts.gamma != null) {
            this.gamma = opts.gamma;
        } else {
            this.gammaScale = opts.gammaScale || 1.0;
            this.gamma = M * M * 0.006 * this.gammaScale;
        }

        // Window
        this.window = new Float32Array(M);
        if (this.windowType === 'hann') {
            for (let i = 0; i < M; i++) {
                this.window[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / M));
            }
        } else {
            // Gaussian
            for (let i = 0; i < M; i++) {
                const t = i - M / 2;
                this.window[i] = Math.exp(-Math.PI * t * t / this.gamma);
            }
        }

        // FFT infrastructure (Cooley-Tukey radix-2)
        this.bitRev = this._computeBitReversal(M);
        this.twRe = new Float32Array(M / 2);
        this.twIm = new Float32Array(M / 2);
        for (let i = 0; i < M / 2; i++) {
            const angle = -2 * Math.PI * i / M;
            this.twRe[i] = Math.cos(angle);
            this.twIm[i] = Math.sin(angle);
        }

        // Scratch buffers
        this.fftRe = new Float32Array(M);
        this.fftIm = new Float32Array(M);
    }

    _computeBitReversal(n) {
        const bits = Math.log2(n);
        const rev = new Uint32Array(n);
        for (let i = 0; i < n; i++) {
            let r = 0, x = i;
            for (let j = 0; j < bits; j++) { r = (r << 1) | (x & 1); x >>= 1; }
            rev[i] = r;
        }
        return rev;
    }

    _fft(re, im) {
        const n = this.M;
        for (let i = 0; i < n; i++) {
            const j = this.bitRev[i];
            if (i < j) {
                [re[i], re[j]] = [re[j], re[i]];
                [im[i], im[j]] = [im[j], im[i]];
            }
        }
        for (let size = 2; size <= n; size *= 2) {
            const half = size / 2, step = n / size;
            for (let i = 0; i < n; i += size) {
                for (let j = 0; j < half; j++) {
                    const tw = j * step;
                    const wr = this.twRe[tw], wi = this.twIm[tw];
                    const i2 = i + j + half;
                    const tr = wr * re[i2] - wi * im[i2];
                    const ti = wr * im[i2] + wi * re[i2];
                    re[i2] = re[i + j] - tr;
                    im[i2] = im[i + j] - ti;
                    re[i + j] += tr;
                    im[i + j] += ti;
                }
            }
        }
    }

    _ifft(re, im) {
        const n = this.M;
        for (let i = 0; i < n; i++) im[i] = -im[i];
        this._fft(re, im);
        for (let i = 0; i < n; i++) { re[i] /= n; im[i] = -im[i] / n; }
    }

    /**
     * Analyze one frame: window → FFT → magnitude + log-magnitude
     */
    _analyzeFrame(source, pos, mag, logMag) {
        const M = this.M, re = this.fftRe, im = this.fftIm;
        for (let i = 0; i < M; i++) {
            const p = pos + i;
            const idx = Math.floor(p);
            const frac = p - idx;
            let sample = 0;
            if (idx >= 0 && idx < source.length - 1) {
                sample = source[idx] * (1 - frac) + source[idx + 1] * frac;
            } else if (idx >= 0 && idx < source.length) {
                sample = source[idx];
            }
            re[i] = sample * this.window[i];
            im[i] = 0;
        }
        this._fft(re, im);
        const EPS = 1e-20;
        for (let m = 0; m < this.bins; m++) {
            mag[m] = Math.sqrt(re[m] * re[m] + im[m] * im[m]);
            logMag[m] = Math.log(mag[m] + EPS);
        }
    }

    /**
     * RTPGHI phase update — CORRECTED gradient directions.
     *
     * Key insight from Prusa et al.:
     *   ∂φ/∂t = (∂ log|S| / ∂ω) · γ/(a·M)  + 2πam/M   [FREQUENCY grad of log-mag]
     *   ∂φ/∂ω = -(∂ log|S| / ∂t) · γ/(a·M)              [TIME grad of log-mag]
     *
     * So time propagation uses freq derivative of log-mag (across bins),
     * and freq propagation uses time derivative of log-mag (across frames).
     */
    _rtpghiUpdate(logMagPrev, logMagCurr, phasePrev, phaseCurr) {
        const bins = this.bins;
        const M = this.M;
        const aSyn = this.aSyn;
        const lambda = this.gamma / (aSyn * M);
        const TWO_PI = 2 * Math.PI;
        const phaseMode = this.phaseMode;

        // Threshold
        let maxLog = -Infinity;
        for (let m = 0; m < bins; m++) {
            if (logMagCurr[m] > maxLog) maxLog = logMagCurr[m];
        }
        const threshold = maxLog - this.tol;

        // ── Step 1: Time propagation (prev frame → curr frame) ──
        // Uses FREQUENCY gradient of log-magnitude (central difference across bins)
        if (phaseMode === 'full' || phaseMode === 'time') {
            for (let m = 0; m < bins; m++) {
                // Frequency gradient of log-mag (central difference, clamped at edges)
                let dLogdW;
                if (m === 0) {
                    dLogdW = logMagCurr[1] - logMagCurr[0];
                } else if (m === bins - 1) {
                    dLogdW = logMagCurr[bins - 1] - logMagCurr[bins - 2];
                } else {
                    dLogdW = (logMagCurr[m + 1] - logMagCurr[m - 1]) * 0.5;
                }
                // Phase time gradient = freq_grad_of_log_mag * lambda + expected advance
                const tgrad = dLogdW * lambda + TWO_PI * aSyn * m / M;
                phaseCurr[m] = phasePrev[m] + tgrad;
            }
        } else {
            // No time propagation — start from zero or random
            for (let m = 0; m < bins; m++) {
                phaseCurr[m] = TWO_PI * aSyn * m / M * 0; // will be filled by freq sweep
            }
        }

        // ── Step 2: Frequency propagation (within current frame) ──
        // Uses TIME gradient of log-magnitude (difference across frames)
        if (phaseMode === 'full' || phaseMode === 'freq') {
            // Forward sweep
            for (let m = 1; m < bins; m++) {
                if (logMagCurr[m] > threshold && logMagCurr[m] > logMagCurr[m - 1]) {
                    // Time gradient of log-mag at bins m and m-1
                    const dLogdT_m = logMagCurr[m] - logMagPrev[m];
                    const dLogdT_m1 = logMagCurr[m - 1] - logMagPrev[m - 1];
                    // Frequency phase gradient = -time_grad_of_log_mag * lambda
                    // Use average (trapezoidal) for integration across one bin
                    const fgrad = -(dLogdT_m + dLogdT_m1) * 0.5 * lambda;
                    phaseCurr[m] = phaseCurr[m - 1] + fgrad;
                }
            }
            // Backward sweep
            for (let m = bins - 2; m >= 0; m--) {
                if (logMagCurr[m] > threshold && logMagCurr[m] > logMagCurr[m + 1]) {
                    const dLogdT_m = logMagCurr[m] - logMagPrev[m];
                    const dLogdT_m1 = logMagCurr[m + 1] - logMagPrev[m + 1];
                    const fgrad = -(dLogdT_m + dLogdT_m1) * 0.5 * lambda;
                    phaseCurr[m] = phaseCurr[m + 1] - fgrad;
                }
            }
        }
    }

    /**
     * Synthesize: magnitude + phase → IFFT → windowed time-domain
     */
    _synthesizeFrame(mag, phase) {
        const M = this.M, re = this.fftRe, im = this.fftIm;
        for (let m = 0; m < this.bins; m++) {
            re[m] = mag[m] * Math.cos(phase[m]);
            im[m] = mag[m] * Math.sin(phase[m]);
        }
        for (let m = 1; m < M / 2; m++) {
            re[M - m] = re[m];
            im[M - m] = -im[m];
        }
        this._ifft(re, im);
        const out = new Float32Array(M);
        for (let i = 0; i < M; i++) out[i] = re[i] * this.window[i];
        return out;
    }

    /**
     * Stretch an entire audio buffer.
     */
    stretch(source, stretchFactor, onProgress = null) {
        const M = this.M;
        const aSyn = this.aSyn;
        const aAna = aSyn / stretchFactor;
        const bins = this.bins;

        const numInputFrames = Math.floor((source.length - M) / aAna) + 1;
        const outputLength = numInputFrames * aSyn + M;
        const output = new Float32Array(outputLength);
        const windowSum = new Float32Array(outputLength);

        const mag = new Float32Array(bins);
        const logMag = new Float32Array(bins);
        const logMagPrev = new Float32Array(bins);
        const phasePrev = new Float32Array(bins);
        const phaseCurr = new Float32Array(bins);

        // Seed logMagPrev from actual first frame (not a floor value)
        this._analyzeFrame(source, 0, mag, logMag);
        logMagPrev.set(logMag);

        let sourcePos = 0;
        let outputPos = 0;

        for (let frame = 0; frame < numInputFrames; frame++) {
            this._analyzeFrame(source, sourcePos, mag, logMag);
            this._rtpghiUpdate(logMagPrev, logMag, phasePrev, phaseCurr);
            const synFrame = this._synthesizeFrame(mag, phaseCurr);

            for (let i = 0; i < M; i++) {
                if (outputPos + i < outputLength) {
                    output[outputPos + i] += synFrame[i];
                    windowSum[outputPos + i] += this.window[i] * this.window[i];
                }
            }

            logMagPrev.set(logMag);
            phasePrev.set(phaseCurr);
            sourcePos += aAna;
            outputPos += aSyn;

            if (onProgress && frame % 100 === 0) onProgress(frame, numInputFrames);
        }

        // COLA normalization
        for (let i = 0; i < outputLength; i++) {
            if (windowSum[i] > 1e-8) output[i] /= windowSum[i];
        }

        const trimStart = Math.floor(M / 2);
        const trimEnd = Math.min(outputLength, outputPos + Math.floor(M / 2));
        const trimmed = output.slice(trimStart, trimEnd);

        if (onProgress) onProgress(numInputFrames, numInputFrames);
        return trimmed;
    }
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function mixToMono(audioBuffer) {
    if (audioBuffer.numberOfChannels === 1) return audioBuffer.getChannelData(0);
    const L = audioBuffer.getChannelData(0);
    const R = audioBuffer.getChannelData(1);
    const mono = new Float32Array(L.length);
    for (let i = 0; i < L.length; i++) mono[i] = (L[i] + R[i]) * 0.5;
    return mono;
}

function setStat(id, value) {
    document.getElementById(id).textContent = value;
}

function drawWaveform(canvas, data, color = '#E040FB') {
    const ctx = canvas.getContext('2d');
    const w = canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
    const h = canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1);
    ctx.fillStyle = '#0d0d15';
    ctx.fillRect(0, 0, w, h);

    const step = Math.max(1, Math.floor(data.length / w));
    const mid = h / 2;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x < w; x++) {
        const idx = Math.floor(x * data.length / w);
        let min = 0, max = 0;
        for (let j = 0; j < step; j++) {
            const v = data[idx + j] || 0;
            if (v < min) min = v;
            if (v > max) max = v;
        }
        ctx.moveTo(x, mid + min * mid);
        ctx.lineTo(x, mid + max * mid);
    }
    ctx.stroke();

    // center line
    ctx.strokeStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(0, mid);
    ctx.lineTo(w, mid);
    ctx.stroke();
}

window.runStretch = async function() {
    if (isRunning) return;
    isRunning = true;
    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    btn.textContent = 'Running...';

    const stretchFactor = parseFloat(document.getElementById('stretchFactor').value);
    const w0 = parseFloat(document.getElementById('w0').value);
    const dj = parseFloat(document.getElementById('dj').value);

    const timings = {};

    try {
        // ── Decode audio ──
        logHeader('Wavelet GPU Stretch');

        if (!originalBuffer) {
            const filePath = document.getElementById('fileSelect').value;
            log(`Fetching: ${filePath}`, 'log-info');
            const t0 = performance.now();
            if (!audioCtx) audioCtx = new AudioContext();
            const resp = await fetch(filePath);
            if (!resp.ok) throw new Error(`Fetch failed: ${resp.status} ${resp.statusText}`);
            const arrayBuf = await resp.arrayBuffer();
            originalBuffer = await audioCtx.decodeAudioData(arrayBuf);
            originalMono = mixToMono(originalBuffer);
            timings.decode = performance.now() - t0;
            log(`Decoded: ${originalBuffer.numberOfChannels}ch, ${originalBuffer.sampleRate}Hz, ` +
                `${originalBuffer.duration.toFixed(2)}s (${originalMono.length.toLocaleString()} samples)`, 'log-ok');
            logPerf('Decode', timings.decode);
        } else {
            timings.decode = 0;
            log(`Using loaded audio: ${originalBuffer.sampleRate}Hz, ${originalBuffer.duration.toFixed(2)}s`, 'log-info');
        }

        const sampleRate = originalBuffer.sampleRate;
        const dt = 1.0 / sampleRate;

        const transform = document.getElementById('transform').value;
        const binsPerOctave = parseInt(document.getElementById('binsPerOctave').value);
        const minBW = parseFloat(document.getElementById('minBW').value);
        const interpMode = parseInt(document.getElementById('interpMode').value);
        const interpLabel = interpMode === 0 ? 'cubic' : 'linear';
        const phaseMode = document.getElementById('phaseMode').value;
        const rtpghiM = parseInt(document.getElementById('rtpghiFFTSize').value);
        const rtpghiHopDiv = parseInt(document.getElementById('rtpghiHopDiv').value);
        const transformLabel = transform === 'rtpghi'
            ? `RTPGHI (M=${rtpghiM}, hop=M/${rtpghiHopDiv})`
            : transform === 'nsgt'
            ? `NSGT (${binsPerOctave} bins/oct)`
            : transform === 'cqt'
            ? `CQT (${binsPerOctave} bins/oct${minBW > 0 ? `, minBW=${minBW}Hz` : ''})`
            : `CWT (w0=${w0}, dj=${dj})`;

        if (transform === 'rtpghi') {
            const rtpghiWindowType = document.getElementById('rtpghiWindow').value;
            const rtpghiPhaseMode = document.getElementById('rtpghiPhaseMode').value;
            const rtpghiTol = parseFloat(document.getElementById('rtpghiTol').value);
            const rtpghiGamma = parseFloat(document.getElementById('rtpghiGamma').value);
            log(`Parameters: ${transformLabel}, stretch=${stretchFactor}x, window=${rtpghiWindowType}, phase=${rtpghiPhaseMode}, tol=${rtpghiTol}dB, γ=${rtpghiGamma}`, 'log-info');

            // ── RTPGHI Stretch (CPU, no GPU needed) ──
            const t1 = performance.now();
            const stretcher = new RTPGHIStretcher({
                M: rtpghiM, hopDiv: rtpghiHopDiv,
                windowType: rtpghiWindowType, phaseMode: rtpghiPhaseMode,
                tol: rtpghiTol, gamma: rtpghiGamma
            });
            log(`RTPGHI: M=${rtpghiM}, hop=${rtpghiM / rtpghiHopDiv}, bins=${stretcher.bins}, γ=${stretcher.gamma.toFixed(1)}`, 'log-info');

            const aAna = stretcher.aSyn / stretchFactor;
            const numFrames = Math.floor((originalMono.length - rtpghiM) / aAna) + 1;
            log(`  Analysis hop: ${aAna.toFixed(1)} samples, ${numFrames} frames`, 'log-dim');

            stretchedAudio = stretcher.stretch(originalMono, stretchFactor, (done, total) => {
                if (done % 500 === 0 && done > 0) {
                    log(`  Frame ${done}/${total} (${(done / total * 100).toFixed(0)}%)`, 'log-dim');
                }
            });
            timings.cwt = performance.now() - t1;
            logPerf('RTPGHI Stretch', timings.cwt);

            // ── Normalize ──
            const t4 = performance.now();
            let peak = 0;
            for (let i = 0; i < stretchedAudio.length; i++) {
                const a = Math.abs(stretchedAudio[i]);
                if (a > peak) peak = a;
            }
            if (peak > 0) {
                const gain = 0.95 / peak;
                for (let i = 0; i < stretchedAudio.length; i++) stretchedAudio[i] *= gain;
            }
            timings.norm = performance.now() - t4;
            logPerf('Normalize', timings.norm);

            // ── Total ──
            timings.total = (timings.decode || 0) + timings.cwt + timings.norm;
            log('', '');
            logPerf('TOTAL', timings.total);

            const inputDuration = originalMono.length / sampleRate;
            const realtimeRatio = (timings.total / 1000) / inputDuration;
            log(`  Realtime: ${realtimeRatio.toFixed(2)}x`, realtimeRatio <= 1 ? 'log-ok' : 'log-warn');

            // RMS check
            let rms = 0;
            for (let i = 0; i < stretchedAudio.length; i++) rms += stretchedAudio[i] * stretchedAudio[i];
            rms = Math.sqrt(rms / stretchedAudio.length);
            log(`  Output: ${stretchedAudio.length.toLocaleString()} samples (${(stretchedAudio.length / sampleRate).toFixed(2)}s), RMS=${rms.toFixed(4)}`, rms > 0.001 ? 'log-ok' : 'log-warn');

            // Stats panel
            document.getElementById('statsPanel').style.display = '';
            setStat('statDecode', timings.decode ? `${timings.decode.toFixed(0)}ms` : 'cached');
            setStat('statInit', 'N/A (CPU)');
            setStat('statCWT', timings.cwt >= 1000 ? `${(timings.cwt/1000).toFixed(2)}s` : `${timings.cwt.toFixed(0)}ms`);
            setStat('statStretch', `${numFrames} frames`);
            setStat('statNorm', `${timings.norm.toFixed(1)}ms`);
            setStat('statTotal', timings.total >= 1000 ? `${(timings.total/1000).toFixed(2)}s` : `${timings.total.toFixed(0)}ms`);
            setStat('statRealtime', `${realtimeRatio.toFixed(2)}x`);
            setStat('statInput', `${originalBuffer.duration.toFixed(1)}s / ${(originalMono.length/1024).toFixed(0)}K`);
            setStat('statOutput', `${(stretchedAudio.length / sampleRate).toFixed(1)}s / ${(stretchedAudio.length/1024).toFixed(0)}K`);
            setStat('statScales', `M=${rtpghiM}`);
            setStat('statMem', `~${(rtpghiM * 12 / 1024).toFixed(0)} KB`);

            // AudioBuffer for playback
            const wasPlaying = !!currentSource;
            const resumeRatio = wasPlaying ? getCurrentPlaybackRatio() : 0;
            stretchedBuffer = audioCtx.createBuffer(1, stretchedAudio.length, sampleRate);
            stretchedBuffer.getChannelData(0).set(stretchedAudio);

            // Waveform
            document.getElementById('playerPanel').style.display = '';
            drawWaveform(document.getElementById('waveform'), stretchedAudio);

            setActiveSource('stretched');
            // Auto-play new audio from same relative position
            if (wasPlaying) {
                playBuffer(stretchedBuffer, resumeRatio * stretchedBuffer.duration);
            }
            log('RTPGHI stretch complete. Ready for playback.', 'log-ok');

            btn.disabled = false;
            btn.textContent = 'Run GPU Wavelet Stretch';
            isRunning = false;
            return;
        }

        log(`Parameters: ${transformLabel}, stretch=${stretchFactor}x, interp=${interpLabel}, phase=${phaseMode}, phaseRand=${Math.round(parseFloat(document.getElementById('phaseRand').value) * 100)}%`, 'log-info');

        // ── GPU Init ──
        const t1 = performance.now();
        if (!waveletGPU) {
            waveletGPU = new WaveletGPUCompute();
            await waveletGPU.initialize();
        }
        timings.init = performance.now() - t1;
        logPerf('GPU init', timings.init);

        // ── Preview: chunk info ──
        const maxChunk = waveletGPU.calculateMaxChunkSamples(dt, w0, dj, transform, binsPerOctave, 20, minBW);
        const numChunks = originalMono.length <= maxChunk ? 1
            : Math.ceil((originalMono.length - Math.round(0.5 / dt)) / (maxChunk - Math.round(0.5 / dt)));
        log(`Max chunk: ${maxChunk.toLocaleString()} samples (${(maxChunk/sampleRate).toFixed(1)}s), ${numChunks} chunk${numChunks > 1 ? 's' : ''}`, 'log-info');

        // ── CWT + Stretch (chunked if needed) ──
        const t2 = performance.now();
        const phaseRand = parseFloat(document.getElementById('phaseRand').value);
        console.log(`%c[TEST_WAVELET runStretch] stretchFactor=${stretchFactor}, dt=${dt}, sampleRate=${sampleRate}, sourceLen=${originalMono.length}, transform=${transform}`, 'color: #00CCFF; font-weight: bold');
        console.log(`%c[TEST_WAVELET runStretch] opts=`, 'color: #00CCFF', { dt, w0, dj, transform, binsPerOctave, minBW, phaseRand, interpMode, phaseMode });

        stretchedAudio = await waveletGPU.waveletStretchChunked(
            originalMono, stretchFactor,
            { dt, w0, dj, transform, binsPerOctave, minBW, phaseRand, interpMode, phaseMode,
              onChunkDone: (ci, total, elapsed) => {
                  if (total > 1) log(`  Chunk ${ci + 1}/${total} (${elapsed.toFixed(0)}ms)`, 'log-dim');
              }
            }
        );
        timings.cwt = performance.now() - t2;
        logPerf(`${transform.toUpperCase()} + Stretch`, timings.cwt);

        console.log(`%c[TEST_WAVELET runStretch] OUTPUT: stretchedLen=${stretchedAudio.length}, expected=${Math.round(originalMono.length * stretchFactor)}, ratio=${(stretchedAudio.length / originalMono.length).toFixed(4)}`, 'color: #00CCFF; font-weight: bold');

        // ── Normalize ──
        const t4 = performance.now();
        WaveletGPUCompute.normalize(stretchedAudio);
        timings.norm = performance.now() - t4;
        logPerf('Normalize', timings.norm);

        // ── Total ──
        timings.total = (timings.decode || 0) + timings.init + timings.cwt + timings.norm;
        log('', '');
        logPerf('TOTAL', timings.total);

        const inputDuration = originalMono.length / sampleRate;
        const realtimeRatio = (timings.total / 1000) / inputDuration;
        log(`  Realtime: ${realtimeRatio.toFixed(2)}x`, realtimeRatio <= 1 ? 'log-ok' : 'log-warn');

        // ── RMS check ──
        let rms = 0, validSamples = 0;
        for (let i = 0; i < stretchedAudio.length; i++) {
            const v = stretchedAudio[i];
            if (isFinite(v)) { rms += v * v; validSamples++; }
        }
        rms = Math.sqrt(rms / validSamples);
        let peak = 0;
        for (let i = 0; i < stretchedAudio.length; i++) { const a = Math.abs(stretchedAudio[i]); if (a > peak) peak = a; }
        log(`  Output RMS: ${rms.toFixed(4)}, Peak: ${peak.toFixed(4)}`, rms > 0.001 ? 'log-ok' : 'log-warn');
        if (rms < 0.0001) log('  WARNING: Output is near-silent! Possible GPU compute issue.', 'log-err');

        // ── Stats panel ──
        document.getElementById('statsPanel').style.display = '';
        setStat('statDecode', timings.decode ? `${timings.decode.toFixed(0)}ms` : 'cached');
        setStat('statInit', `${timings.init.toFixed(0)}ms`);
        setStat('statCWT', timings.cwt >= 1000 ? `${(timings.cwt/1000).toFixed(2)}s` : `${timings.cwt.toFixed(0)}ms`);
        setStat('statStretch', numChunks > 1 ? `${numChunks} chunks` : 'single');
        setStat('statNorm', `${timings.norm.toFixed(1)}ms`);
        setStat('statTotal', timings.total >= 1000 ? `${(timings.total/1000).toFixed(2)}s` : `${timings.total.toFixed(0)}ms`);
        setStat('statRealtime', `${realtimeRatio.toFixed(2)}x`);
        setStat('statInput', `${originalBuffer.duration.toFixed(1)}s / ${(originalMono.length/1024).toFixed(0)}K`);
        setStat('statOutput', `${(stretchedAudio.length / sampleRate).toFixed(1)}s / ${(stretchedAudio.length/1024).toFixed(0)}K`);
        setStat('statScales', numChunks > 1 ? `${numChunks} chunks` : `${waveletGPU.cachedNumScales}`);
        let chunkBins, chunkMem;
        if (transform === 'nsgt') {
            const nsgtInfo = generateNSGTBands(sampleRate, maxChunk, binsPerOctave);
            chunkBins = nsgtInfo.numBands;
            chunkMem = nsgtInfo.totalCoeffs * 8; // complex f32 pairs
        } else if (transform === 'cqt') {
            chunkBins = generateCQTScales(sampleRate, binsPerOctave, 20, minBW).numBins;
            chunkMem = maxChunk * chunkBins * 8;
        } else {
            chunkBins = generateScales(maxChunk, dt, w0, dj).length;
            chunkMem = maxChunk * chunkBins * 8;
        }
        setStat('statMem', `${(chunkMem / 1024 / 1024).toFixed(0)} MB/chunk`);

        // ── Build AudioBuffer for playback ──
        const wasPlaying = !!currentSource;
        const resumeRatio = wasPlaying ? getCurrentPlaybackRatio() : 0;
        console.log(`%c[TEST_WAVELET] AudioBuffer: sampleRate=${sampleRate}, audioCtx.sampleRate=${audioCtx.sampleRate}, length=${stretchedAudio.length}, duration=${(stretchedAudio.length/sampleRate).toFixed(4)}s`, 'color: #00CCFF; font-weight: bold');
        stretchedBuffer = audioCtx.createBuffer(1, stretchedAudio.length, sampleRate);
        stretchedBuffer.getChannelData(0).set(stretchedAudio);

        // ── Waveform ──
        document.getElementById('playerPanel').style.display = '';
        drawWaveform(document.getElementById('waveform'), stretchedAudio);

        setActiveSource('stretched');
        if (wasPlaying) {
            playBuffer(stretchedBuffer, resumeRatio * stretchedBuffer.duration);
        }
        log('Ready for playback.', 'log-ok');

        // ── Summary block (easy copy-paste) ──
        logHeader('Summary (copy-paste friendly)');
        const summaryBins = chunkBins;
        const cwtMemPerChunk = chunkMem;
        const summary = [
            `File:       ${document.getElementById('fileSelect').value.split('/').pop() || 'local file'}`,
            `Input:      ${originalBuffer.duration.toFixed(2)}s, ${sampleRate}Hz, ${originalBuffer.numberOfChannels}ch`,
            `Transform:  ${transformLabel}`,
            `Stretch:    ${stretchFactor}x`,
            `Bins:       ${summaryBins} per chunk, ${numChunks} chunk${numChunks > 1 ? 's' : ''}`,
            `CWT mem:    ${(cwtMemPerChunk / 1024 / 1024).toFixed(1)} MB/chunk`,
            `Output:     ${(stretchedAudio.length / sampleRate).toFixed(2)}s (${stretchedAudio.length.toLocaleString()} samples)`,
            ``,
            `Timings:`,
            `  Decode:   ${timings.decode ? timings.decode.toFixed(1) + 'ms' : 'cached'}`,
            `  GPU init: ${timings.init.toFixed(1)}ms`,
            `  CWT+Str:  ${timings.cwt.toFixed(1)}ms`,

            `  TOTAL:    ${timings.total.toFixed(1)}ms`,
            `  Realtime: ${speedup.toFixed(0)}x`,
            ``,
            `Output:     RMS=${rms.toFixed(4)}, Peak=${peak.toFixed(4)}`,

        for (const line of summary) log(line, 'log-dim');

    } catch (err) {
        log(`ERROR: ${err.message}`, 'log-err');

// ─── Playback with seek ──────────────────────────────────────────────────────
const FADE_TIME = 0.03; // 30ms crossfade to avoid clicks
let playbackStartTime = 0;   // audioCtx.currentTime when playback started
let playbackOffset = 0;      // offset into the buffer (seconds)
let playbackDuration = 0;    // total duration of current buffer
let playbackRAF = null;      // animation frame for playhead
let currentGain = null;      // GainNode for current source

function startPlayhead(duration) {
    playbackDuration = duration;
    const playhead = document.getElementById('playhead');
    const timeEl = document.getElementById('waveformTime');

    function tick() {
        if (!currentSource || !audioCtx) { stopPlayhead(); return; }
        const elapsed = audioCtx.currentTime - playbackStartTime;
        const pos = playbackOffset + elapsed;
        if (pos >= playbackDuration) { stopPlayhead(); return; }
        const pct = pos / playbackDuration;
        playhead.style.left = `${pct * 100}%`;
        const mm = String(Math.floor(pos / 60)).padStart(2, '0');
        const ss = String(Math.floor(pos % 60)).padStart(2, '0');
        const durMM = String(Math.floor(playbackDuration / 60)).padStart(2, '0');
        const durSS = String(Math.floor(playbackDuration % 60)).padStart(2, '0');
        timeEl.textContent = `${mm}:${ss} / ${durMM}:${durSS}`;
        playbackRAF = requestAnimationFrame(tick);
    }
    tick();
}

function stopPlayhead() {
    if (playbackRAF) { cancelAnimationFrame(playbackRAF); playbackRAF = null; }
}

// Get current playback position as a ratio (0-1) of total duration
function getCurrentPlaybackRatio() {
    if (!currentSource || !audioCtx || playbackDuration <= 0) return 0;
    const elapsed = audioCtx.currentTime - playbackStartTime;
    const pos = playbackOffset + elapsed;
    return Math.max(0, Math.min(pos / playbackDuration, 1));
}

function ensureAudioCtx() {
    if (!audioCtx) audioCtx = new AudioContext();
    return audioCtx;
}

function isLooping() { return document.getElementById('loopToggle').checked; }

// Fade out and stop the old source (non-blocking — runs in parallel with new source)
function fadeOutOld(src, gain) {
    if (!src || !gain || !audioCtx) return;
    gain.gain.cancelScheduledValues(audioCtx.currentTime);
    gain.gain.setValueAtTime(gain.gain.value, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + FADE_TIME);
    setTimeout(() => {
        try { src.stop(); } catch {}
        try { gain.disconnect(); } catch {}
    }, FADE_TIME * 1000 + 10);
}

function playBuffer(buffer, offset = 0, label = '') {
    ensureAudioCtx();

    // Crossfade: fade out old source while fading in new one
    const oldSrc = currentSource;
    const oldGain = currentGain;
    if (oldSrc) {
        currentSource = null; // detach so onended doesn't interfere
        fadeOutOld(oldSrc, oldGain);
    }
    stopPlayhead();

    // New source with its own gain node
    const gain = audioCtx.createGain();
    gain.connect(audioCtx.destination);
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    src.connect(gain);
    src.onended = () => {
        if (currentSource !== src) return;
        if (isLooping()) {
            playBuffer(buffer, 0);
        } else {
            currentSource = null;
            currentGain = null;
            stopPlayhead();
            try { gain.disconnect(); } catch {}
        }
    };
    currentSource = src;
    currentGain = gain;
    playbackOffset = Math.max(0, Math.min(offset, buffer.duration - 0.01));
    playbackStartTime = audioCtx.currentTime;
    // Fade in
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + FADE_TIME);
    src.start(0, playbackOffset);
    startPlayhead(buffer.duration);
    if (label) log(label, 'log-info');
}

// Store which buffer type is active so click-to-seek replays the right one
let activeBufferType = 'stretched'; // default after processing

function setActiveSource(type) {
    activeBufferType = type;
    document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
    const btnId = { original: 'btnOriginal', resampled: 'btnResampled', stretched: 'btnStretched' }[type];
    if (btnId) document.getElementById(btnId).classList.add('active');
}

window.playOriginal = function() {
    if (!originalBuffer) return;
    setActiveSource('original');
    playBuffer(originalBuffer, 0, 'Playing original...');
};

window.playResampled = function() {
    if (!originalBuffer) return;
    ensureAudioCtx();

    // Crossfade out old source
    const oldSrc = currentSource;
    const oldGain = currentGain;
    if (oldSrc) {
        currentSource = null;
        fadeOutOld(oldSrc, oldGain);
    }
    stopPlayhead();

    const factor = parseFloat(document.getElementById('stretchFactor').value) || 2;
    const gain = audioCtx.createGain();
    gain.connect(audioCtx.destination);
    const src = audioCtx.createBufferSource();
    src.buffer = originalBuffer;
    src.playbackRate.value = 1.0 / factor;
    src.connect(gain);
    src.onended = () => {
        if (currentSource !== src) return;
        if (isLooping()) { window.playResampled(); } else {
            currentSource = null; currentGain = null; stopPlayhead();
            try { gain.disconnect(); } catch {}
        }
    };
    currentSource = src;
    currentGain = gain;
    setActiveSource('resampled');
    playbackOffset = 0;
    playbackStartTime = audioCtx.currentTime;
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + FADE_TIME);
    src.start();
    startPlayhead(originalBuffer.duration * factor);
    log(`Playing resampled (${factor}x slower, pitch drops)...`, 'log-info');
};

window.playStretched = function() {
    if (!stretchedBuffer) return;
    setActiveSource('stretched');
    playBuffer(stretchedBuffer, 0, 'Playing stretched...');
};

window.stopPlayback = function() {
    if (currentSource) {
        const src = currentSource;
        const gain = currentGain;
        currentSource = null;
        currentGain = null;
        if (gain && audioCtx) {
            fadeOutOld(src, gain);
        } else {
            try { src.stop(); } catch {}
        }
    }
    stopPlayhead();
};

// Click-to-seek on waveform — start playing from click position
document.getElementById('waveform').addEventListener('click', (e) => {
    // Determine which buffer to play and its duration
    let buf = null, dur = 0;
    const factor = parseFloat(document.getElementById('stretchFactor').value) || 2;
    if (activeBufferType === 'original' && originalBuffer) {
        buf = originalBuffer; dur = originalBuffer.duration;
    } else if (activeBufferType === 'stretched' && stretchedBuffer) {
        buf = stretchedBuffer; dur = stretchedBuffer.duration;
    } else if (activeBufferType === 'resampled' && originalBuffer) {
        dur = originalBuffer.duration * factor;
    } else if (stretchedBuffer) {
        // fallback: play stretched if nothing explicitly selected
        setActiveSource('stretched');
        buf = stretchedBuffer; dur = stretchedBuffer.duration;
    }
    if (!dur) return;

    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const seekTime = pct * dur;

    if (activeBufferType === 'original') {
        playBuffer(originalBuffer, seekTime);
    } else if (activeBufferType === 'stretched' && stretchedBuffer) {
        playBuffer(stretchedBuffer, seekTime);
    } else if (activeBufferType === 'resampled') {
        ensureAudioCtx();
        // Crossfade out old source
        const oldSrc = currentSource;
        const oldGain = currentGain;
        if (oldSrc) {
            currentSource = null;
            fadeOutOld(oldSrc, oldGain);
        }
        stopPlayhead();

        const factor = parseFloat(document.getElementById('stretchFactor').value) || 2;
        const gain = audioCtx.createGain();
        gain.connect(audioCtx.destination);
        const src = audioCtx.createBufferSource();
        src.buffer = originalBuffer;
        src.playbackRate.value = 1.0 / factor;
        src.connect(gain);
        src.onended = () => {
            if (currentSource !== src) return;
            currentSource = null; currentGain = null; stopPlayhead();
            try { gain.disconnect(); } catch {}
        };
        currentSource = src;
        currentGain = gain;
        const origOffset = seekTime / factor;
        playbackOffset = seekTime;
        playbackStartTime = audioCtx.currentTime;
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + FADE_TIME);
        src.start(0, origOffset);
        startPlayhead(originalBuffer.duration * factor);
    }
});

// ─── Download WAV ────────────────────────────────────────────────────────────
window.downloadWav = function() {
    if (!originalBuffer) return;

    // Determine which audio to download based on active source
    let samples, sampleRate, label;
    const factor = document.getElementById('stretchFactor').value;
    const transform = document.getElementById('transform').value;

    // Short source name from lookup table, or fallback to trimmed filename
    const filePath = document.getElementById('fileSelect').value;
    const pickerFile = document.getElementById('filePicker').files[0];
    let srcName;
    if (!pickerFile && FILE_SHORT_NAMES[filePath]) {
        srcName = FILE_SHORT_NAMES[filePath];
    } else {
        const rawName = pickerFile ? pickerFile.name : (filePath ? filePath.split('/').pop() : 'audio');
        srcName = rawName.replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_|_$/g, '').slice(0, 20);
    }

    if (activeBufferType === 'original' && originalMono) {
        samples = originalMono;
        sampleRate = originalBuffer.sampleRate;
        label = `${srcName}_original`;
    } else if (activeBufferType === 'resampled' && originalMono) {
        // Render resampled audio offline
        const stretchNum = parseFloat(factor);
        const outLen = Math.floor(originalMono.length * stretchNum);
        samples = new Float32Array(outLen);
        for (let i = 0; i < outLen; i++) {
            const srcPos = i / stretchNum;
            const idx = Math.floor(srcPos);
            const frac = srcPos - idx;
            if (idx < originalMono.length - 1) {
                samples[i] = originalMono[idx] * (1 - frac) + originalMono[idx + 1] * frac;
            }
        }
        sampleRate = originalBuffer.sampleRate;
        label = `${srcName}_resampled_${factor}x`;
    } else if (stretchedAudio) {
        samples = stretchedAudio;
        sampleRate = originalBuffer.sampleRate;
        // Build descriptive label from current settings
        if (transform === 'rtpghi') {
            const M = document.getElementById('rtpghiFFTSize').value;
            const hop = document.getElementById('rtpghiHopDiv').value;
            const win = document.getElementById('rtpghiWindow').value;
            const phase = document.getElementById('rtpghiPhaseMode').value;
            const tol = document.getElementById('rtpghiTol').value;
            const gamma = document.getElementById('rtpghiGamma').value;
            label = `${srcName}_rtpghi_${factor}x_M${M}_hop${hop}_${win}_${phase}_tol${tol}_g${gamma}`;
        } else if (transform === 'cqt') {
            const bins = document.getElementById('binsPerOctave').value;
            const minBW = document.getElementById('minBW').value;
            label = `${srcName}_cqt_${factor}x_bins${bins}_bw${minBW}`;
        } else if (transform === 'nsgt') {
            const bins = document.getElementById('binsPerOctave').value;
            label = `${srcName}_nsgt_${factor}x_bins${bins}`;
        } else {
            const w0 = document.getElementById('w0').value;
            const dj = document.getElementById('dj').value;
            label = `${srcName}_cwt_${factor}x_w${w0}_dj${dj}`;
        }
    } else {
        return;
    }

    const numSamples = samples.length;
    const bytesPerSample = 2;
    const dataSize = numSamples * bytesPerSample;
    const buffer = new ArrayBuffer(44 + dataSize);
    const view = new DataView(buffer);

    const writeStr = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };
    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * bytesPerSample, true);
    view.setUint16(32, bytesPerSample, true);
    view.setUint16(34, 16, true);
    writeStr(36, 'data');
    view.setUint32(40, dataSize, true);

    let off = 44;
    for (let i = 0; i < numSamples; i++) {
        const s = Math.max(-1, Math.min(1, samples[i]));
        view.setInt16(off, s * 32767, true);
        off += 2;
    }

    const filename = `${label}.wav`;
    const blob = new Blob([buffer], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    log(`Downloaded: ${filename} (${(buffer.byteLength / 1024 / 1024).toFixed(1)} MB)`, 'log-ok');
};

// ─── DIAGNOSTIC: Two-tone 400Hz + 800Hz ──────────────────────────────────────
window.runDiagnostic = async function() {
    const btn = document.getElementById('diagBtn');
    btn.disabled = true;
    btn.textContent = 'Running diagnostic...';

    const w0 = parseFloat(document.getElementById('w0').value);
    const dj = parseFloat(document.getElementById('dj').value);
    const stretchFactor = parseFloat(document.getElementById('stretchFactor').value);

    try {
        const diagTransform = document.getElementById('transform').value;
        const diagBinsPerOctave = parseInt(document.getElementById('binsPerOctave').value);
        const diagMinBW = parseFloat(document.getElementById('minBW').value);
        logHeader(`DIAGNOSTIC: Two-tone 400Hz + 800Hz (${diagTransform.toUpperCase()}${diagMinBW > 0 ? ` minBW=${diagMinBW}Hz` : ''})`);

        // ── Generate test signal ──
        const SR = 48000;
        const dt = 1.0 / SR;
        const duration = 0.5; // 0.5 seconds — short for fast GPU
        const N = Math.floor(SR * duration);
        const signal = new Float32Array(N);
        for (let i = 0; i < N; i++) {
            const t = i / SR;
            signal[i] = 1.0 * Math.sin(2 * Math.PI * 400 * t)
                       + 0.5 * Math.sin(2 * Math.PI * 800 * t);
        }

        // Verify input signal
        let inputRMS = 0;
        for (let i = 0; i < N; i++) inputRMS += signal[i] * signal[i];
        inputRMS = Math.sqrt(inputRMS / N);
        log(`Input: ${N} samples, ${duration}s, ${SR}Hz, RMS=${inputRMS.toFixed(4)}`, 'log-info');
        // Expected RMS: sqrt(1^2/2 + 0.5^2/2) = sqrt(0.5 + 0.125) = sqrt(0.625) ≈ 0.7906
        log(`  Expected RMS: sqrt(1²/2 + 0.5²/2) = ${Math.sqrt(0.625).toFixed(4)}`, 'log-dim');

        // ── CPU reference FFT (to validate GPU FFT) ──
        logHeader('Stage 0: CPU reference FFT');
        const Npad = nextPow2(N);
        log(`  Npad = ${Npad} (next pow2 of ${N})`, 'log-dim');

        // Naive DFT of first few interesting bins (just for validation)
        const bin400 = Math.round(400 * Npad / SR);
        const bin800 = Math.round(800 * Npad / SR);
        log(`  Expected bin for 400Hz: ${bin400} (actual freq: ${(bin400 * SR / Npad).toFixed(1)}Hz)`, 'log-dim');
        log(`  Expected bin for 800Hz: ${bin800} (actual freq: ${(bin800 * SR / Npad).toFixed(1)}Hz)`, 'log-dim');

        // ── RTPGHI diagnostic (no GPU needed) ──
        if (diagTransform === 'rtpghi') {
            const rtM = parseInt(document.getElementById('rtpghiFFTSize').value);
            const rtHopDiv = parseInt(document.getElementById('rtpghiHopDiv').value);
            const rtWin = document.getElementById('rtpghiWindow').value;
            const rtPhase = document.getElementById('rtpghiPhaseMode').value;
            const rtTol = parseFloat(document.getElementById('rtpghiTol').value);
            const rtGamma = parseFloat(document.getElementById('rtpghiGamma').value);
            logHeader(`RTPGHI Diagnostic (M=${rtM}, hop=M/${rtHopDiv}, win=${rtWin}, phase=${rtPhase}, tol=${rtTol}, γ=${rtGamma})`);

            const stretcher = new RTPGHIStretcher({
                M: rtM, hopDiv: rtHopDiv,
                windowType: rtWin, phaseMode: rtPhase,
                tol: rtTol, gamma: rtGamma
            });
            log(`  bins=${stretcher.bins}, γ=${stretcher.gamma.toFixed(1)}, aSyn=${stretcher.aSyn}`, 'log-info');

            // Round-trip: stretch by 1x should reconstruct original
            log('  Running 1x round-trip (identity test)...', 'log-info');
            const t_rt = performance.now();
            const roundTrip = stretcher.stretch(signal, 1.0);
            const rtMs = performance.now() - t_rt;
            logPerf('1x round-trip', rtMs);

            // Compare — use min length (trimming may differ)
            const compareLen = Math.min(N, roundTrip.length);
            let errSum = 0, sigSum = 0;
            for (let t = 0; t < compareLen; t++) {
                errSum += (roundTrip[t] - signal[t]) ** 2;
                sigSum += signal[t] * signal[t];
            }
            const snr = 10 * Math.log10(sigSum / (errSum + 1e-30));
            log(`  Round-trip SNR: ${snr.toFixed(1)} dB ${snr > 20 ? '(good)' : snr > 10 ? '(fair)' : '(poor)'}`,
                snr > 20 ? 'log-ok' : snr > 10 ? 'log-warn' : 'log-err');
            log(`  Output length: ${roundTrip.length} (input: ${N})`, 'log-dim');

            // Stretch
            logHeader(`RTPGHI ${stretchFactor}x Stretch`);
            const t_str = performance.now();
            const stretched = stretcher.stretch(signal, stretchFactor);
            const strMs = performance.now() - t_str;
            logPerf(`${stretchFactor}x stretch`, strMs);
            log(`  Output: ${stretched.length} samples (${(stretched.length / SR).toFixed(3)}s, expected ~${(duration * stretchFactor).toFixed(3)}s)`, 'log-ok');

            // Frequency analysis of stretched output
            const strNpad = nextPow2(stretched.length);
            function analyzeFreqRTPGHI(sig, npad) {
                const powers = {};
                for (const freq of [200, 400, 800, 1600]) {
                    const bin = Math.round(freq * npad / SR);
                    let re = 0, im = 0;
                    for (let i = 0; i < sig.length; i++) {
                        const angle = -2 * Math.PI * bin * i / npad;
                        re += sig[i] * Math.cos(angle);
                        im += sig[i] * Math.sin(angle);
                    }
                    powers[freq] = Math.sqrt(re * re + im * im) / sig.length;
                }
                return powers;
            }
            const strPowers = analyzeFreqRTPGHI(stretched, strNpad);
            log('  Stretched frequency content:', 'log-info');
            log(`    200Hz:  ${strPowers[200].toFixed(6)}  (should be ~0)`, strPowers[200] < 0.01 ? 'log-ok' : 'log-warn');
            log(`    400Hz:  ${strPowers[400].toFixed(6)}  (should be dominant)`, 'log-info');
            log(`    800Hz:  ${strPowers[800].toFixed(6)}  (should be ~half of 400)`, 'log-info');
            log(`    1600Hz: ${strPowers[1600].toFixed(6)}  (should be ~0)`, strPowers[1600] < 0.01 ? 'log-ok' : 'log-warn');
            if (strPowers[400] > 0.0001) {
                log(`    Ratio 400/800: ${(strPowers[400] / strPowers[800]).toFixed(3)} (expected: ~2.000)`,
                    Math.abs(strPowers[400] / strPowers[800] - 2) < 0.5 ? 'log-ok' : 'log-warn');
            }

            // RMS
            let strRMS = 0, strPeak = 0;
            for (let i = 0; i < stretched.length; i++) {
                strRMS += stretched[i] * stretched[i];
                const a = Math.abs(stretched[i]);
                if (a > strPeak) strPeak = a;
            }
            strRMS = Math.sqrt(strRMS / stretched.length);
            log(`  RMS: ${strRMS.toFixed(4)}, Peak: ${strPeak.toFixed(4)}`, 'log-info');

            // Normalize and setup playback
            if (!audioCtx) audioCtx = new AudioContext();
            originalBuffer = audioCtx.createBuffer(1, N, SR);
            originalBuffer.getChannelData(0).set(signal);
            originalMono = signal;

            // Normalize
            if (strPeak > 0) {
                const g = 0.95 / strPeak;
                for (let i = 0; i < stretched.length; i++) stretched[i] *= g;
            }
            stretchedAudio = stretched;
            stretchedBuffer = audioCtx.createBuffer(1, stretched.length, SR);
            stretchedBuffer.getChannelData(0).set(stretched);

            document.getElementById('playerPanel').style.display = '';
            drawWaveform(document.getElementById('waveform'), stretched);
            setActiveSource('stretched');
            log('RTPGHI diagnostic complete. Ready for playback.', 'log-ok');

            btn.disabled = false;
            btn.textContent = 'Run Diagnostic (400+800Hz)';
            return;
        }

        // ── GPU Init ──
        if (!waveletGPU) {
            waveletGPU = new WaveletGPUCompute();
            await waveletGPU.initialize();
        }
        log('GPU initialized.', 'log-ok');

        // ── NSGT uses simplified diagnostic (round-trip + stretch only) ──
        if (diagTransform === 'nsgt') {
            logHeader('NSGT Round-trip Test');
            const nsgtInfo = generateNSGTBands(SR, nextPow2(N), diagBinsPerOctave);
            log(`  ${nsgtInfo.numBands} bands, ${nsgtInfo.totalCoeffs.toLocaleString()} total coefficients`, 'log-info');
            log(`  ${nsgtInfo.buckets.length} FFT size buckets: ${nsgtInfo.buckets.map(b => `${b.bucketSize}×${b.bandIndices.length}`).join(', ')}`, 'log-dim');

            // Round-trip: stretch by 1x should reconstruct original
            log('  Running 1x round-trip (should reconstruct original)...', 'log-info');
            const roundTrip = await waveletGPU.nsgtStretch(signal, 1.0, { dt, binsPerOctave: diagBinsPerOctave });
            let errSum = 0, sigSum = 0;
            for (let t = 0; t < N; t++) {
                errSum += (roundTrip[t] - signal[t]) ** 2;
                sigSum += signal[t] * signal[t];
            }
            const snr = 10 * Math.log10(sigSum / (errSum + 1e-30));
            log(`  Round-trip SNR: ${snr.toFixed(1)} dB ${snr > 30 ? '(good)' : snr > 15 ? '(fair)' : '(poor)'}`,
                snr > 30 ? 'log-ok' : snr > 15 ? 'log-warn' : 'log-err');

            // Stretch
            logHeader('NSGT Stretch');
            log(`  Running ${stretchFactor}x stretch...`, 'log-info');
            const stretched = await waveletGPU.nsgtStretch(signal, stretchFactor, { dt, binsPerOctave: diagBinsPerOctave });
            log(`  Output: ${stretched.length} samples (${(stretched.length / SR).toFixed(3)}s)`, 'log-ok');

            // Analyze frequency content of stretched signal
            const strNpad = nextPow2(stretched.length);
            function analyzeFreq(sig, npad) {
                const powers = {};
                for (const freq of [200, 400, 800, 1600]) {
                    const bin = Math.round(freq * npad / SR);
                    let re = 0, im = 0;
                    for (let i = 0; i < sig.length; i++) {
                        const angle = -2 * Math.PI * bin * i / npad;
                        re += sig[i] * Math.cos(angle);
                        im += sig[i] * Math.sin(angle);
                    }
                    powers[freq] = (re * re + im * im) / (sig.length * sig.length);
                }
                return powers;
            }
            const strPowers = analyzeFreq(stretched, strNpad);
            log('  Stretched frequency content:', 'log-info');
            log(`    400Hz: ${strPowers[400].toFixed(6)}  (should be dominant)`, 'log-info');
            log(`    800Hz: ${strPowers[800].toFixed(6)}  (should be half of 400)`, 'log-info');
            if (strPowers[400] > 0.0001) {
                log(`    Ratio 400/800: ${(strPowers[400] / strPowers[800]).toFixed(3)} (expected: 2.000)`,
                    Math.abs(strPowers[400] / strPowers[800] - 2) < 0.5 ? 'log-ok' : 'log-warn');
            }

            // Playback
            if (!audioCtx) audioCtx = new AudioContext();
            originalBuffer = audioCtx.createBuffer(1, N, SR);
            originalBuffer.getChannelData(0).set(signal);
            originalMono = signal;
            WaveletGPUCompute.normalize(stretched);
            stretchedAudio = stretched;
            stretchedBuffer = audioCtx.createBuffer(1, stretched.length, SR);
            stretchedBuffer.getChannelData(0).set(stretched);
            document.getElementById('playerPanel').style.display = '';
            drawWaveform(document.getElementById('waveform'), stretched);
            setActiveSource('stretched');
            log('NSGT diagnostic complete. Ready for playback.', 'log-ok');
            return;
        }

        // ── Run diagnostic CWT ──
        logHeader('Stage 1: Forward FFT (GPU)');
        const diag = await waveletGPU.computeCWT_diagnostic(signal, { dt, w0, dj, transform: diagTransform, binsPerOctave: diagBinsPerOctave, minBW: diagMinBW });

        // Analyze FFT output
        const fft = diag.signalFFT; // complex pairs: [re0, im0, re1, im1, ...]
        log(`  FFT buffer: ${fft.length} floats = ${fft.length / 2} complex values`, 'log-dim');

        // Find magnitude at key bins
        function fftMag(bin) {
            const re = fft[bin * 2];
            const im = fft[bin * 2 + 1];
            return Math.sqrt(re * re + im * im);
        }

        const mag400 = fftMag(bin400);
        const mag800 = fftMag(bin800);
        log(`  FFT magnitude at bin ${bin400} (400Hz): ${mag400.toFixed(2)}`, mag400 > 1 ? 'log-ok' : 'log-err');
        log(`  FFT magnitude at bin ${bin800} (800Hz): ${mag800.toFixed(2)}`, mag800 > 1 ? 'log-ok' : 'log-err');
        log(`  Ratio 400/800: ${(mag400 / mag800).toFixed(3)} (expected: 2.000)`, Math.abs(mag400 / mag800 - 2) < 0.1 ? 'log-ok' : 'log-warn');

        // Find top 5 FFT peaks
        const mags = [];
        for (let k = 0; k < diag.halfN; k++) {
            mags.push({ bin: k, freq: k * SR / diag.Npad, mag: fftMag(k) });
        }
        mags.sort((a, b) => b.mag - a.mag);
        log('  Top 5 FFT peaks:', 'log-info');
        for (let i = 0; i < 5; i++) {
            const m = mags[i];
            log(`    bin ${m.bin} = ${m.freq.toFixed(1)}Hz, mag=${m.mag.toFixed(2)}`, 'log-dim');
        }

        // ── Morlet LUT analysis ──
        logHeader('Stage 2: Morlet LUT');
        const scales = diag.scales;
        const halfN = diag.halfN;
        log(`  ${diag.numScales} scales, range: ${scales[0].toFixed(6)} .. ${scales[scales.length-1].toFixed(2)}`, 'log-info');

        // For each scale, the peak frequency is: w0 / (2*pi*s)  ... wait, actually
        // The Morlet peak in frequency domain is at omega = w0/s
        // Corresponding frequency in Hz: f = omega / (2*pi) = w0 / (2*pi*s)
        // Or using Fourier period: T = 4*pi*s / (w0 + sqrt(2+w0^2)), f = 1/T

        // Find which scales correspond to 400Hz and 800Hz
        let bestScale400 = -1, bestScale400Idx = -1, bestDist400 = Infinity;
        let bestScale800 = -1, bestScale800Idx = -1, bestDist800 = Infinity;

        log('  Scale → frequency mapping (fourier period):', 'log-info');
        for (let si = 0; si < scales.length; si++) {
            const s = scales[si];
            const fourierPeriod = (4 * Math.PI * s) / (w0 + Math.sqrt(2 + w0 * w0));
            const freq = 1.0 / fourierPeriod;

            if (Math.abs(freq - 400) < bestDist400) { bestDist400 = Math.abs(freq - 400); bestScale400 = s; bestScale400Idx = si; }
            if (Math.abs(freq - 800) < bestDist800) { bestDist800 = Math.abs(freq - 800); bestScale800 = s; bestScale800Idx = si; }
        }

        log(`  Closest scale to 400Hz: idx=${bestScale400Idx}, s=${bestScale400.toFixed(4)}, dist=${bestDist400.toFixed(1)}Hz`, 'log-ok');
        log(`  Closest scale to 800Hz: idx=${bestScale800Idx}, s=${bestScale800.toFixed(4)}, dist=${bestDist800.toFixed(1)}Hz`, 'log-ok');

        // Check Morlet LUT values at those scales for the right bins
        function lutVal(scaleIdx, bin) {
            return diag.morletLUT[scaleIdx * halfN + bin];
        }

        log(`  Morlet LUT[scale400, bin400] = ${lutVal(bestScale400Idx, bin400).toFixed(6)}`, 'log-dim');
        log(`  Morlet LUT[scale400, bin800] = ${lutVal(bestScale400Idx, bin800).toFixed(6)}`, 'log-dim');
        log(`  Morlet LUT[scale800, bin400] = ${lutVal(bestScale800Idx, bin400).toFixed(6)}`, 'log-dim');
        log(`  Morlet LUT[scale800, bin800] = ${lutVal(bestScale800Idx, bin800).toFixed(6)}`, 'log-dim');

        // Find peak LUT bin for each of these scales
        for (const [label, si] of [['400Hz scale', bestScale400Idx], ['800Hz scale', bestScale800Idx]]) {
            let peakBin = 0, peakVal = 0;
            for (let k = 0; k < halfN; k++) {
                const v = lutVal(si, k);
                if (v > peakVal) { peakVal = v; peakBin = k; }
            }
            log(`  ${label} (idx ${si}): LUT peak at bin ${peakBin} = ${(peakBin * SR / diag.Npad).toFixed(1)}Hz, val=${peakVal.toFixed(4)}`, 'log-info');
        }

        // ── CWT freq domain (after Morlet multiply) ──
        logHeader('Stage 3: Morlet multiply (freq domain CWT)');
        const cwtFreq = diag.cwtFreqDomain; // complex, layout: [scale0_bin0_re, im, bin1_re, im, ..., scale1_...]

        function cwtFreqMag(scaleIdx, bin) {
            const base = scaleIdx * diag.Npad * 2;
            const re = cwtFreq[base + bin * 2];
            const im = cwtFreq[base + bin * 2 + 1];
            return Math.sqrt(re * re + im * im);
        }

        log(`  CWT freq mag at [scale400, bin400]: ${cwtFreqMag(bestScale400Idx, bin400).toFixed(4)}`, 'log-info');
        log(`  CWT freq mag at [scale400, bin800]: ${cwtFreqMag(bestScale400Idx, bin800).toFixed(4)}`, 'log-dim');
        log(`  CWT freq mag at [scale800, bin400]: ${cwtFreqMag(bestScale800Idx, bin400).toFixed(4)}`, 'log-dim');
        log(`  CWT freq mag at [scale800, bin800]: ${cwtFreqMag(bestScale800Idx, bin800).toFixed(4)}`, 'log-info');

        // Check: are negative frequency bins zeroed?
        let negFreqEnergy = 0;
        for (let k = halfN; k < diag.Npad; k++) {
            negFreqEnergy += cwtFreqMag(bestScale400Idx, k) ** 2;
        }
        log(`  Negative freq energy (scale400): ${negFreqEnergy.toFixed(6)} (should be ~0)`, negFreqEnergy < 0.001 ? 'log-ok' : 'log-warn');

        // ── CWT time domain (after inverse FFT) ──
        logHeader('Stage 4: CWT time domain (after IFFT)');
        const cwtTime = diag.cwtTimeDomain; // complex, layout: [scale0_t0_re, im, t0_re, im, ..., scale1_...]

        function cwtTimeSample(scaleIdx, timeIdx) {
            const base = scaleIdx * diag.Npad * 2;
            return {
                re: cwtTime[base + timeIdx * 2],
                im: cwtTime[base + timeIdx * 2 + 1]
            };
        }

        // RMS of real part at key scales (over the non-padded region)
        for (const [label, si] of [['400Hz scale', bestScale400Idx], ['800Hz scale', bestScale800Idx]]) {
            let rmsRe = 0, rmsIm = 0, rmsMag = 0;
            for (let t = 0; t < N; t++) {
                const c = cwtTimeSample(si, t);
                rmsRe += c.re * c.re;
                rmsIm += c.im * c.im;
                rmsMag += c.re * c.re + c.im * c.im;
            }
            rmsRe = Math.sqrt(rmsRe / N);
            rmsIm = Math.sqrt(rmsIm / N);
            rmsMag = Math.sqrt(rmsMag / N);
            log(`  ${label} (idx ${si}): RMS real=${rmsRe.toFixed(6)}, imag=${rmsIm.toFixed(6)}, |z|=${rmsMag.toFixed(6)}`, 'log-info');
        }

        // Power across ALL scales (which scales have signal?)
        log('  Power per scale (top 10):', 'log-info');
        const scalePowers = [];
        for (let si = 0; si < diag.numScales; si++) {
            let power = 0;
            for (let t = 0; t < N; t++) {
                const c = cwtTimeSample(si, t);
                power += c.re * c.re + c.im * c.im;
            }
            const s = scales[si];
            const fourierPeriod = (4 * Math.PI * s) / (w0 + Math.sqrt(2 + w0 * w0));
            const freq = 1.0 / fourierPeriod;
            scalePowers.push({ si, power: power / N, freq });
        }
        scalePowers.sort((a, b) => b.power - a.power);
        for (let i = 0; i < Math.min(10, scalePowers.length); i++) {
            const sp = scalePowers[i];
            log(`    scale idx ${sp.si}: freq=${sp.freq.toFixed(1)}Hz, power=${sp.power.toFixed(6)}`, 'log-dim');
        }

        // ── ICWT reconstruction (CPU, stretch=1x) ──
        logHeader('Stage 5: CPU ICWT (stretch=1x, reference)');
        // Python ICWT: x = dj * sqrt(dt) * sum(coefficients.real, axis=scales)
        const icwtCPU = new Float32Array(N);
        for (let si = 0; si < diag.numScales; si++) {
            const base = si * diag.Npad * 2;
            for (let t = 0; t < N; t++) {
                icwtCPU[t] += cwtTime[base + t * 2]; // sum of .real across scales
            }
        }
        const diagEffDj = diagTransform === 'cqt'
            ? 0.776 * 0.7511255 / Math.sqrt(dt)
            : dj;
        const icwtScale = diagEffDj * Math.sqrt(dt) / (0.776 * 0.7511255);
        for (let t = 0; t < N; t++) icwtCPU[t] *= icwtScale;

        // Compare to original
        let errSum = 0, sigSum = 0;
        for (let t = 0; t < N; t++) {
            errSum += (icwtCPU[t] - signal[t]) ** 2;
            sigSum += signal[t] * signal[t];
        }
        const snr = 10 * Math.log10(sigSum / errSum);

        let icwtRMS = 0, icwtPeak = 0;
        for (let t = 0; t < N; t++) {
            icwtRMS += icwtCPU[t] * icwtCPU[t];
            const a = Math.abs(icwtCPU[t]);
            if (a > icwtPeak) icwtPeak = a;
        }
        icwtRMS = Math.sqrt(icwtRMS / N);
        log(`  ICWT RMS: ${icwtRMS.toFixed(6)}, Peak: ${icwtPeak.toFixed(6)}`, 'log-info');
        log(`  Original RMS: ${inputRMS.toFixed(6)}`, 'log-dim');
        log(`  Ratio ICWT/Original RMS: ${(icwtRMS / inputRMS).toFixed(4)}`, 'log-info');
        log(`  Reconstruction SNR: ${snr.toFixed(1)} dB`, snr > 20 ? 'log-ok' : 'log-err');

        // Measure frequency content of ICWT output (autocorrelation or simple DFT at 400 & 800)
        let pow400 = 0, pow800 = 0;
        for (let t = 0; t < N; t++) {
            const tSec = t / SR;
            pow400 += icwtCPU[t] * Math.sin(2 * Math.PI * 400 * tSec);
            pow800 += icwtCPU[t] * Math.sin(2 * Math.PI * 800 * tSec);
        }
        pow400 = Math.abs(pow400) / N * 2;
        pow800 = Math.abs(pow800) / N * 2;
        log(`  Frequency content: 400Hz amplitude=${pow400.toFixed(4)}, 800Hz amplitude=${pow800.toFixed(4)}`, 'log-info');
        log(`  Ratio 400/800: ${(pow400 / pow800).toFixed(3)} (expected: 2.000)`, Math.abs(pow400 / pow800 - 2) < 0.3 ? 'log-ok' : 'log-warn');

        // ── GPU Stretch ──
        logHeader('Stage 6: GPU Stretch');
        const diagInterpMode = parseInt(document.getElementById('interpMode').value);
        const diagPhaseMode = document.getElementById('phaseMode').value;
        const stretched = diagPhaseMode === 'accumulate'
            ? await waveletGPU.stretchAudioCPU(stretchFactor, {})
            : await waveletGPU.stretchAudio(stretchFactor, { interpMode: diagInterpMode });
        let strRMS = 0, strPeak = 0, nanCount = 0, infCount = 0;
        let firstNanIdx = -1;
        for (let i = 0; i < stretched.length; i++) {
            const v = stretched[i];
            if (isNaN(v)) { nanCount++; if (firstNanIdx < 0) firstNanIdx = i; continue; }
            if (!isFinite(v)) { infCount++; continue; }
            strRMS += v * v;
            const a = Math.abs(v);
            if (a > strPeak) strPeak = a;
        }
        const validCount = stretched.length - nanCount - infCount;
        strRMS = Math.sqrt(strRMS / validCount);
        log(`  Stretched: ${stretched.length} samples, RMS=${strRMS.toFixed(6)}, Peak=${strPeak.toFixed(6)}`, 'log-info');
        if (nanCount > 0) log(`  NaN samples: ${nanCount} (first at idx ${firstNanIdx}, ${(firstNanIdx / SR).toFixed(4)}s)`, 'log-err');
        if (infCount > 0) log(`  Inf samples: ${infCount}`, 'log-err');

        // Frequency content of stretched output (measure at 400 & 800 Hz)
        const strSR = SR; // same sample rate
        let strPow400 = 0, strPow800 = 0, strPow200 = 0, strPow1600 = 0;
        const strN = Math.min(stretched.length, SR * 2); // analyze up to 2 seconds
        for (let t = 0; t < strN; t++) {
            const tSec = t / strSR;
            strPow400 += stretched[t] * Math.sin(2 * Math.PI * 400 * tSec);
            strPow800 += stretched[t] * Math.sin(2 * Math.PI * 800 * tSec);
            strPow200 += stretched[t] * Math.sin(2 * Math.PI * 200 * tSec);
            strPow1600 += stretched[t] * Math.sin(2 * Math.PI * 1600 * tSec);
        }
        strPow400 = Math.abs(strPow400) / strN * 2;
        strPow800 = Math.abs(strPow800) / strN * 2;
        strPow200 = Math.abs(strPow200) / strN * 2;
        strPow1600 = Math.abs(strPow1600) / strN * 2;

        log('  Stretched frequency content:', 'log-info');
        log(`    200Hz:  ${strPow200.toFixed(6)}  (should be ~0 unless shifted)`, strPow200 < 0.01 ? 'log-ok' : 'log-warn');
        log(`    400Hz:  ${strPow400.toFixed(6)}  (should be dominant)`, 'log-info');
        log(`    800Hz:  ${strPow800.toFixed(6)}  (should be half of 400)`, 'log-info');
        log(`    1600Hz: ${strPow1600.toFixed(6)}  (should be ~0 unless shifted)`, strPow1600 < 0.01 ? 'log-ok' : 'log-warn');
        if (strPow400 > 0.0001) {
            log(`    Ratio 400/800: ${(strPow400 / strPow800).toFixed(3)} (expected: 2.000)`, Math.abs(strPow400 / strPow800 - 2) < 0.5 ? 'log-ok' : 'log-warn');
        }

        // ── Playback setup ──
        if (!audioCtx) audioCtx = new AudioContext();
        // Store original as AudioBuffer for playback
        originalBuffer = audioCtx.createBuffer(1, N, SR);
        originalBuffer.getChannelData(0).set(signal);
        originalMono = signal;

        // Normalize and store stretched
        WaveletGPUCompute.normalize(stretched);
        stretchedAudio = stretched;
        stretchedBuffer = audioCtx.createBuffer(1, stretched.length, SR);
        stretchedBuffer.getChannelData(0).set(stretched);

        document.getElementById('playerPanel').style.display = '';
        drawWaveform(document.getElementById('waveform'), stretched);

        logHeader('DIAGNOSTIC COMPLETE');
        log('Use Original/Stretched buttons to A/B listen.', 'log-ok');

    } catch (err) {
        log(`DIAGNOSTIC ERROR: ${err.message}`, 'log-err');
        log(err.stack || '', 'log-dim');
        console.error(err);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Run Diagnostic (400+800Hz)';
    }
};

function nextPow2(n) { let p = 1; while (p < n) p <<= 1; return p; }

// ─── Reset loaded audio when file select changes ────────────────────────────
document.getElementById('fileSelect').addEventListener('change', () => {
    originalBuffer = null;
    originalMono = null;
    stretchedAudio = null;
    stretchedBuffer = null;
    document.getElementById('statsPanel').style.display = 'none';
    document.getElementById('playerPanel').style.display = 'none';
});

// ─── Transform selector: show/hide CWT vs CQT/NSGT controls ─────────────────
document.getElementById('transform').addEventListener('change', (e) => {
    const val = e.target.value;
    document.getElementById('cwtControls').style.display = val === 'cwt' ? '' : 'none';
    document.getElementById('cqtControls').style.display = (val === 'cqt' || val === 'nsgt') ? '' : 'none';
    document.getElementById('rtpghiRow1').style.display = val === 'rtpghi' ? '' : 'none';
    document.getElementById('rtpghiRow2').style.display = val === 'rtpghi' ? '' : 'none';
    document.getElementById('gpuParamsRow').style.display = val === 'rtpghi' ? 'none' : '';
    // Hide minBW for NSGT (not applicable — NSGT has inherent per-band resolution)
    document.getElementById('minBWLabel').style.display = val === 'cqt' ? '' : 'none';
    // Set CQT-friendly defaults when switching to CQT
    if (val === 'cqt') {
        document.getElementById('binsPerOctave').value = '24';
        document.getElementById('minBW').value = '100';
    }
});

// ─── Phase rand slider label ─────────────────────────────────────────────────
document.getElementById('phaseRand').addEventListener('input', (e) => {
    document.getElementById('phaseRandVal').textContent = `${Math.round(e.target.value * 100)}%`;
});

// ─── Auto-rerun on parameter change ──────────────────────────────────────────
let autoRunTimer = null;
let isRunning = false;

function scheduleAutoRun() {
    // Only auto-run if we've already processed audio once
    if (!originalMono || isRunning) return;
    clearTimeout(autoRunTimer);
    autoRunTimer = setTimeout(() => {
        window.runStretch();
    }, 150); // debounce rapid changes
}

// All parameter dropdowns that should trigger re-render
['transform', 'stretchFactor', 'w0', 'dj', 'binsPerOctave', 'minBW',
 'interpMode', 'phaseMode', 'rtpghiFFTSize', 'rtpghiHopDiv',
 'rtpghiWindow', 'rtpghiPhaseMode', 'rtpghiTol', 'rtpghiGamma'
].forEach(id => {
    document.getElementById(id).addEventListener('change', scheduleAutoRun);
});
document.getElementById('phaseRand').addEventListener('input', scheduleAutoRun);

// ─── Enter key runs the stretch ──────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !document.getElementById('runBtn').disabled) {
        window.runStretch();
    }
    if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT' && e.target.tagName !== 'BUTTON') {
        e.preventDefault();
        if (currentSource) {
            window.stopPlayback();
        } else {
            // Play whichever source is active
            if (activeBufferType === 'original' && originalBuffer) window.playOriginal();
            else if (activeBufferType === 'resampled' && originalBuffer) window.playResampled();
            else if (stretchedBuffer) window.playStretched();
        }
    }
});
</script>
