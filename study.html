<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Study — spaceweather.now.audio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔬</text></svg>">
    <script>
        // Auto-refresh when a new version is deployed
        fetch('version.json?t=' + Date.now()).then(r => r.json()).then(d => {
            var key = '_app_version', prev = localStorage.getItem(key);
            localStorage.setItem(key, d.version);
            if (prev && prev !== d.version) location.reload();
        }).catch(function(){});
    </script>
    <script>
        // ── Study slug from URL path: /study/emic-pilot → "emic-pilot" ──
        (function() {
            var match = window.location.pathname.match(/\/study\/([^/?#]+)/);
            var params = new URLSearchParams(window.location.search);
            window.__STUDY_SLUG = match ? match[1] : params.get('s') || params.get('study') || null;
            if (!window.__STUDY_SLUG) {
                document.title = 'Study Not Found';
            }
            // Swap favicon based on mode
            var mode = params.get('mode');
            if (mode === 'test' || mode === 'preview') {
                var emoji = mode === 'test' ? '🧪' : '👁';
                var link = document.querySelector('link[rel="icon"]');
                if (link) link.href = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>' + emoji + '</text></svg>';
            }
        })();

        // Force EMIC_STUDY mode so main.js initializes the right infrastructure
        window.__STUDY_MODE = true;
        // study-flow.js drives the entire workflow — skip initializeEmicStudyMode()
        window.__STUDY_FLOW_MANAGED = true;
        window.__DEFAULT_TILE_CHUNK = '3600';

        // Placeholder config — study-flow.js will populate from D1
        window.__STUDY_CONFIG = {
            spacecraft: 'GOES',
            dataset: 'DN_MAGN-L2-HIRES_G16',
            startTime: '2022-08-17T00:00:00.000Z',
            endTime: '2022-08-24T00:00:00.000Z'
        };

        // Apply saved colormap accent colors BEFORE stylesheet loads to prevent flash
        (function() {
            var accents = {
                solar:   { color: '#ff6b35', rgb: '255, 107, 53', bg: 'linear-gradient(135deg, #1a0f0a, #100805)', pageBg: '#3a2b2b' },
                turbo:   { color: '#23a6d5', rgb: '35, 166, 213', bg: 'linear-gradient(135deg, #1a2830, #0f1a20)', pageBg: '#2b303a' },
                viridis: { color: '#21918c', rgb: '33, 145, 140', bg: 'linear-gradient(135deg, #1e2830, #121c22)', pageBg: '#2b3535' },
                jet:     { color: '#5dadec', rgb: '93, 173, 236', bg: 'linear-gradient(135deg, #1e2438, #121820)', pageBg: '#2b2b3a' },
                aurora:  { color: '#9b4dca', rgb: '155, 77, 202', bg: 'linear-gradient(135deg, #2a2540, #1a1428)', pageBg: '#332b3a' },
                plasma:  { color: '#22d3ee', rgb: '34, 211, 238', bg: 'linear-gradient(135deg, #1c2530, #101820)', pageBg: '#2b333a' },
                inferno: { color: '#808080', rgb: '128, 128, 128', bg: 'linear-gradient(135deg, #252a40, #161a28)', pageBg: '#2b2b3a' }
            };
            var saved = localStorage.getItem('colormap');
            var a = accents[saved] || accents.inferno;
            var r = document.documentElement;
            r.style.setProperty('--accent-color', a.color);
            r.style.setProperty('--accent-rgb', a.rgb);
            r.style.setProperty('--accent-glow', 'rgba(' + a.rgb + ', 0.25)');
            r.style.setProperty('--accent-border', 'rgba(' + a.rgb + ', 0.2)');
            r.style.setProperty('--accent-soft', 'rgba(' + a.rgb + ', 0.12)');
            r.style.setProperty('--accent-bg', a.bg);
            r.style.setProperty('--page-bg', a.pageBg);
            r.style.background = a.pageBg;
        })();

        // Hide advanced-only panels BEFORE paint
        (function() {
            var h2 = window.location.hostname;
            var isLocalEnv = h2 === 'localhost' || h2 === '127.0.0.1' || h2 === '' || window.location.protocol === 'file:';
            if (isLocalEnv) {
                var savedAdv = localStorage.getItem('study_advanced_mode');
                if (savedAdv === 'true' || savedAdv === null) {
                    document.documentElement.setAttribute('data-advanced', '');
                }
            }
            if (isLocalEnv) {
                document.documentElement.setAttribute('data-admin', '');
            }
        })();
    </script>

    <!-- Stretch/Speed button toggles -->
    <script>
        (function() {
            document.querySelectorAll('.study-btn[data-stretch]').forEach(function(btn) {
                btn.addEventListener('click', async function() {
                    document.querySelectorAll('.study-btn[data-stretch]').forEach(function(b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                    var stretchMap = { resample: 'resample', granular: 'granular', paulstretch: 'paul', wavelet: 'wavelet' };
                    var algorithm = stretchMap[btn.getAttribute('data-stretch')] || 'paul';
                    var { switchStretchAlgorithm } = await import('./js/audio-player.js');
                    switchStretchAlgorithm(algorithm);
                });
            });
            document.querySelectorAll('.study-btn[data-speed]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.study-btn[data-speed]').forEach(function(b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                    var speed = parseFloat(btn.getAttribute('data-speed'));
                    var slider = document.getElementById('playbackSpeed');
                    if (!slider) return;
                    var sliderValue;
                    if (speed <= 1.0) { sliderValue = 667 * Math.log10(speed / 0.1); }
                    else { sliderValue = 667 + 333 * Math.log(speed) / Math.log(15); }
                    slider.value = Math.round(sliderValue);
                    slider.dispatchEvent(new Event('input'));
                });
            });
        })();
    </script>

    <!-- Responsive spectrogram height: fill viewport so bottom panel sits at window edge -->
    <script>
    (function() {
        const MIN_HEIGHT = 250;
        const MAX_HEIGHT = 1200;
        let rafPending = false;
        let fitting = false;

        function fitSpectrogram() {
            if (fitting) return;
            fitting = true;

            const spec = document.getElementById('spectrogram');
            if (!spec) { fitting = false; return; }

            // Bottom anchor: questionnaires panel if visible, else the viz panel
            const qPanel = document.getElementById('questionnairesPanel');
            const vizPanel = spec.closest('.panel-visualization');
            const anchor = (qPanel && qPanel.offsetHeight > 0) ? qPanel : vizPanel;
            if (!anchor) { fitting = false; return; }

            // How far the anchor's bottom is from the viewport bottom
            const bodyPadBottom = parseFloat(getComputedStyle(document.body).paddingBottom) || 0;
            const anchorRect = anchor.getBoundingClientRect();
            const gap = window.innerHeight - anchorRect.bottom - bodyPadBottom;

            // Adjust spectrogram by the gap (positive = room to grow, negative = overflowing)
            const currentH = spec.offsetHeight;
            const newH = Math.round(Math.min(MAX_HEIGHT, Math.max(MIN_HEIGHT, currentH + gap)));

            if (newH !== currentH) {
                spec.style.setProperty('--spec-height', newH + 'px');
                requestAnimationFrame(() => window.dispatchEvent(new Event('resize')));
            }

            fitting = false;
        }

        fitSpectrogram();
        window.addEventListener('load', fitSpectrogram);
        window.addEventListener('resize', () => {
            if (rafPending || fitting) return;
            rafPending = true;
            requestAnimationFrame(() => { rafPending = false; fitSpectrogram(); });
        });

        // Re-fit when questionnaires panel toggles visibility
        const observer = new MutationObserver(() => {
            if (rafPending || fitting) return;
            rafPending = true;
            requestAnimationFrame(() => { rafPending = false; fitSpectrogram(); });
        });
        const qp = document.getElementById('questionnairesPanel');
        if (qp) observer.observe(qp, { attributes: true, attributeFilter: ['style'] });
    })();
    </script>
