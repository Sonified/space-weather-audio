    <script>
        // Auto-refresh when a new version is deployed
        fetch('version.json?t=' + Date.now()).then(r => r.json()).then(d => {
            var key = '_app_version', prev = localStorage.getItem(key);
            localStorage.setItem(key, d.version);
            if (prev && prev !== d.version) location.reload();
        }).catch(function(){});
    </script>
    <script>
        // Force EMIC_STUDY mode before any modules load
        window.__EMIC_STUDY_MODE = true;
        window.__DEFAULT_TILE_CHUNK = '3600'; // 1 hr for GOES 7-day data (4x faster, same visual quality)

        // Single source of truth for EMIC study time range
        window.__EMIC_CONFIG = {
            spacecraft: 'GOES',
            dataset: 'DN_MAGN-L2-HIRES_G16',
            startTime: '2022-08-17T00:00:00.000Z',
            endTime: '2022-08-24T00:00:00.000Z'
        };

        // Apply saved colormap accent colors BEFORE stylesheet loads to prevent flash
        (function() {
            var accents = {
                solar:   { color: '#ff6b35', rgb: '255, 107, 53', bg: 'linear-gradient(135deg, #1a0f0a, #100805)', pageBg: '#3a2b2b' },
                turbo:   { color: '#23a6d5', rgb: '35, 166, 213', bg: 'linear-gradient(135deg, #1a2830, #0f1a20)', pageBg: '#2b303a' },
                viridis: { color: '#21918c', rgb: '33, 145, 140', bg: 'linear-gradient(135deg, #1e2830, #121c22)', pageBg: '#2b3535' },
                jet:     { color: '#5dadec', rgb: '93, 173, 236', bg: 'linear-gradient(135deg, #1e2438, #121820)', pageBg: '#2b2b3a' },
                aurora:  { color: '#9b4dca', rgb: '155, 77, 202', bg: 'linear-gradient(135deg, #2a2540, #1a1428)', pageBg: '#332b3a' },
                plasma:  { color: '#22d3ee', rgb: '34, 211, 238', bg: 'linear-gradient(135deg, #1c2530, #101820)', pageBg: '#2b333a' },
                inferno: { color: '#808080', rgb: '128, 128, 128', bg: 'linear-gradient(135deg, #252a40, #161a28)', pageBg: '#2b2b3a' }
            };
            var saved = localStorage.getItem('colormap');
            var a = accents[saved] || accents.inferno;
            var r = document.documentElement;
            r.style.setProperty('--accent-color', a.color);
            r.style.setProperty('--accent-rgb', a.rgb);
            r.style.setProperty('--accent-glow', 'rgba(' + a.rgb + ', 0.25)');
            r.style.setProperty('--accent-border', 'rgba(' + a.rgb + ', 0.2)');
            r.style.setProperty('--accent-soft', 'rgba(' + a.rgb + ', 0.12)');
            r.style.setProperty('--accent-bg', a.bg);
            r.style.setProperty('--page-bg', a.pageBg);
            r.style.background = a.pageBg;
        })();

        // Hide advanced-only panels BEFORE paint to prevent flash
        // Default = production (no data-advanced attribute = panels hidden via CSS)
        // Only add data-advanced if user previously toggled it on
        (function() {
            if (localStorage.getItem('emic_advanced_mode') === 'true') {
                document.documentElement.setAttribute('data-advanced', '');
            }
            // Admin unlock: localhost or persisted unlock — show admin buttons immediately
            var h = window.location.hostname;
            var isLocal = h === 'localhost' || h === '127.0.0.1' || h === '' || window.location.protocol === 'file:';
            if (isLocal || localStorage.getItem('admin_unlocked') === 'true') {
                document.documentElement.setAttribute('data-admin', '');
            }
        })();
    </script>

    <!-- EMIC Study: IndexedDB caching layer for hardcoded GOES-16 data -->
    <script>
        // EMIC-specific IndexedDB cache (emic-study-cache / audio-data)
        // Wraps the normal fetch pipeline with a persistent local cache
        window.__emicCache = {
            DB_NAME: 'emic-study-cache',
            STORE_NAME: 'audio-data',
            _getKey: function() {
                var c = window.__EMIC_CONFIG;
                return c.dataset + '_' + c.startTime + '_' + c.endTime + '_b_gse';
            },
            openDB: function() {
                var self = this;
                return new Promise(function(resolve, reject) {
                    var req = indexedDB.open(self.DB_NAME, 1);
                    req.onupgradeneeded = function(e) {
                        e.target.result.createObjectStore(self.STORE_NAME);
                    };
                    req.onsuccess = function(e) { resolve(e.target.result); };
                    req.onerror = function(e) { reject(e.target.error); };
                });
            },
            get: async function() {
                try {
                    var db = await this.openDB();
                    return new Promise(function(resolve, reject) {
                        var tx = db.transaction('audio-data', 'readonly');
                        var req = tx.objectStore('audio-data').get(window.__emicCache._getKey());
                        req.onsuccess = function() { resolve(req.result || null); };
                        req.onerror = function() { resolve(null); };
                    });
                } catch(e) { return null; }
            },
            put: async function(blob) {
                try {
                    var db = await this.openDB();
                    return new Promise(function(resolve, reject) {
                        var tx = db.transaction('audio-data', 'readwrite');
                        tx.objectStore('audio-data').put(blob, window.__emicCache._getKey());
                        tx.oncomplete = function() { resolve(); };
                        tx.onerror = function() { resolve(); };
                    });
                } catch(e) { /* ignore */ }
            }
        };
    </script>

    <!-- EMIC Study: Hook fetch button for IndexedDB caching + status updates -->
    <script type="module">
        if (window.__EMIC_STUDY_MODE) {
            // Wait for DOM + main.js to initialize
            const startBtn = document.getElementById('startBtn');
            const statusEl = document.getElementById('status');
            if (startBtn) {
                // Add our handler BEFORE main.js's handler (capture phase)
                startBtn.addEventListener('click', async function(e) {
                    if (!statusEl) return;
                    // Check EMIC IndexedDB cache first
                    const cached = await window.__emicCache.get();
                    const silent = document.getElementById('silentDownload')?.checked;
                    if (cached) {
                        if (!silent) { statusEl.textContent = '📦 Loading from cache...'; statusEl.className = 'status info'; }
                        if (window.pm?.data) console.log('🔬 EMIC: Found data in IndexedDB cache');
                    } else {
                        if (!silent) { statusEl.textContent = '📡 Fetching GOES-16 magnetometer data from CDAWeb...'; statusEl.className = 'status loading'; }
                        if (window.pm?.data) console.log('🔬 EMIC: No cache, will fetch from CDAWeb');
                    }
                }, true); // capture phase = runs first

                // After fetch completes, store in EMIC cache
                // Listen for the worklet data-complete which signals successful load
                const origAddEventListener = startBtn.addEventListener;
                window.addEventListener('componentsReady', async function() {
                    // Data loaded successfully - cache it
                    try {
                        const { getAudioData } = await import('./js/cdaweb-cache.js');
                        const c = window.__EMIC_CONFIG;
                        const spacecraft = c.dataset.includes('G16') ? 'GOES-16' : 'GOES-19';
                        const entry = await getAudioData(spacecraft, c.dataset, c.startTime, c.endTime);
                        if (entry && entry.wavBlob) {
                            await window.__emicCache.put(entry.wavBlob);
                            console.log('🔬 EMIC: Cached WAV in IndexedDB');
                        }
                    } catch(e) { console.warn('EMIC cache store failed:', e); }
                });
            }
        }
    </script>

        (function() {

            var input = document.getElementById('emicParticipantId');
            if (pid && input) {
                input.value = pid;

                input.removeAttribute('readonly');
                input.placeholder = 'Enter your ID...';
            }
            
            // Wire up stretch/speed button toggles
            document.querySelectorAll('.emic-btn[data-stretch]').forEach(function(btn) {
                btn.addEventListener('click', async function() {
                    document.querySelectorAll('.emic-btn[data-stretch]').forEach(function(b) { b.classList.remove('active'); });
                    btn.classList.add('active');

                    // Map button data-stretch values to algorithm names used by audio-player
                    var stretchMap = { resample: 'resample', granular: 'granular', paulstretch: 'paul', wavelet: 'wavelet' };
                    var algorithm = stretchMap[btn.getAttribute('data-stretch')] || 'paul';
                    var { switchStretchAlgorithm } = await import('./js/audio-player.js');
                    switchStretchAlgorithm(algorithm);
                });
            });
            document.querySelectorAll('.emic-btn[data-speed]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.emic-btn[data-speed]').forEach(function(b) { b.classList.remove('active'); });
                    btn.classList.add('active');

                    var speed = parseFloat(btn.getAttribute('data-speed'));
                    var slider = document.getElementById('playbackSpeed');
                    if (!slider) return;

                    // Reverse the logarithmic mapping: speed -> slider value
                    var sliderValue;
                    if (speed <= 1.0) {
                        sliderValue = 667 * Math.log10(speed / 0.1);
                    } else {
                        sliderValue = 667 + 333 * Math.log(speed) / Math.log(15);
                    }
                    slider.value = Math.round(sliderValue);
                    slider.dispatchEvent(new Event('input'));
                });
            });
        })();
    </script>

    <!-- Responsive spectrogram height: fill viewport so bottom panel sits at window edge -->
    <script>
    (function() {
        const MIN_HEIGHT = 250;
        const MAX_HEIGHT = 1200;
        let rafPending = false;
        let fitting = false;

        function fitSpectrogram() {
            if (fitting) return;
            fitting = true;

            const spec = document.getElementById('spectrogram');
            if (!spec) { fitting = false; return; }

            // Bottom anchor: questionnaires panel if visible, else the viz panel
            const qPanel = document.getElementById('questionnairesPanel');
            const vizPanel = spec.closest('.panel-visualization');
            const anchor = (qPanel && qPanel.offsetHeight > 0) ? qPanel : vizPanel;
            if (!anchor) { fitting = false; return; }

            // How far the anchor's bottom is from the viewport bottom
            const bodyPadBottom = parseFloat(getComputedStyle(document.body).paddingBottom) || 0;
            const anchorRect = anchor.getBoundingClientRect();
            const gap = window.innerHeight - anchorRect.bottom - bodyPadBottom;

            // Adjust spectrogram by the gap (positive = room to grow, negative = overflowing)
            const currentH = spec.offsetHeight;
            const newH = Math.round(Math.min(MAX_HEIGHT, Math.max(MIN_HEIGHT, currentH + gap)));

            if (newH !== currentH) {
                spec.style.setProperty('--spec-height', newH + 'px');
                // Defer resize dispatch to next frame so layout settles first
                // (ResizeObserver is RAF-debounced so no feedback loop)
                requestAnimationFrame(() => window.dispatchEvent(new Event('resize')));
            }

            fitting = false;
        }

        // Run immediately — this script is at the bottom of the body so all
        // DOM elements above it exist. Running now prevents the first-paint jump.
        fitSpectrogram();
        window.addEventListener('load', fitSpectrogram);  // re-fit after all resources
        window.addEventListener('resize', () => {
            if (rafPending || fitting) return;
            rafPending = true;
            requestAnimationFrame(() => { rafPending = false; fitSpectrogram(); });
        });

        // Re-fit when questionnaires panel toggles visibility (debounced via RAF)
        const observer = new MutationObserver(() => {
            if (rafPending || fitting) return;
            rafPending = true;
            requestAnimationFrame(() => { rafPending = false; fitSpectrogram(); });
        });
        const qp = document.getElementById('questionnairesPanel');
        if (qp) observer.observe(qp, { attributes: true, attributeFilter: ['style'] });
    })();
    </script>

    <!-- Download Audio buttons (Current View / Current Component / All Components) -->
    <script type="module">
    (function() {
        const dlViewBtn = document.getElementById('dlCurrentViewBtn');
        const dlCompBtn = document.getElementById('dlCurrentComponentBtn');
        const dlAllBtn = document.getElementById('dlAllComponentsBtn');
        const dlAudioGroup = document.getElementById('dlAudioGroup');
        if (!dlViewBtn) return;

        // Show download buttons once audio is available
        window.addEventListener('componentsReady', () => {
            if (dlAudioGroup) dlAudioGroup.style.display = 'flex';
        });

        function createWAVBlob(samples, sampleRate) {
            const bytesPerSample = 2;
            const dataSize = samples.length * bytesPerSample;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);
            let o = 0;
            const ws = (s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); o += s.length; };
            const u32 = (v) => { view.setUint32(o, v, true); o += 4; };
            const u16 = (v) => { view.setUint16(o, v, true); o += 2; };
            ws('RIFF'); u32(36 + dataSize); ws('WAVE');
            ws('fmt '); u32(16); u16(1); u16(1);
            u32(sampleRate); u32(sampleRate * 2); u16(2); u16(16);
            ws('data'); u32(dataSize);
            for (let i = 0; i < samples.length; i++) {
                const s = Math.max(-1, Math.min(1, samples[i]));
                view.setInt16(o, Math.round(s * 32767), true);
                o += 2;
            }
            return new Blob([buffer], { type: 'audio/wav' });
        }

        function triggerDownload(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function buildFilename(suffix) {
            const c = window.__EMIC_CONFIG || {};
            const sc = c.spacecraft || 'GOES';
            const ds = (c.dataset || 'MAG').replace(/[^a-zA-Z0-9_-]/g, '');
            return `${sc}_${ds}_${suffix}.wav`;
        }

        // Current View — slice samples to the visible viewport
        dlViewBtn.addEventListener('click', async () => {
            const State = await import('./js/audio-state.js');
            const { zoomState } = await import('./js/zoom-state.js');

            if (!State.getCompleteSamplesLength()) {
                alert('No audio data loaded. Please fetch data first.');
                return;
            }

            const startSec = zoomState.timestampToSeconds(zoomState.currentViewStartTime);
            const endSec = zoomState.timestampToSeconds(zoomState.currentViewEndTime);
            const sr = 44100;
            const startSample = Math.max(0, Math.floor(startSec * sr));
            const endSample = Math.min(State.getCompleteSamplesLength(), Math.ceil(endSec * sr));

            if (endSample <= startSample) {
                alert('Current view range is empty.');
                return;
            }

            dlViewBtn.textContent = 'Exporting...';
            dlViewBtn.disabled = true;
            try {
                const samples = State.getCompleteSamplesSlice(startSample, endSample);
                if (!samples) { alert('Could not read audio samples.'); return; }

                // Short fade in/out to avoid clicks at edges
                const fadeSamples = Math.min(Math.floor(sr * 0.02), Math.floor(samples.length / 4)); // 20ms or 1/4 of clip
                for (let i = 0; i < fadeSamples; i++) {
                    const g = i / fadeSamples;
                    samples[i] *= g;
                    samples[samples.length - 1 - i] *= g;
                }

                const componentSelector = document.getElementById('componentSelector');
                const comp = componentSelector ? componentSelector.options[componentSelector.selectedIndex].text.split(' ')[0] : 'audio';
                const t0 = zoomState.currentViewStartTime.toISOString().replace(/:/g, '-').replace(/\./g, '-');
                const t1 = zoomState.currentViewEndTime.toISOString().replace(/:/g, '-').replace(/\./g, '-');
                const filename = buildFilename(`${comp}_view_${t0}_${t1}`);

                triggerDownload(createWAVBlob(samples, sr), filename);
                console.log(`✅ Downloaded current view: ${filename} (${(samples.length / sr).toFixed(1)}s)`);
            } finally {
                dlViewBtn.textContent = 'Current View';
                dlViewBtn.disabled = false;
            }
        });

        // Current Component — full duration
        dlCompBtn.addEventListener('click', async () => {
            const State = await import('./js/audio-state.js');
            if (!State.getCompleteSamplesLength()) {
                alert('No audio data loaded. Please fetch data first.');
                return;
            }

            dlCompBtn.textContent = 'Exporting...';
            dlCompBtn.disabled = true;
            try {
                const samples = State.completeSamplesArray || State.getCompleteSamplesArray();
                if (!samples) { alert('Could not read audio samples.'); return; }

                const componentSelector = document.getElementById('componentSelector');
                const comp = componentSelector ? componentSelector.options[componentSelector.selectedIndex].text.split(' ')[0] : 'audio';
                const c = window.__EMIC_CONFIG || {};
                const t0 = (c.startTime || '').replace(/:/g, '-').replace(/\./g, '-');
                const t1 = (c.endTime || '').replace(/:/g, '-').replace(/\./g, '-');
                const filename = buildFilename(`${comp}_${t0}_${t1}`);

                triggerDownload(createWAVBlob(samples, 44100), filename);
                console.log(`✅ Downloaded component: ${filename}`);
            } finally {
                dlCompBtn.textContent = 'Current Component';
                dlCompBtn.disabled = false;
            }
        });

        // All Components — ZIP
        dlAllBtn.addEventListener('click', async () => {
            const { getAllComponentBlobs, getComponentLabels, getComponentCount } = await import('./js/component-selector.js');

            if (getComponentCount() < 2) {
                alert('Only one component available. Use "Current Component" instead.');
                return;
            }

            dlAllBtn.textContent = 'Creating ZIP...';
            dlAllBtn.disabled = true;
            try {
                const allBlobs = await getAllComponentBlobs();
                if (!allBlobs || allBlobs.length === 0) {
                    alert('Component data not loaded yet. Please wait for all components to download.');
                    return;
                }

                const labels = getComponentLabels();
                const c = window.__EMIC_CONFIG || {};
                const sc = c.spacecraft || 'GOES';
                const ds = (c.dataset || 'MAG').replace(/[^a-zA-Z0-9_-]/g, '');
                const t0 = (c.startTime || '').replace(/:/g, '-').replace(/\./g, '-');
                const t1 = (c.endTime || '').replace(/:/g, '-').replace(/\./g, '-');
                const base = `${sc}_${ds}_${t0}_${t1}`;

                const zip = new JSZip();
                for (let i = 0; i < allBlobs.length; i++) {
                    const label = labels[i]?.split(' ')[0] || `comp${i}`;
                    zip.file(`${base}_${label}.wav`, allBlobs[i]);
                }
                const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
                triggerDownload(zipBlob, `${base}_all_components.zip`);
                console.log(`✅ Downloaded all components ZIP`);
            } catch (err) {
                console.error('ZIP error:', err);
                alert('Failed to create ZIP. See console.');
            } finally {
                dlAllBtn.textContent = 'All Components';
                dlAllBtn.disabled = false;
            }
        });
    })();
    </script>
