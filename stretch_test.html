<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>">
    <title>Stretch Algorithm Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0D0D0F;
            color: #E0E0E0;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #E0E0E0;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        .subtitle {
            color: #555;
            margin-bottom: 20px;
            font-size: 0.85em;
        }

        .panel {
            background: #1A1A1E;
            border-radius: 6px;
            border: 1px solid #2A2A2E;
            padding: 12px 14px;
            margin-bottom: 8px;
        }

        .panel h2 {
            margin: 0 0 10px 0;
            color: #555;
            font-size: 0.7em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .file-drop {
            border: 1px dashed #333;
            border-radius: 4px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-drop:hover, .file-drop.dragover {
            border-color: #4A9E9E;
            background: rgba(74, 158, 158, 0.04);
        }

        .file-drop input {
            display: none;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Playback transport buttons */
        .transport-btn {
            background: none;
            border: 1px solid #333;
            color: #E0E0E0;
            width: 36px;
            height: 36px;
            border-radius: 4px;
            font-size: 14px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
        }

        .transport-btn:hover {
            border-color: #4A9E9E;
            color: #fff;
            background: rgba(74, 158, 158, 0.08);
        }

        .transport-btn:disabled {
            border-color: #222;
            color: #444;
            cursor: not-allowed;
        }

        .transport-btn.active {
            border-color: #4A9E9E;
            color: #4A9E9E;
            background: rgba(74, 158, 158, 0.1);
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 4px rgba(74, 158, 158, 0.3);
                border-color: #4A9E9E;
            }
            50% {
                box-shadow: 0 0 12px rgba(74, 158, 158, 0.5);
                border-color: #5CB8B8;
            }
        }

        .transport-btn.pulse {
            animation: pulse-glow 2s ease-in-out infinite;
            color: #4A9E9E;
        }

        /* General buttons (download, etc) */
        button {
            background: none;
            color: #E0E0E0;
            border: 1px solid #333;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        button:hover {
            border-color: #4A9E9E;
            color: #fff;
        }

        button:disabled {
            border-color: #222;
            color: #444;
            cursor: not-allowed;
        }

        .slider-group {
            flex: 1;
            min-width: 180px;
        }

        .slider-group label {
            display: block;
            margin-bottom: 5px;
            color: #777;
            font-size: 0.8em;
        }

        .slider-group label span {
            color: #4A9E9E;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: #2A2A2E;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4A9E9E;
            cursor: pointer;
            border: 2px solid #0D0D0F;
        }

        select {
            background: #141416;
            color: #ccc;
            border: none;
            border-bottom: 1px solid #333;
            padding: 6px 8px;
            border-radius: 2px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-bottom-color: #4A9E9E;
        }

        .status {
            background: transparent;
            padding: 0 8px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75em;
            color: #555;
            min-height: auto;
            line-height: 36px;
        }

        .status.active {
            color: #5A8A5A;
        }

        .status.error {
            color: #A04040;
        }

        .stats-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #141416;
            border: 1px solid #2A2A2E;
            border-radius: 3px;
            padding: 6px 10px;
            flex: 1;
            min-width: 80px;
        }

        .stat-label {
            font-size: 0.65em;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1em;
            font-weight: 600;
            color: #777;
            margin-top: 1px;
        }

        .stat-value.green {
            color: #5A8A5A;
        }

        .track-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .track-item {
            background: transparent;
            padding: 5px 12px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-block;
            border: 1px solid #333;
            font-size: 0.82em;
        }

        .track-item:hover {
            border-color: #4A9E9E;
            color: #fff;
        }

        .track-item.active {
            background: rgba(74, 158, 158, 0.12);
            color: #4A9E9E;
            border-color: #4A9E9E;
        }

        .track-name {
            font-weight: 500;
        }

        .track-size {
            color: #555;
            font-size: 0.85em;
        }

        .waveform-container {
            height: 100px;
            background: #000;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #D4943A;
            pointer-events: none;
            box-shadow: 0 0 6px rgba(212, 148, 58, 0.4);
        }

        #waveformTime {
            position: absolute;
            bottom: 4px;
            right: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            pointer-events: none;
            z-index: 2;
        }

        /* Download row — inline, not its own section */
        .download-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
        }

        .download-row button {
            font-size: 12px;
            padding: 4px 10px;
        }

        .download-row .status {
            font-size: 0.7em;
            line-height: 1.4;
        }

        #gpuBadge {
            color: #5A8A5A;
            font-size: 0.7em;
            font-weight: 500;
            background: rgba(90, 138, 90, 0.1);
            padding: 2px 8px;
            border-radius: 3px;
            border: 1px solid rgba(90, 138, 90, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stretch Algorithm Comparison</h1>

        <!-- Load Audio -->
        <div class="panel">
            <h2>Load Audio</h2>
            <div class="track-list" id="trackList">
                <!-- Test tracks will be listed here -->
            </div>
            <div class="file-drop" id="fileDrop" style="margin-top: 10px;">
                <p style="margin: 0; font-size: 12px; color: #555;">Drop or browse for a file</p>
                <input type="file" id="fileInput" accept=".wav,audio/*">
            </div>
        </div>

        <!-- Stretch -->
        <div class="panel">
            <h2>Stretch Settings</h2>
            <div class="controls" style="margin-bottom: 15px;">
                <div class="slider-group">
                    <label>Algorithm</label>
                    <select id="algorithmSelect">
                        <option value="resample">Resample (pitch shift)</option>
                        <!-- <option value="spectral">FFT (Spectral)</option> -->
                        <option value="paul" selected>Paul Stretch (STFT)</option>
                        <option value="granular">Granular</option>
                        <option value="cwt">CWT (Original Morlet Wavelet)</option>
                        <option value="cqt">CQT (Constant-Q)</option>
                        <option value="rtpghi">RTPGHI (Phase Gradient)</option>
                    </select>
                    <span id="gpuBadge" style="display:none;">GPU</span>
                </div>

                <div class="slider-group" id="windowGroup">
                    <label><span id="windowLabel">Window Size</span>: <span id="windowValue">4096</span></label>
                    <select id="windowSelect">
                        <option value="1024">1024 (crisp)</option>
                        <option value="2048">2048</option>
                        <option value="4096" selected>4096 (balanced)</option>
                        <option value="8192">8192</option>
                        <option value="16384">16384 (smooth)</option>
                    </select>
                </div>

                <div class="slider-group" id="overlapGroup" style="flex: 0 0 150px; min-width: 120px;">
                    <label>Overlap: <span id="overlapValue">90</span>%</label>
                    <input type="range" id="overlapSlider" min="50" max="95" step="2.5" value="90">
                </div>
            </div>
            <div class="controls">
                <div class="slider-group" style="flex: 1;">
                    <label>Stretch: <span id="stretchValue">1.0</span>x</label>
                    <input type="range" id="stretchSlider" min="0" max="100" step="1" value="50">
                </div>
            </div>

            <!-- GPU shared controls (phase mode + interpolation, hidden by default) -->
            <div id="gpuPhaseControls" class="controls" style="display:none; margin-top:15px;">
                <div class="slider-group">
                    <label>Phase Mode</label>
                    <select id="phaseModeSelect">
                        <option value="accumulate" selected>Unwrapped (pitch-accurate)</option>
                        <option value="multiply">Multiply (fast, integer factors only)</option>
                    </select>
                </div>
                <div class="slider-group">
                    <label>Interpolation</label>
                    <select id="interpModeSelect">
                        <option value="0" selected>Cubic (Catmull-Rom)</option>
                        <option value="1">Linear</option>
                    </select>
                </div>
            </div>

            <!-- CWT parameters (hidden by default) -->
            <div id="cwtControls" class="controls" style="display:none; margin-top:15px;">
                <div class="slider-group">
                    <label>w0 (Center Frequency)</label>
                    <select id="w0Select">
                        <option value="4">4 (impulsive)</option>
                        <option value="5">5</option>
                        <option value="6">6 (original)</option>
                        <option value="8">8</option>
                        <option value="10" selected>10 (recommended)</option>
                        <option value="12">12</option>
                        <option value="14">14</option>
                        <option value="16">16</option>
                        <option value="20">20 (resonant)</option>
                    </select>
                </div>
                <div class="slider-group">
                    <label>dj (Scale Spacing)</label>
                    <select id="djSelect">
                        <option value="0.1">0.1 (fine)</option>
                        <option value="0.125" selected>0.125 (default)</option>
                        <option value="0.25">0.25 (coarse)</option>
                        <option value="0.5">0.5 (half-octave)</option>
                        <option value="1.0">1.0 (octave)</option>
                        <option value="2.0">2.0 (2-octave)</option>
                    </select>
                </div>
            </div>

            <!-- CQT parameters (hidden by default) -->
            <div id="cqtControls" class="controls" style="display:none; margin-top:15px;">
                <div class="slider-group">
                    <label>Bins / Octave</label>
                    <select id="binsPerOctaveSelect">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="4">4</option>
                        <option value="6">6</option>
                        <option value="12">12 (semitone)</option>
                        <option value="24" selected>24 (quarter-tone)</option>
                        <option value="36">36</option>
                        <option value="48">48 (fine)</option>
                    </select>
                </div>
                <div class="slider-group">
                    <label>Min Bandwidth</label>
                    <select id="minBWSelect">
                        <option value="0">0 (pure CQT)</option>
                        <option value="25">25 Hz</option>
                        <option value="50">50 Hz</option>
                        <option value="100" selected>100 Hz</option>
                        <option value="200">200 Hz</option>
                    </select>
                </div>
            </div>

            <!-- RTPGHI parameters (hidden by default) -->
            <div id="rtpghiControls" class="controls" style="display:none; margin-top:15px; flex-wrap:wrap;">
                <div class="slider-group">
                    <label>FFT Size (M)</label>
                    <select id="rtpghiMSelect">
                        <option value="512">512</option>
                        <option value="1024">1024</option>
                        <option value="2048" selected>2048</option>
                        <option value="4096">4096</option>
                        <option value="8192">8192</option>
                    </select>
                </div>
                <div class="slider-group">
                    <label>Hop Divisor</label>
                    <select id="rtpghiHopSelect">
                        <option value="4">M/4</option>
                        <option value="8" selected>M/8</option>
                        <option value="16">M/16</option>
                        <option value="32">M/32</option>
                    </select>
                </div>
                <div class="slider-group">
                    <label>Window</label>
                    <select id="rtpghiWindowSelect">
                        <option value="gauss" selected>Gaussian</option>
                        <option value="hann">Hann</option>
                    </select>
                </div>
                <div class="slider-group">
                    <label>Phase Mode</label>
                    <select id="rtpghiPhaseSelect">
                        <option value="time" selected>Time only</option>
                        <option value="full">Full (time + freq)</option>
                        <option value="freq">Frequency only</option>
                    </select>
                </div>
                <div class="slider-group">
                    <label>Tolerance (dB)</label>
                    <select id="rtpghiTolSelect">
                        <option value="20">20 dB</option>
                        <option value="40" selected>40 dB</option>
                        <option value="60">60 dB</option>
                        <option value="80">80 dB</option>
                        <option value="100">100 dB</option>
                    </select>
                </div>
                <div class="slider-group">
                    <label>Gamma (γ)</label>
                    <select id="rtpghiGammaSelect">
                        <option value="25000">25,000</option>
                        <option value="100000">100,000</option>
                        <option value="500000">500,000</option>
                        <option value="1000000" selected>1,000,000</option>
                        <option value="2000000">2,000,000</option>
                        <option value="4000000">4,000,000</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Playback -->
        <div class="panel">
            <h2>Playback</h2>
            <div class="controls" style="margin-bottom: 10px;">
                <button id="playBtn" class="transport-btn" disabled title="Play">▶</button>
                <button id="stopBtn" class="transport-btn" disabled title="Stop">■</button>
                <button id="loopBtn" class="transport-btn" title="Loop">⟳</button>
                <div class="status" id="status">Ready</div>
            </div>
            <div class="waveform-container">
                <canvas id="waveformCanvas"></canvas>
                <div class="playhead" id="playhead" style="left: 0"></div>
                <div id="waveformTime"></div>
            </div>
        </div>

        <!-- Stats -->
        <div class="panel" id="statsPanel" style="display: none;">
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-label">Total</div><div class="stat-value green" id="statTotal">-</div></div>
                <div class="stat-box"><div class="stat-label">Realtime</div><div class="stat-value green" id="statRealtime">-</div></div>
                <div class="stat-box"><div class="stat-label">Output Length</div><div class="stat-value" id="statLength">-</div></div>
                <div class="stat-box"><div class="stat-label">File Size</div><div class="stat-value" id="statSize">-</div></div>
            </div>
        </div>

        <!-- Download -->
        <div id="downloadPanel" style="display: none; padding: 4px 14px;">
            <div class="download-row">
                <button id="downloadBtn">⬇ WAV</button>
                <div class="status" id="downloadStatus">Ready to export</div>
            </div>
        </div>
    </div>

    <script>
    // RTPGHIStretcher — Real-Time Phase Gradient Heap Integration (Prusa et al.)
    class RTPGHIStretcher {
        constructor(opts = {}) {
            this.M = opts.M || 2048;
            this.hopDiv = opts.hopDiv || 8;
            this.bins = this.M / 2 + 1;
            this.aSyn = this.M / this.hopDiv;
            this.tol = opts.tol || 10;
            this.phaseMode = opts.phaseMode || 'full';
            this.windowType = opts.windowType || 'gauss';
            const M = this.M;

            if (opts.gamma != null) {
                this.gamma = opts.gamma;
            } else {
                this.gammaScale = opts.gammaScale || 1.0;
                this.gamma = M * M * 0.006 * this.gammaScale;
            }

            this.window = new Float32Array(M);
            if (this.windowType === 'hann') {
                for (let i = 0; i < M; i++) {
                    this.window[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / M));
                }
            } else {
                for (let i = 0; i < M; i++) {
                    const t = i - M / 2;
                    this.window[i] = Math.exp(-Math.PI * t * t / this.gamma);
                }
            }

            this.bitRev = this._computeBitReversal(M);
            this.twRe = new Float32Array(M / 2);
            this.twIm = new Float32Array(M / 2);
            for (let i = 0; i < M / 2; i++) {
                const angle = -2 * Math.PI * i / M;
                this.twRe[i] = Math.cos(angle);
                this.twIm[i] = Math.sin(angle);
            }

            this.fftRe = new Float32Array(M);
            this.fftIm = new Float32Array(M);
        }

        _computeBitReversal(n) {
            const bits = Math.log2(n);
            const rev = new Uint32Array(n);
            for (let i = 0; i < n; i++) {
                let r = 0, x = i;
                for (let j = 0; j < bits; j++) { r = (r << 1) | (x & 1); x >>= 1; }
                rev[i] = r;
            }
            return rev;
        }

        _fft(re, im) {
            const n = this.M;
            for (let i = 0; i < n; i++) {
                const j = this.bitRev[i];
                if (i < j) {
                    [re[i], re[j]] = [re[j], re[i]];
                    [im[i], im[j]] = [im[j], im[i]];
                }
            }
            for (let size = 2; size <= n; size *= 2) {
                const half = size / 2, step = n / size;
                for (let i = 0; i < n; i += size) {
                    for (let j = 0; j < half; j++) {
                        const tw = j * step;
                        const wr = this.twRe[tw], wi = this.twIm[tw];
                        const i2 = i + j + half;
                        const tr = wr * re[i2] - wi * im[i2];
                        const ti = wr * im[i2] + wi * re[i2];
                        re[i2] = re[i + j] - tr;
                        im[i2] = im[i + j] - ti;
                        re[i + j] += tr;
                        im[i + j] += ti;
                    }
                }
            }
        }

        _ifft(re, im) {
            const n = this.M;
            for (let i = 0; i < n; i++) im[i] = -im[i];
            this._fft(re, im);
            for (let i = 0; i < n; i++) { re[i] /= n; im[i] = -im[i] / n; }
        }

        _analyzeFrame(source, pos, mag, logMag) {
            const M = this.M, re = this.fftRe, im = this.fftIm;
            for (let i = 0; i < M; i++) {
                const p = pos + i;
                const idx = Math.floor(p);
                const frac = p - idx;
                let sample = 0;
                if (idx >= 0 && idx < source.length - 1) {
                    sample = source[idx] * (1 - frac) + source[idx + 1] * frac;
                } else if (idx >= 0 && idx < source.length) {
                    sample = source[idx];
                }
                re[i] = sample * this.window[i];
                im[i] = 0;
            }
            this._fft(re, im);
            const EPS = 1e-20;
            for (let m = 0; m < this.bins; m++) {
                mag[m] = Math.sqrt(re[m] * re[m] + im[m] * im[m]);
                logMag[m] = Math.log(mag[m] + EPS);
            }
        }

        _rtpghiUpdate(logMagPrev, logMagCurr, phasePrev, phaseCurr) {
            const bins = this.bins;
            const M = this.M;
            const aSyn = this.aSyn;
            const lambda = this.gamma / (aSyn * M);
            const TWO_PI = 2 * Math.PI;
            const phaseMode = this.phaseMode;

            let maxLog = -Infinity;
            for (let m = 0; m < bins; m++) {
                if (logMagCurr[m] > maxLog) maxLog = logMagCurr[m];
            }
            const threshold = maxLog - this.tol;

            if (phaseMode === 'full' || phaseMode === 'time') {
                for (let m = 0; m < bins; m++) {
                    let dLogdW;
                    if (m === 0) {
                        dLogdW = logMagCurr[1] - logMagCurr[0];
                    } else if (m === bins - 1) {
                        dLogdW = logMagCurr[bins - 1] - logMagCurr[bins - 2];
                    } else {
                        dLogdW = (logMagCurr[m + 1] - logMagCurr[m - 1]) * 0.5;
                    }
                    const tgrad = dLogdW * lambda + TWO_PI * aSyn * m / M;
                    phaseCurr[m] = phasePrev[m] + tgrad;
                }
            } else {
                for (let m = 0; m < bins; m++) {
                    phaseCurr[m] = TWO_PI * aSyn * m / M * 0;
                }
            }

            if (phaseMode === 'full' || phaseMode === 'freq') {
                for (let m = 1; m < bins; m++) {
                    if (logMagCurr[m] > threshold && logMagCurr[m] > logMagCurr[m - 1]) {
                        const dLogdT_m = logMagCurr[m] - logMagPrev[m];
                        const dLogdT_m1 = logMagCurr[m - 1] - logMagPrev[m - 1];
                        const fgrad = -(dLogdT_m + dLogdT_m1) * 0.5 * lambda;
                        phaseCurr[m] = phaseCurr[m - 1] + fgrad;
                    }
                }
                for (let m = bins - 2; m >= 0; m--) {
                    if (logMagCurr[m] > threshold && logMagCurr[m] > logMagCurr[m + 1]) {
                        const dLogdT_m = logMagCurr[m] - logMagPrev[m];
                        const dLogdT_m1 = logMagCurr[m + 1] - logMagPrev[m + 1];
                        const fgrad = -(dLogdT_m + dLogdT_m1) * 0.5 * lambda;
                        phaseCurr[m] = phaseCurr[m + 1] - fgrad;
                    }
                }
            }
        }

        _synthesizeFrame(mag, phase) {
            const M = this.M, re = this.fftRe, im = this.fftIm;
            for (let m = 0; m < this.bins; m++) {
                re[m] = mag[m] * Math.cos(phase[m]);
                im[m] = mag[m] * Math.sin(phase[m]);
            }
            for (let m = 1; m < M / 2; m++) {
                re[M - m] = re[m];
                im[M - m] = -im[m];
            }
            this._ifft(re, im);
            const out = new Float32Array(M);
            for (let i = 0; i < M; i++) out[i] = re[i] * this.window[i];
            return out;
        }

        stretch(source, stretchFactor, onProgress = null) {
            const M = this.M;
            const aSyn = this.aSyn;
            const aAna = aSyn / stretchFactor;
            const bins = this.bins;

            const numInputFrames = Math.floor((source.length - M) / aAna) + 1;
            const outputLength = numInputFrames * aSyn + M;
            const output = new Float32Array(outputLength);
            const windowSum = new Float32Array(outputLength);

            const mag = new Float32Array(bins);
            const logMag = new Float32Array(bins);
            const logMagPrev = new Float32Array(bins);
            const phasePrev = new Float32Array(bins);
            const phaseCurr = new Float32Array(bins);

            this._analyzeFrame(source, 0, mag, logMag);
            logMagPrev.set(logMag);

            let sourcePos = 0;
            let outputPos = 0;

            for (let frame = 0; frame < numInputFrames; frame++) {
                this._analyzeFrame(source, sourcePos, mag, logMag);
                this._rtpghiUpdate(logMagPrev, logMag, phasePrev, phaseCurr);
                const synFrame = this._synthesizeFrame(mag, phaseCurr);

                for (let i = 0; i < M; i++) {
                    if (outputPos + i < outputLength) {
                        output[outputPos + i] += synFrame[i];
                        windowSum[outputPos + i] += this.window[i] * this.window[i];
                    }
                }

                logMagPrev.set(logMag);
                phasePrev.set(phaseCurr);
                sourcePos += aAna;
                outputPos += aSyn;

                if (onProgress && frame % 100 === 0) onProgress(frame, numInputFrames);
            }

            for (let i = 0; i < outputLength; i++) {
                if (windowSum[i] > 1e-8) output[i] /= windowSum[i];
            }

            const trimStart = Math.floor(M / 2);
            const trimEnd = Math.min(outputLength, outputPos + Math.floor(M / 2));
            const trimmed = output.slice(trimStart, trimEnd);

            if (onProgress) onProgress(numInputFrames, numInputFrames);
            return trimmed;
        }
    }

    <script type="module">
        import { WaveletGPUCompute } from './js/wavelet-gpu-compute.js';

        // ===== GLOBAL STATE =====
        let audioContext = null;

        let sourceBuffer = null;
