<!-- ⚠️ When in any doubt, use Edit to surgically fix mistakes — never git checkout this file. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>">
    <title>Stretch Algorithm Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0E0E10;
            color: #E0E0E0;
            margin: 0;
            padding: 20px 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        h1 {
            color: #666;
            font-size: 0.7em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            padding-left: 14px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 0.85em;
        }

        .panel {
            background: #212229;
            border-radius: 6px;
            border: 1px solid #2F3038;
            padding: 12px 16px;
            margin-bottom: 12px;
        }

        .panel h2 {
            margin: 0 0 10px 0;
            color: #999;
            font-size: 0.7em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-left: 12px;
            position: relative;
        }

        .panel h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: -2px;
            bottom: -2px;
            width: 3px;
            border-radius: 2px;
            background: linear-gradient(180deg, #5BA8A0, #C4954A);
        }

        .pulse-hint {
            animation: pulseHint 2s ease-in-out infinite;
        }

        .pulse-hint.fade-out {
            animation: none;
            transition: color 0.6s ease;
            color: #999;
        }

        @keyframes pulseHint {
            0%, 100% { color: #999; }
            50% { color: #6CC4A0; }
        }

        .file-drop {
            border: 1px dashed #3A3B42;
            border-radius: 4px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-drop:hover, .file-drop.dragover {
            border-color: #4A9E9E;
            background: rgba(74, 158, 158, 0.04);
        }

        .file-drop input {
            display: none;
        }

        .controls {
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Playback transport buttons */
        .transport-btn {
            background: #252630;
            border: 1px solid #3A3B42;
            color: #E0E0E0;
            width: 42px;
            height: 36px;
            border-radius: 4px;
            font-size: 18px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
        }

        .transport-btn:hover {
            border-color: #4A9E9E;
            color: #fff;
            background: #2E2F38;
        }

        .transport-btn:disabled {
            background: #1C1D22;
            border-color: #2A2B30;
            color: #555;
            cursor: not-allowed;
        }

        .transport-btn.active {
            border-color: #4A9E9E;
            color: #4A9E9E;
            background: rgba(74, 158, 158, 0.12);
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 4px rgba(74, 158, 158, 0.3);
                border-color: #4A9E9E;
            }
            50% {
                box-shadow: 0 0 12px rgba(74, 158, 158, 0.5);
                border-color: #5CB8B8;
            }
        }

        .transport-btn.pulse {
            animation: pulse-glow 2s ease-in-out infinite;
            color: #4A9E9E;
        }

        /* General buttons (download, etc) */
        button {
            background: #252630;
            color: #E0E0E0;
            border: 1px solid #3A3B42;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        button:hover {
            border-color: #4A9E9E;
            color: #fff;
            background: #2E2F38;
        }

        button:disabled {
            background: #1C1D22;
            border-color: #2A2B30;
            color: #555;
            cursor: not-allowed;
        }

        .slider-group {
            flex: 1;
            min-width: 180px;
        }

        .slider-group label {
            display: block;
            margin-bottom: 7px;
            color: #EBEBEB;
            font-size: 0.8em;
        }

        .slider-group label span {
            color: #C4954A;
            font-weight: 600;
            background: rgba(196, 149, 74, 0.1);
            padding: 1px 6px;
            border-radius: 3px;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: #3A3B45;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5BA8A0, #6CC4A0);
            cursor: pointer;
            border: 2px solid #0E0E10;
            box-shadow: 0 0 6px rgba(91, 168, 160, 0.3);
        }

        /* Larger thumb for stretch slider */
        #stretchSlider::-webkit-slider-thumb {
            width: 20px;
            height: 20px;
        }

        #stretchSlider {
            height: 6px;
            background: #4A4B55;
        }

        /* Native selects hidden — replaced by custom dropdowns */
        select.custom-select-native {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* Fallback for any selects not yet upgraded */
        select:not(.custom-select-native) {
            background: #252630;
            color: #ccc;
            border: none;
            border-bottom: 1px solid #3A3B42;
            padding: 6px 8px;
            border-radius: 2px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        select:not(.custom-select-native):focus {
            border-bottom-color: #4A9E9E;
        }

        /* ===== Custom Dropdown ===== */
        .csel {
            position: relative;
            display: inline-block;
            min-width: 100px;
        }

        .csel-pulse .csel-trigger {
            animation: pulseHint 2.5s ease-in-out infinite;
        }

        .csel-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: #252630;
            border: 1px solid #3A3B42;
            border-radius: 4px;
            padding: 6px 10px;
            color: #E0E0E0;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
            white-space: nowrap;
            user-select: none;
        }

        .csel-trigger:hover {
            border-color: #4A4B52;
            background: #2E2F38;
        }

        .csel-trigger:focus-visible {
            border-color: #4A9E9E;
            box-shadow: 0 0 0 2px rgba(74, 158, 158, 0.25);
        }

        .csel.open .csel-trigger {
            border-color: #4A9E9E;
        }

        .csel-arrow {
            flex-shrink: 0;
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 4px solid #666;
            transition: transform 0.15s;
        }

        .csel.open .csel-arrow {
            transform: rotate(180deg);
        }

        .csel-menu {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            min-width: 100%;
            max-height: 280px;
            overflow-y: auto;
            background: #282930;
            border: 1px solid #3A3B42;
            border-radius: 5px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
            z-index: 1000;
            padding: 4px 0;
            /* animation: start hidden */
            opacity: 0;
            transform: translateY(-4px);
            pointer-events: none;
            transition: opacity 0.15s ease-out, transform 0.15s ease-out;
        }

        .csel.open .csel-menu {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .csel-option {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            color: #C0C0C0;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
            white-space: nowrap;
            border-left: 2px solid transparent;
        }

        .csel-option:hover,
        .csel-option.highlighted {
            background: rgba(74, 158, 158, 0.12);
            color: #E0E0E0;
        }

        .csel-option.selected {
            color: #4A9E9E;
            border-left-color: #4A9E9E;
        }

        .csel-option.selected.highlighted {
            background: rgba(74, 158, 158, 0.15);
        }

        .csel-group-label {
            padding: 6px 10px 3px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #666;
            pointer-events: none;
            user-select: none;
        }
        .csel-group-label:not(:first-child) {
            margin-top: 4px;
            border-top: 1px solid #2A2B30;
            padding-top: 8px;
        }

        /* Scrollbar in dropdown */
        .csel-menu::-webkit-scrollbar {
            width: 6px;
        }

        .csel-menu::-webkit-scrollbar-track {
            background: transparent;
        }

        .csel-menu::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        /* ===== Primary algorithm selector ===== */
        .csel.csel-primary .csel-trigger {
            font-size: 15px;
            padding: 8px 12px;
            color: #B0B0B8;
            font-weight: 600;
            background: #2A2B34;
            border-color: rgba(74, 158, 158, 0.35);
        }

        .csel.csel-primary .csel-trigger:hover {
            background: #2E2F3A;
            border-color: rgba(74, 158, 158, 0.5);
        }

        .csel.csel-primary.open .csel-trigger {
            border-color: #4A9E9E;
        }

        .csel.csel-primary .csel-menu {
            font-size: 14px;
        }

        .csel.csel-primary .csel-option {
            font-size: 14px;
            padding: 8px 12px;
        }

        /* ===== Parameter sub-zone ===== */
        .param-zone {
            margin-top: 10px;
            padding: 12px 14px;
            background: #16171C;
            border-radius: 4px;
            border: 1px solid #23242A;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 135px;
        }

        .param-zone .slider-group label {
            color: #C4954A;
            font-size: 0.75em;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .param-zone .csel-trigger {
            font-size: 12px;
            padding: 5px 8px;
            color: #909098;
            font-weight: 500;
            background: #1C1D22;
            border-color: #2A2B30;
        }

        .param-zone .csel-trigger:hover {
            color: #BBB;
            background: #22232A;
            border-color: #3A3B42;
        }

        .param-zone .csel-option {
            font-size: 12px;
            padding: 5px 8px;
            color: #888;
        }

        .param-zone .csel-option:hover,
        .param-zone .csel-option.highlighted {
            color: #BBB;
        }

        .param-zone .csel-option.selected {
            color: #5BA8A0;
        }

        .status {
            flex: 1;
            background: #16171C;
            padding: 0 10px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75em;
            color: #888;
            min-height: auto;
            line-height: 36px;
            border-radius: 3px;
            border: 1px solid #1A1A1E;
        }

        .status.active {
            color: #5BA8A0;
        }

        .status.error {
            color: #A04040;
        }

        .stats-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #15161A;
            border: 1px solid #2A2B30;
            border-radius: 3px;
            padding: 8px 10px;
            flex: 1;
            min-width: 80px;
        }

        .stat-label {
            font-size: 0.65em;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1em;
            font-weight: 600;
            color: #C4954A;
            margin-top: 1px;
        }

        .stat-value.green {
            color: #5BA8A0;
        }

        .track-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 32px;
        }

        .track-item {
            background: #252630;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-block;
            border: 1px solid #3A3B42;
            font-size: 0.82em;
            color: #A0A0A8;
        }

        .track-item:hover {
            border-color: #4A9E9E;
            color: #fff;
        }

        .track-item.active {
            background: rgba(74, 158, 158, 0.18);
            color: #fff;
            border-color: #4A9E9E;
        }

        .track-name {
            font-weight: 500;
        }

        .track-size {
            color: #888;
            font-size: 0.85em;
        }

        .waveform-container {
            height: 110px;
            background: #0A0A0C;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
            border: 1px solid #111113;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #FFFFFF;
            pointer-events: none;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
        }

        #waveformTime {
            position: absolute;
            bottom: 4px;
            right: 8px;
            color: rgba(255,255,255,0.65);
            font-size: 10px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            pointer-events: none;
            z-index: 2;
        }

        /* Download row — inline, not its own section */
        .download-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }

        .download-row button {
            font-size: 12px;
            padding: 4px 10px;
        }

        .download-row .status {
            font-size: 0.7em;
            line-height: 1.4;
        }

        #gpuBadge {
            color: rgba(91, 168, 160, 0.55);
            font-size: 15px;
            font-weight: 500;
            background: rgba(91, 168, 160, 0.07);
            padding: 0 8px;
            border-radius: 3px;
            border: 1px solid rgba(91, 168, 160, 0.1);
            align-self: stretch;
            display: inline-flex;
            align-items: center;
        }

        /* Processing progress */
        #progressBar {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            width: 0%;
            background: linear-gradient(90deg, #5BA8A0, #6CC4A0);
            z-index: 5;
            transition: width 0.3s ease-out, opacity 0.2s ease-out;
            opacity: 1;
        }

        /* Glass oscilloscope */
        .osc-glass {
            position: relative;
            border-radius: 5px;
            padding: 4px;
            background: linear-gradient(135deg, rgba(40, 40, 52, 0.9) 0%, rgba(28, 28, 38, 0.85) 100%);
            box-shadow: 0 0 4px rgba(80, 80, 110, 0.15), inset 0 0 16px rgba(70, 70, 100, 0.35), inset 0 1px 2px rgba(255, 255, 255, 0.12), 0 1px 4px rgba(0, 0, 0, 0.5);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        #oscCanvas {
            display: block;
            width: 120px;
            height: 32px;
            border-radius: 2px;
            background: rgba(3, 3, 8, 0.98);
            box-shadow: inset 0 0 20px rgba(70, 70, 100, 0.4), inset 0 0 10px rgba(90, 70, 110, 0.25), inset 0 1px 2px rgba(0, 0, 0, 0.6);
            border: 0.5px solid rgba(255, 255, 255, 0.06);
        }

        .osc-frost {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 120px;
            height: 32px;
            border-radius: 2px;
            pointer-events: none;
            opacity: 0.5;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px),
                repeating-linear-gradient(45deg, transparent, transparent 1px, rgba(255,255,255,0.02) 1px, rgba(255,255,255,0.02) 2px),
                repeating-linear-gradient(-45deg, transparent, transparent 1px, rgba(0,0,0,0.05) 1px, rgba(0,0,0,0.05) 2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stretch Algorithm Comparison</h1>

        <!-- Load Audio -->
        <div class="panel">
            <h2 id="loadAudioTitle" class="pulse-hint">Load Audio</h2>
            <div class="controls">
                <select id="trackSelect">
                    <option value="" disabled selected>Choose a track...</option>
                </select>
                <span style="color:#555; font-size: 0.85em;">or</span>
                <button class="secondary" id="loadFileBtn" style="padding: 6px 12px; font-size: 0.82em; background: #252630; border: 1px solid #3A3B42; border-radius: 3px; color: #A0A0A8; cursor: pointer;">Load file...</button>
                <input type="file" id="fileInput" accept=".wav,audio/*" style="display:none">
                <div id="fileDrop" style="flex: 1; min-width: 80px; padding: 6px 12px; border: 1px dashed #3A3B42; border-radius: 3px; text-align: center; cursor: pointer; font-size: 0.78em; color: #555; transition: all 0.2s;">Drop file here</div>
            </div>
        </div>

        <!-- Stretch -->
        <div class="panel">
            <h2>Stretch Settings</h2>
            <!-- Primary: Algorithm selector -->
            <div style="display: flex; align-items: stretch; gap: 8px;">
                <div>
                    <select id="algorithmSelect">
                        <optgroup label="Real-Time">
                            <option value="resample">Resample (pitch shift)</option>
                            <option value="paul" selected>Paul Stretch (STFT)</option>
                            <option value="granular">Granular</option>
                        </optgroup>
                        <optgroup label="Offline">
                            <option value="rtpghi">RTPGHI (Phase Gradient)</option>
                        </optgroup>
                        <optgroup label="Wavelet (GPU Accelerated)">
                            <option value="cwt">CWT (Original Morlet Wavelet)</option>
                            <option value="cqt">CQT (Constant-Q)</option>
                        </optgroup>
                    </select>
                </div>
                <span id="gpuBadge" style="display:none;">GPU Accelerated</span>
                <label id="streamingToggle" style="display:none; align-items:center; gap:4px; cursor:pointer; font-size:0.75em; color:#888; user-select:none;">
                    <input type="checkbox" id="streamingCheckbox" checked>
                    <span style="color:#7EB8B0; font-weight:600;">Streaming</span>
                </label>
                <label id="normalizeToggle" style="display:none; align-items:center; gap:4px; cursor:pointer; font-size:0.75em; color:#888; user-select:none;">
                    <input type="checkbox" id="normalizeCheckbox" checked>
                    <span style="color:#B89870; font-weight:600;">Normalize</span>
                </label>
                <div id="throttleToggle" style="display:none; align-items:center; gap:4px; font-size:0.75em; color:#888; user-select:none;">
                    <span style="color:#E8A838; font-weight:600;">Throttle</span>
                    <select id="throttleSelect" style="font-size:11px; background:#1A1B1E; color:#ccc; border:1px solid #333; border-radius:3px; padding:1px 4px;">
                        <option value="0">Off</option>
                        <option value="75">75%</option>
                        <option value="50">50%</option>
                        <option value="25">25%</option>
                        <option value="10">10%</option>
                        <option value="5">5%</option>
                        <option value="2">2%</option>
                        <option value="1">1%</option>
                    </select>
                </div>
            </div>

            <!-- Primary: Speed — the big fader -->
            <div style="padding: 16px 0 12px 0;">
                <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px;">
                    <label style="color: #999; font-size: 0.75em; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;">Speed</label>
                    <span id="stretchValue" style="color: #C4954A; font-weight: 600; font-size: 0.9em; background: rgba(196, 149, 74, 0.1); padding: 1px 8px; border-radius: 3px;">1.0x</span>
                </div>
                <div style="position: relative;">
                    <input type="range" id="stretchSlider" min="0" max="1000" step="1" value="565" style="width: 100%;">
                    <div style="font-size: 0.65em; color: #888; margin-top: 6px; position: relative; height: 12px; margin-left: 10px; margin-right: 10px;">
                        <span style="position:absolute; left:0%; transform:translateX(-50%);">0.05x</span>
                        <span style="position:absolute; left:calc(0% + 28px); font-size:11px;">Slower</span>
                        <span style="position:absolute; left:13.1%; transform:translateX(-50%);">0.1x</span>
                        <span style="position:absolute; left:30.4%; transform:translateX(-50%);">0.25x</span>
                        <span style="position:absolute; left:43.5%; transform:translateX(-50%);">0.5x</span>
                        <span style="position:absolute; left:56.5%; transform:translateX(-50%);">1x</span>
                        <span style="position:absolute; left:69.6%; transform:translateX(-50%);">2x</span>
                        <span style="position:absolute; left:86.9%; transform:translateX(-50%);">5x</span>
                        <span style="position:absolute; right:calc(0% + 22px); font-size:11px;">Faster</span>
                        <span style="position:absolute; left:100%; transform:translateX(-50%);">10x</span>
                    </div>
                </div>
            </div>

            <!-- Secondary: Algorithm-specific parameters (recessed sub-zone) -->
            <div class="param-zone" id="paramZone">

    <script>
    // RTPGHIStretcher — Real-Time Phase Gradient Heap Integration (Prusa et al.)
    class RTPGHIStretcher {
        constructor(opts = {}) {
            this.M = opts.M || 2048;
            this.hopDiv = opts.hopDiv || 8;
            this.bins = this.M / 2 + 1;
            this.aSyn = this.M / this.hopDiv;
            this.tol = opts.tol || 10;
            this.phaseMode = opts.phaseMode || 'full';
            this.windowType = opts.windowType || 'gauss';
            const M = this.M;

            if (opts.gamma != null) {
                this.gamma = opts.gamma;
            } else {
                this.gammaScale = opts.gammaScale || 1.0;
                this.gamma = M * M * 0.006 * this.gammaScale;
            }

            this.window = new Float32Array(M);
            if (this.windowType === 'hann') {
                for (let i = 0; i < M; i++) {
                    this.window[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / M));
                }
            } else {
                for (let i = 0; i < M; i++) {
                    const t = i - M / 2;
                    this.window[i] = Math.exp(-Math.PI * t * t / this.gamma);
                }
            }

            this.bitRev = this._computeBitReversal(M);
            this.twRe = new Float32Array(M / 2);
            this.twIm = new Float32Array(M / 2);
            for (let i = 0; i < M / 2; i++) {
                const angle = -2 * Math.PI * i / M;
                this.twRe[i] = Math.cos(angle);
                this.twIm[i] = Math.sin(angle);
            }

            this.fftRe = new Float32Array(M);
            this.fftIm = new Float32Array(M);
        }

        _computeBitReversal(n) {
            const bits = Math.log2(n);
            const rev = new Uint32Array(n);
            for (let i = 0; i < n; i++) {
                let r = 0, x = i;
                for (let j = 0; j < bits; j++) { r = (r << 1) | (x & 1); x >>= 1; }
                rev[i] = r;
            }
            return rev;
        }

        _fft(re, im) {
            const n = this.M;
            for (let i = 0; i < n; i++) {
                const j = this.bitRev[i];
                if (i < j) {
                    [re[i], re[j]] = [re[j], re[i]];
                    [im[i], im[j]] = [im[j], im[i]];
                }
            }
            for (let size = 2; size <= n; size *= 2) {
                const half = size / 2, step = n / size;
                for (let i = 0; i < n; i += size) {
                    for (let j = 0; j < half; j++) {
                        const tw = j * step;
                        const wr = this.twRe[tw], wi = this.twIm[tw];
                        const i2 = i + j + half;
                        const tr = wr * re[i2] - wi * im[i2];
                        const ti = wr * im[i2] + wi * re[i2];
                        re[i2] = re[i + j] - tr;
                        im[i2] = im[i + j] - ti;
                        re[i + j] += tr;
                        im[i + j] += ti;
                    }
                }
            }
        }

        _ifft(re, im) {
            const n = this.M;
            for (let i = 0; i < n; i++) im[i] = -im[i];
            this._fft(re, im);
            for (let i = 0; i < n; i++) { re[i] /= n; im[i] = -im[i] / n; }
        }

        _analyzeFrame(source, pos, mag, logMag) {
            const M = this.M, re = this.fftRe, im = this.fftIm;
            for (let i = 0; i < M; i++) {
                const p = pos + i;
                const idx = Math.floor(p);
                const frac = p - idx;
                let sample = 0;
                if (idx >= 0 && idx < source.length - 1) {
                    sample = source[idx] * (1 - frac) + source[idx + 1] * frac;
                } else if (idx >= 0 && idx < source.length) {
                    sample = source[idx];
                }
                re[i] = sample * this.window[i];
                im[i] = 0;
            }
            this._fft(re, im);
            const EPS = 1e-20;
            for (let m = 0; m < this.bins; m++) {
                mag[m] = Math.sqrt(re[m] * re[m] + im[m] * im[m]);
                logMag[m] = Math.log(mag[m] + EPS);
            }
        }

        _rtpghiUpdate(logMagPrev, logMagCurr, phasePrev, phaseCurr) {
            const bins = this.bins;
            const M = this.M;
            const aSyn = this.aSyn;
            const lambda = this.gamma / (aSyn * M);
            const TWO_PI = 2 * Math.PI;
            const phaseMode = this.phaseMode;

            let maxLog = -Infinity;
            for (let m = 0; m < bins; m++) {
                if (logMagCurr[m] > maxLog) maxLog = logMagCurr[m];
            }
            const threshold = maxLog - this.tol;

            if (phaseMode === 'full' || phaseMode === 'time') {
                for (let m = 0; m < bins; m++) {
                    let dLogdW;
                    if (m === 0) {
                        dLogdW = logMagCurr[1] - logMagCurr[0];
                    } else if (m === bins - 1) {
                        dLogdW = logMagCurr[bins - 1] - logMagCurr[bins - 2];
                    } else {
                        dLogdW = (logMagCurr[m + 1] - logMagCurr[m - 1]) * 0.5;
                    }
                    const tgrad = dLogdW * lambda + TWO_PI * aSyn * m / M;
                    phaseCurr[m] = phasePrev[m] + tgrad;
                }
            } else {
                for (let m = 0; m < bins; m++) {
                    phaseCurr[m] = TWO_PI * aSyn * m / M * 0;
                }
            }

            if (phaseMode === 'full' || phaseMode === 'freq') {
                for (let m = 1; m < bins; m++) {
                    if (logMagCurr[m] > threshold && logMagCurr[m] > logMagCurr[m - 1]) {
                        const dLogdT_m = logMagCurr[m] - logMagPrev[m];
                        const dLogdT_m1 = logMagCurr[m - 1] - logMagPrev[m - 1];
                        const fgrad = -(dLogdT_m + dLogdT_m1) * 0.5 * lambda;
                        phaseCurr[m] = phaseCurr[m - 1] + fgrad;
                    }
                }
                for (let m = bins - 2; m >= 0; m--) {
                    if (logMagCurr[m] > threshold && logMagCurr[m] > logMagCurr[m + 1]) {
                        const dLogdT_m = logMagCurr[m] - logMagPrev[m];
                        const dLogdT_m1 = logMagCurr[m + 1] - logMagPrev[m + 1];
                        const fgrad = -(dLogdT_m + dLogdT_m1) * 0.5 * lambda;
                        phaseCurr[m] = phaseCurr[m + 1] - fgrad;
                    }
                }
            }
        }

        _synthesizeFrame(mag, phase) {
            const M = this.M, re = this.fftRe, im = this.fftIm;
            for (let m = 0; m < this.bins; m++) {
                re[m] = mag[m] * Math.cos(phase[m]);
                im[m] = mag[m] * Math.sin(phase[m]);
            }
            for (let m = 1; m < M / 2; m++) {
                re[M - m] = re[m];
                im[M - m] = -im[m];
            }
            this._ifft(re, im);
            const out = new Float32Array(M);
            for (let i = 0; i < M; i++) out[i] = re[i] * this.window[i];
            return out;
        }

        async stretch(source, speed, onProgress = null) {
            const M = this.M;
            const aSyn = this.aSyn;
            const aAna = aSyn * speed;
            const bins = this.bins;

            const numInputFrames = Math.floor((source.length - M) / aAna) + 1;
            const outputLength = numInputFrames * aSyn + M;
            const output = new Float32Array(outputLength);
            const windowSum = new Float32Array(outputLength);

            const mag = new Float32Array(bins);
            const logMag = new Float32Array(bins);
            const logMagPrev = new Float32Array(bins);
            const phasePrev = new Float32Array(bins);
            const phaseCurr = new Float32Array(bins);

            this._analyzeFrame(source, 0, mag, logMag);
            logMagPrev.set(logMag);

            let sourcePos = 0;
            let outputPos = 0;
            let lastYield = performance.now();

            for (let frame = 0; frame < numInputFrames; frame++) {
                this._analyzeFrame(source, sourcePos, mag, logMag);
                this._rtpghiUpdate(logMagPrev, logMag, phasePrev, phaseCurr);
                const synFrame = this._synthesizeFrame(mag, phaseCurr);

                for (let i = 0; i < M; i++) {
                    if (outputPos + i < outputLength) {
                        output[outputPos + i] += synFrame[i];
                        windowSum[outputPos + i] += this.window[i] * this.window[i];
                    }
                }

                logMagPrev.set(logMag);
                phasePrev.set(phaseCurr);
                sourcePos += aAna;
                outputPos += aSyn;

                if (onProgress) {
                    // Yield to UI periodically so progress bar can repaint
                    const now = performance.now();
                    if (now - lastYield > 40) {
                        onProgress(frame, numInputFrames);
                        await new Promise(r => setTimeout(r, 0));
                        lastYield = performance.now();
                    }
                }
            }

            for (let i = 0; i < outputLength; i++) {
                if (windowSum[i] > 1e-8) output[i] /= windowSum[i];
            }

            const trimStart = Math.floor(M / 2);
            const trimEnd = Math.min(outputLength, outputPos + Math.floor(M / 2));
            const trimmed = output.slice(trimStart, trimEnd);

            if (onProgress) onProgress(numInputFrames, numInputFrames);
            return trimmed;
        }
    }
    </script>

    <script>
    /**
     * CustomSelect — Accessible custom dropdown replacing native <select>.
     * Preserves the native element (hidden) so .value and change events still work.
     */
    class CustomSelect {
        constructor(selectEl) {
            this.select = selectEl;
            this.isOpen = false;
            this.highlightedIndex = -1;
            this.typeBuffer = '';
            this.typeTimer = null;

            this._build();
            this._bindEvents();
        }

        _build() {
            const sel = this.select;

            // Hide native select (keep in DOM for form/value compat)
            sel.classList.add('custom-select-native');
            sel.setAttribute('tabindex', '-1');
            sel.setAttribute('aria-hidden', 'true');

            // Wrapper
            this.wrapper = document.createElement('div');
            this.wrapper.className = 'csel';

            // Trigger button
            this.trigger = document.createElement('button');
            this.trigger.type = 'button';
            this.trigger.className = 'csel-trigger';
            this.trigger.setAttribute('role', 'combobox');
            this.trigger.setAttribute('aria-haspopup', 'listbox');
            this.trigger.setAttribute('aria-expanded', 'false');
            const menuId = sel.id + '-menu';
            this.trigger.setAttribute('aria-controls', menuId);

            this.label = document.createElement('span');
            this.label.className = 'csel-label';

            const arrow = document.createElement('span');
            arrow.className = 'csel-arrow';
            arrow.setAttribute('aria-hidden', 'true');

            this.trigger.appendChild(this.label);
            this.trigger.appendChild(arrow);

            // Menu
            this.menu = document.createElement('div');
            this.menu.className = 'csel-menu';
            this.menu.id = menuId;
            this.menu.setAttribute('role', 'listbox');
            this.menu.setAttribute('aria-label', this._getLabel());

            this.options = [];
            this._buildOptions();

            this.wrapper.appendChild(this.trigger);
            this.wrapper.appendChild(this.menu);

            // Insert wrapper after select
            sel.parentNode.insertBefore(this.wrapper, sel.nextSibling);
            // Move native select inside wrapper (for positioning context)
            this.wrapper.appendChild(sel);

            this._syncLabel();
        }

        _getLabel() {
            // Try to find a label associated with this select
            const parent = this.select.closest('.slider-group');
            if (parent) {
                const lbl = parent.querySelector('label');
                if (lbl) return lbl.textContent.trim();
            }
            return this.select.id || 'Select';
        }

        _buildOptions() {
            this.menu.innerHTML = '';
            this.options = [];

            const children = this.select.children;
            let optIndex = 0;
            const addOption = (opt) => {
                const idx = optIndex++;
                const div = document.createElement('div');
                div.className = 'csel-option';
                div.setAttribute('role', 'option');
                div.setAttribute('data-value', opt.value);
                const isSelected = (opt.value === this.select.value);
                div.setAttribute('aria-selected', isSelected ? 'true' : 'false');
                div.textContent = opt.textContent;
                if (isSelected) div.classList.add('selected');

                div.addEventListener('mouseenter', () => this._highlight(idx));
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this._selectIndex(idx);
                    this._close();
                    this.trigger.focus();
                });

                this.menu.appendChild(div);
                this.options.push(div);
            };

            Array.from(children).forEach(child => {
                if (child.tagName === 'OPTGROUP') {
                    const header = document.createElement('div');
                    header.className = 'csel-group-label';
                    header.textContent = child.label;
                    this.menu.appendChild(header);
                    Array.from(child.children).forEach(opt => addOption(opt));
                } else if (child.tagName === 'OPTION') {
                    addOption(child);
                }
            });
        }

        _bindEvents() {
            // Toggle on trigger click
            this.trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                this.isOpen ? this._close() : this._open();
            });

            // Keyboard on trigger
            this.trigger.addEventListener('keydown', (e) => this._onKeyDown(e));

            // Close on outside click
            this._outsideClick = (e) => {
                if (this.isOpen && !this.wrapper.contains(e.target)) {
                    this._close();
                }
            };
            document.addEventListener('click', this._outsideClick);

            // If native select value changes programmatically, sync UI
            const origDescriptor = Object.getOwnPropertyDescriptor(HTMLSelectElement.prototype, 'value');
            const self = this;
            Object.defineProperty(this.select, 'value', {
                get() { return origDescriptor.get.call(this); },
                set(v) {
                    origDescriptor.set.call(this, v);
                    self._syncFromNative();
                }
            });
        }

        _open() {
            this.isOpen = true;
            this.wrapper.classList.add('open');
            this.trigger.setAttribute('aria-expanded', 'true');

            // Highlight current selection
            const selectedIdx = this.select.selectedIndex;
            this._highlight(selectedIdx);

            // Scroll selected into view
            if (this.options[selectedIdx]) {
                this.options[selectedIdx].scrollIntoView({ block: 'nearest' });
            }
        }

        _close() {
            this.isOpen = false;
            this.wrapper.classList.remove('open');
            this.trigger.setAttribute('aria-expanded', 'false');
            this.highlightedIndex = -1;
            this.trigger.blur();
        }

        _highlight(index) {

                    `${this.overlapSamples.toLocaleString()} overlap, ` +

            /**

             * Forward from playhead → end, then heal backward to beginning.
             */
            setPriority(playheadSample) {

                this.queue = [];

                // Forward from playhead to end
                for (let i = playheadChunk; i < this.numChunks; i++) {
                    if (this.chunkStatus[i] === 0) this.queue.push(i);
                }

                // Heal backward from playhead to beginning
                for (let i = playheadChunk - 1; i >= 0; i--) {
                    if (this.chunkStatus[i] === 0) this.queue.push(i);
                }

                console.log(
                    `%c[ChunkScheduler] Priority set: playhead chunk ${playheadChunk}, ` +
                    `${this.queue.length} chunks queued (${this.completedCount()}/${this.numChunks} done)`,
                    'color: #7EB8B0'

                    this.currentChunkIndex = ci;

                    await this._processChunk(ci);
                    const elapsed = (performance.now() - t0).toFixed(0);

                    this.chunkStatus[ci] = 2; // ready
                    this.currentChunkIndex = -1;

                    const completed = this.completedCount();
                    console.log(
                        `%c[ChunkScheduler] Chunk ${ci}/${this.numChunks - 1} done (${elapsed}ms) — ` +
                        `${completed}/${this.numChunks} total`,

                        this.totalOutputLen

                    }
                    if (this.onProgress) {

                    // Throttle: simulate reduced GPU budget by adding delay between chunks.
