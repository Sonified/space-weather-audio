                    stretchNode.disconnect();
                }
                if (stretchGain) {
                    stretchGain.disconnect();
                }
            }

            currentAlgorithm = algorithmSelect.value;
            const speed = sliderToSpeed(parseFloat(stretchSlider.value));

            if (currentAlgorithm === 'resample') {
                stretchNode = new AudioWorkletNode(audioContext, 'resample-stretch-processor', {
                    processorOptions: { speed }
                });
            } else if (currentAlgorithm === 'spectral') {
                stretchNode = new AudioWorkletNode(audioContext, 'spectral-stretch-processor', {
                    processorOptions: {
                        windowSize: parseInt(windowSelect.value),
                        speed,
                        overlap: parseFloat(overlapSlider.value) / 100
                    }
                });
            } else if (currentAlgorithm === 'paul') {
                stretchNode = new AudioWorkletNode(audioContext, 'paul-stretch-processor', {
                    processorOptions: {
                        windowSize: parseInt(windowSelect.value),
                        speed
                    }
                });
            } else {
                stretchNode = new AudioWorkletNode(audioContext, 'granular-stretch-processor', {
                    processorOptions: {
                        speed,
                        grainSize: parseInt(windowSelect.value),
                        overlap: parseFloat(overlapSlider.value) / 100,
                        scatter: 0.1
                    }
                });
            }

            // Create gain node for crossfade control
            stretchGain = audioContext.createGain();
            stretchGain.gain.value = startGain;
            stretchNode.connect(stretchGain);
            if (!oscAnalyser) {
                oscAnalyser = audioContext.createAnalyser();
                oscAnalyser.fftSize = 2048;
                oscBuffer = new Float32Array(oscAnalyser.fftSize);
                oscAnalyser.connect(audioContext.destination);
                startOscilloscope();
            }
            stretchGain.connect(oscAnalyser);
            setupWorkletListeners();

            // Send scrub params to resample processor
            if (currentAlgorithm === 'resample') {
                stretchNode.port.postMessage({ type: 'set-scrub-cutoff', data: { value: mouseSmoothing } });
                stretchNode.port.postMessage({ type: 'set-platter-inertia', data: { value: platterInertia } });
                stretchNode.port.postMessage({ type: 'set-scrub-adapt', data: { value: scrubAdapt } });
            }

            // Re-send audio if we had some loaded
            if (sourceBuffer) {
                stretchNode.port.postMessage({
                    type: 'load-audio',
                    data: { samples: Array.from(sourceBuffer) }
                });
            }
        }

        function setupWorkletListeners() {
            // Listen for messages from worklet
            stretchNode.port.onmessage = (event) => {
                const { type } = event.data;
                if (type === 'loaded') {
                    setStatus('Audio loaded. Ready to play.', 'active');
                    playBtn.disabled = false;

                    playBtn.classList.add('pulse');

                    // Check for pending resume after algorithm switch
                    if (pendingResume) {
                        // Restore gain if it was zeroed during file-switch fade-out
                        if (pendingResume.restoreGain && stretchGain && audioContext) {
                            stretchGain.gain.cancelScheduledValues(audioContext.currentTime);
                            stretchGain.gain.setValueAtTime(1, audioContext.currentTime);
                        }
                        // Crossfade: fade in new worklet, fade out old source
                        if (pendingResume.crossfadeIn && stretchGain && audioContext) {
                            const now = audioContext.currentTime;
                            stretchGain.gain.setValueAtTime(0, now);
                            stretchGain.gain.linearRampToValueAtTime(1, now + CROSSFADE_DURATION);
                            // Fade out GPU source now that worklet is ready
                            if (pendingResume.fadeOutGPU) {
                                fadeOutGPUSource();
                            }
                        }
                        stretchNode.port.postMessage({ type: 'seek', data: { position: pendingResume.position } });
                        playStartPosition = pendingResume.position;
                        if (pendingResume.shouldPlay) {
                            stretchNode.port.postMessage({ type: 'play' });
                            isPlaying = true;
                            playStartTime = audioContext.currentTime;
                            playBtn.textContent = '⏸';
                            playBtn.classList.remove('pulse');
                            startPlayheadAnimation();
                            setStatus(playingStatus(), 'active');
                        }
                        pendingResume = null;
                    }
                } else if (type === 'scrub-position') {
                    // Processor reports its actual read-head position during scrub
                    const d = event.data.data;
                    if (isScrubbing) {
                        playhead.style.left = `${d.ratio * 100}%`;
                        // Update speed meter
                        const meter = document.getElementById('speedMeter');
                        const fill = document.getElementById('speedFill');
                        const label = document.getElementById('speedLabel');
                        meter.style.display = '';
                        const norm = Math.min(1, d.speedNorm);
                        fill.style.height = `${norm * 100}%`;
                        label.style.bottom = `${norm * 100}%`;
                        label.textContent = d.speed.toFixed(0);
                    }
                } else if (type === 'ended') {
                    // Reset to beginning
                    stretchNode.port.postMessage({ type: 'seek', data: { position: 0 } });
                    playhead.style.left = '0%';
                    playStartPosition = 0;

                    if (isLooping) {
                        // Restart playback
                        stretchNode.port.postMessage({ type: 'play' });
                        playStartTime = audioContext.currentTime;
                        startPlayheadAnimation();
                        setStatus(playingStatus(), 'active');
                    } else {
                        setStatus('Playback ended.', 'active');
                        isPlaying = false;
                        playBtn.textContent = '▶';
                        stopPlayheadAnimation();
                    }
                }
            };

            setStatus('Audio engine initialized.', 'active');
        }

        // ===== FILE LOADING =====

        async function loadAudioFile(file) {
            try {
                setStatus('Loading...');
                // Fade out the "Load Audio" pulse hint
                const hint = document.getElementById('loadAudioTitle');
                if (hint && hint.classList.contains('pulse-hint')) {
                    hint.classList.add('fade-out');
                    hint.classList.remove('pulse-hint');
                }
                await initAudio();

                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                // Get mono samples (mix down if stereo)
                let samples;
                if (audioBuffer.numberOfChannels === 1) {
                    samples = audioBuffer.getChannelData(0);
                } else {
                    // Mix to mono
                    const left = audioBuffer.getChannelData(0);
                    const right = audioBuffer.getChannelData(1);
                    samples = new Float32Array(left.length);
                    for (let i = 0; i < left.length; i++) {
                        samples[i] = (left[i] + right[i]) / 2;
                    }
                }

                // Remember if we were playing so we can auto-play the new file
                const wasPlaying = isPlaying;

                sourceBuffer = samples;
                sourceSampleRate = audioBuffer.sampleRate;
                gpuProcessedBuffer = null; // invalidate any cached GPU result

                // Fade out old audio if playing, with generous buffer before loading new file
                const FADE_OUT_MS = 50;
                const SILENCE_GAP_MS = 30; // extra silence after fade completes
                if (wasPlaying && stretchGain && audioContext) {
                    const now = audioContext.currentTime;
                    stretchGain.gain.setValueAtTime(stretchGain.gain.value, now);
                    stretchGain.gain.linearRampToValueAtTime(0, now + FADE_OUT_MS / 1000);
                }

                // Stop any active GPU playback
                if (gpuSource) stopGPUSource();

                // Reset playhead and clear any pending resume from algorithm switch
                playStartPosition = 0;
                gpuPlayingSpeed = null;
                playStartTime = audioContext ? audioContext.currentTime : 0;
                playhead.style.left = '0%';
                pendingResume = null;
                isPlaying = false;
                playBtn.textContent = '▶';
                stopPlayheadAnimation();

                // Show duration in time overlay
                const dur = sourceBuffer.length / sourceSampleRate;
                document.getElementById('waveformTime').textContent = `00:00 / ${formatTime(dur)}`;

                const isOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');

                // Load new audio and optionally auto-play.
                // Gain stays at 0 until the new file is actually ready to play.
                const loadNewAudio = () => {
                    if (isOffline) {
                        playBtn.disabled = false;
                        playBtn.classList.add('pulse');
                    } else {
                        stretchNode.port.postMessage({
                            type: 'load-audio',
                            data: { samples: Array.from(samples) }
                        });
                    }

                    // Auto-play new file if old one was playing
                    if (wasPlaying) {
                        if (isOffline) {
                            // Restore gain, then play
                            if (stretchGain && audioContext) {
                                stretchGain.gain.cancelScheduledValues(audioContext.currentTime);
                                stretchGain.gain.setValueAtTime(1, audioContext.currentTime);
                            }
                            togglePlay();
                        } else {
                            // pendingResume: gain restored when worklet confirms 'loaded'
                            pendingResume = { position: 0, shouldPlay: true, restoreGain: true };
                        }
                    } else {
                        // Not auto-playing — just restore gain immediately
                        if (stretchGain && audioContext) {
                            stretchGain.gain.cancelScheduledValues(audioContext.currentTime);
                            stretchGain.gain.setValueAtTime(1, audioContext.currentTime);
                        }
                    }
                };

                if (wasPlaying) {
                    // Wait for fade-out + silence gap before loading new audio
                    setTimeout(loadNewAudio, FADE_OUT_MS + SILENCE_GAP_MS);
                } else {
                    loadNewAudio();
                }

                // Draw waveform (crossfade from previous)
                drawWaveform(samples, { crossfade: true });

                setStatus(`Loaded (${(samples.length / audioBuffer.sampleRate).toFixed(1)}s). Ready to play.`, 'active');

                // Show download panel and stats
                downloadPanel.style.display = '';
                downloadStatus.textContent = 'Ready to export.';
                downloadStatus.className = 'status';
                updateStats();

            } catch (err) {
                setStatus(`Error loading file: ${err.message}`, 'error');
                console.error(err);
            }
        }

        async function loadTestTrack(filename) {
            try {
                setStatus('Loading...');
                const response = await fetch(filename);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const blob = await response.blob();
                const file = new File([blob], filename, { type: 'audio/wav' });
                await loadAudioFile(file);
                lastLoadedTrackFile = filename;
                saveSettings();

            } catch (err) {
                setStatus(`Error loading track: ${err.message}`, 'error');
                console.error(err);
            }
        }

        // ===== PLAYBACK CONTROLS =====

        function togglePlay() {
            const isOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');

            if (isOffline) {
                togglePlayGPU();
                return;
            }

            console.log(`togglePlay called, stretchNode=${!!stretchNode}, isPlaying=${isPlaying}`);
            if (!stretchNode) return;

            playBtn.classList.remove('pulse');

            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (isPlaying) {
                stretchNode.port.postMessage({ type: 'pause' });
                playBtn.textContent = '▶';
                stopPlayheadAnimation();
                const speed = sliderToSpeed(parseFloat(stretchSlider.value));
                const elapsed = audioContext.currentTime - playStartTime;
                playStartPosition += elapsed * speed;
                setStatus('Paused.', 'active');
            } else {
                stretchNode.port.postMessage({ type: 'play' });
                playBtn.textContent = '⏸';
                startPlayheadAnimation();
                setStatus(playingStatus(), 'active');
            }

            isPlaying = !isPlaying;
        }

        // ===== PROCESSING PROGRESS =====
        const progressBar = document.getElementById('progressBar');
        const gpuBadgeEl = document.getElementById('gpuBadge');

        let badgeGlowing = false;

        function showProgress(fraction) {
            const pct = Math.round(fraction * 100);
            // Glow the badge while processing (offline algorithms)
            if (!badgeGlowing && (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi')) {
                badgeGlowing = true;
                gpuBadgeEl.style.transition = 'background 0.3s, box-shadow 0.3s';
                gpuBadgeEl.style.background = 'rgba(91, 168, 160, 0.25)';
                gpuBadgeEl.style.boxShadow = '0 0 8px rgba(91, 168, 160, 0.4)';
            }
            // Waveform bar
            progressBar.style.display = 'block';
            progressBar.style.width = pct + '%';
        }

        function hideProgress() {
            badgeGlowing = false;
            gpuBadgeEl.style.background = 'rgba(91, 168, 160, 0.1)';
            gpuBadgeEl.style.boxShadow = 'none';
            // Fade out the bar
            progressBar.style.opacity = '0';
            setTimeout(() => {
                progressBar.style.display = 'none';
                progressBar.style.width = '0%';
                progressBar.style.opacity = '1';
            }, 200);
        }

        // ===== GPU WAVELET PLAYBACK =====

        async function runOfflineStretch() {
            if (!sourceBuffer || gpuIsProcessing) return null;
            gpuIsProcessing = true;

            const speed = sliderToSpeed(parseFloat(stretchSlider.value));
            const speedLabel = speed < 10 ? speed.toFixed(2) : Math.round(speed);
            const algo = currentAlgorithm; // 'cwt', 'cqt', or 'rtpghi'

            try {
                if (!audioContext) audioContext = new AudioContext();

                const t0 = performance.now();
                let stretched;

                if (algo === 'rtpghi') {
                    // RTPGHI — WASM-accelerated STFT phase gradient stretch
                    const M = parseInt(document.getElementById('rtpghiMSelect').value);
                    const hopDiv = parseInt(document.getElementById('rtpghiHopSelect').value);
                    const windowType = document.getElementById('rtpghiWindowSelect').value;
                    const phaseMode = document.getElementById('rtpghiPhaseSelect').value;
                    const tol = parseFloat(document.getElementById('rtpghiTolSelect').value);
                    const gamma = parseFloat(document.getElementById('rtpghiGammaSelect').value);

                    if (rtpghiWasmReady) {
                        // WASM async path — chunked for progress updates
                        setStatus(`Processing RTPGHI at ${speedLabel}x speed...`, 'active');
                        showProgress(0);
                        stretched = await rtpghiStretchWASMAsync(sourceBuffer, speed,
                            { M, hopDiv, windowType, phaseMode, tol, gamma,
                              onProgress: (frac) => showProgress(frac) });
                    } else {
                        // JS fallback with progress bar
                        setStatus(`Processing RTPGHI at ${speedLabel}x speed...`, 'active');
                        showProgress(0);
                        await new Promise(r => requestAnimationFrame(r));
                        const stretcher = new RTPGHIStretcher({ M, hopDiv, windowType, phaseMode, tol, gamma });
                        stretched = await stretcher.stretch(sourceBuffer, speed, (frame, total) => {
                            showProgress(frame / total);
                        });
                    }
                } else {
                    // CWT / CQT — GPU wavelet stretch
                    const dt = 1.0 / sourceSampleRate;

                    if (!waveletGPU) {
                        setStatus('Initializing WebGPU...', 'active');
                        waveletGPU = new WaveletGPUCompute();
                        await waveletGPU.initialize();
                    }

                    const phaseMode = document.getElementById('phaseModeSelect').value;
                    const interpMode = parseInt(document.getElementById('interpModeSelect').value);
                    const opts = { dt, transform: algo, phaseMode, interpMode };
                    if (algo === 'cwt') {
                        opts.w0 = parseFloat(document.getElementById('w0Select').value);
                        opts.dj = parseFloat(document.getElementById('djSelect').value);
                    } else {
                        opts.binsPerOctave = parseInt(document.getElementById('binsPerOctaveSelect').value);
                        opts.minBW = parseFloat(document.getElementById('minBWSelect').value);
                    }

                    setStatus(`Processing ${algo.toUpperCase()} at ${speedLabel}x speed...`, 'active');
                    showProgress(0);

                    opts.onChunkDone = (ci, total) => {
                        showProgress((ci + 1) / total);
                    };
                    stretched = await waveletGPU.waveletStretchChunked(
                        sourceBuffer, speed, opts
                    );
                }

                // Normalize
                let peak = 0;
                for (let i = 0; i < stretched.length; i++) {
                    const abs = Math.abs(stretched[i]);
                    if (abs > peak) peak = abs;
                }
                if (peak > 0) {
                    const scale = 1.0 / peak;
                    for (let i = 0; i < stretched.length; i++) stretched[i] *= scale;
                }

                const elapsed = performance.now() - t0;
                const buf = audioContext.createBuffer(1, stretched.length, sourceSampleRate);
                buf.getChannelData(0).set(stretched);
                gpuProcessedBuffer = buf;

                updateStats({ processingMs: elapsed });

                setStatus(playingStatus(), 'active');
                drawWaveform(stretched, { crossfade: true });
                return buf;
            } catch (err) {
                setStatus(`Processing error: ${err.message}`, 'error');
                console.error(err);
                return null;
            } finally {
                gpuIsProcessing = false;
                // Snap to 100% instantly (no transition lag), then fade out
                progressBar.style.transition = 'opacity 0.2s ease-out';
                progressBar.style.width = '100%';
                await new Promise(r => requestAnimationFrame(r));
                hideProgress();
                // Restore transition for next run
                setTimeout(() => {
                    progressBar.style.transition = 'width 0.3s ease-out, opacity 0.2s ease-out';
                }, 250);
            }
        }

        function playGPUBuffer(buffer, sourceOffset = 0, fadeIn = true) {
            if (!audioContext || !buffer || !sourceBuffer) return;
            if (audioContext.state === 'suspended') audioContext.resume();

            // Stop previous GPU source (hard stop — use fadeOutGPUSource for crossfade)
            stopGPUSource();

            gpuGain = audioContext.createGain();
            if (!oscAnalyser) {
                oscAnalyser = audioContext.createAnalyser();
                oscAnalyser.fftSize = 2048;
                oscBuffer = new Float32Array(oscAnalyser.fftSize);
                oscAnalyser.connect(audioContext.destination);
                startOscilloscope();
            }
            gpuGain.connect(oscAnalyser);

            gpuSource = audioContext.createBufferSource();
            gpuSource.buffer = buffer;
            gpuSource.connect(gpuGain);
            gpuSource.onended = () => {
                if (!isPlaying) return;
                if (isLooping) {
                    playGPUBuffer(buffer, 0);
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                    startPlayheadAnimation();
                } else {
                    isPlaying = false;
                    playBtn.textContent = '▶';
                    stopPlayheadAnimation();
                    playhead.style.left = '0%';
                    playStartPosition = 0;
                    setStatus('Playback ended.', 'active');
                }
            };

            // All position tracking in source-time
            const speed = sliderToSpeed(parseFloat(stretchSlider.value));
            const sourceDuration = sourceBuffer.length / audioContext.sampleRate;
            playStartPosition = Math.max(0, Math.min(sourceOffset, sourceDuration - 0.01));
            playStartTime = audioContext.currentTime;
            gpuPlayingSpeed = speed;

            // Convert source position → output position for buffer seek
            const outputOffset = Math.min(playStartPosition / speed, buffer.duration - 0.01);

            if (fadeIn) {
                gpuGain.gain.setValueAtTime(0, audioContext.currentTime);
                gpuGain.gain.linearRampToValueAtTime(1, audioContext.currentTime + CROSSFADE_DURATION);
            } else {
                gpuGain.gain.setValueAtTime(1, audioContext.currentTime);
            }
            gpuSource.start(0, outputOffset);
        }

        function fadeOutGPUSource() {
            const oldSrc = gpuSource;
            const oldGain = gpuGain;
            gpuSource = null;
            gpuGain = null;
            if (!oldSrc || !oldGain || !audioContext) return;
            oldSrc.onended = null; // prevent stale ended event
            const now = audioContext.currentTime;
            oldGain.gain.setValueAtTime(oldGain.gain.value, now);
            oldGain.gain.linearRampToValueAtTime(0, now + CROSSFADE_DURATION);
            setTimeout(() => {
                try { oldSrc.stop(); } catch {}
                try { oldSrc.disconnect(); } catch {}
                try { oldGain.disconnect(); } catch {}
            }, CROSSFADE_DURATION * 1000 + 50);
        }

        const GPU_SEEK_FADE = 0.015; // 15ms fade to avoid click

        function stopGPUSource(immediate = false) {
            if (gpuSource) {
                gpuSource.onended = null; // prevent stale ended event from killing new playback
                if (!immediate && gpuGain && audioContext) {
                    // Quick fade-out to avoid click
                    const oldSource = gpuSource;
                    const oldGain = gpuGain;
                    const now = audioContext.currentTime;
                    oldGain.gain.setValueAtTime(oldGain.gain.value, now);
                    oldGain.gain.linearRampToValueAtTime(0, now + GPU_SEEK_FADE);
                    setTimeout(() => {
                        try { oldSource.stop(); } catch {}
                        try { oldSource.disconnect(); } catch {}
                        try { oldGain.disconnect(); } catch {}
                    }, GPU_SEEK_FADE * 1000 + 5);
                } else {
                    try { gpuSource.stop(); } catch {}
                    try { gpuSource.disconnect(); } catch {}
                }
                gpuSource = null;
            }
            if (gpuGain) {
                if (immediate) {
                    try { gpuGain.disconnect(); } catch {}
                }
                gpuGain = null;
            }
        }

        // Get current playback position in source-seconds (unified for both modes)
        // For GPU: optionally pass the speed of the currently-playing buffer
        function getCurrentSourcePosition(overrideSpeed) {
            if (!audioContext) return 0;
            const elapsed = audioContext.currentTime - playStartTime;
            const speed = overrideSpeed || sliderToSpeed(parseFloat(stretchSlider.value));
            return playStartPosition + elapsed * speed;
        }

        async function togglePlayGPU() {
            if (!sourceBuffer) return;
            playBtn.classList.remove('pulse');

            const useStreaming = document.getElementById('streamingCheckbox').checked
                && (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt');

            if (isPlaying) {
                // Pause — lock in source-time position
                const speed = gpuPlayingSpeed || sliderToSpeed(parseFloat(stretchSlider.value));
                const elapsed = audioContext.currentTime - playStartTime;
                playStartPosition += elapsed * speed;

                if (useStreaming && streamingWorklet) {
                    streamingWorklet.port.postMessage({ type: 'pause' });
                } else {
                    stopGPUSource();
                }
                isPlaying = false;
                playBtn.textContent = '▶';
                stopPlayheadAnimation();
                setStatus('Paused.', 'active');
                return;
            }

            // Streaming mode: use ChunkScheduler + progressive worklet
            if (useStreaming) {
                // If we don't have a scheduler yet (or speed changed), start fresh
                if (!chunkScheduler || gpuProcessedBuffer === null) {
                    // Init GPU if needed
                    if (!waveletGPU) {
                        waveletGPU = new WaveletGPUCompute();
                        await waveletGPU.initialize();
                    }
                    await startStreamingPlayback(playStartPosition);
                } else {
                    // Resume existing streaming session
                    streamingWorklet.port.postMessage({ type: 'play' });
                    playStartTime = audioContext.currentTime;
                    gpuPlayingSpeed = chunkScheduler.speed;
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                    startPlayheadAnimation();
                    setStatus(playingStatus(), 'active');
                }
                return;
            }

            // Batch mode (original path)
            if (!gpuProcessedBuffer) {
                playBtn.disabled = true;
                playBtn.textContent = '▶';
                const buf = await runOfflineStretch();
                playBtn.disabled = false;
                if (!buf) {
                    playBtn.textContent = '▶';
                    return;
                }
                playStartPosition = 0; // fresh process starts from beginning
            }

            // Play (sourceOffset in source-time)
            playGPUBuffer(gpuProcessedBuffer, playStartPosition);
            isPlaying = true;
            playBtn.textContent = '⏸';
            startPlayheadAnimation(); // unified animation works for both modes
            setStatus(playingStatus(), 'active');
        }

        // Process GPU stretch in background, then crossfade from whatever is currently playing.
        // playbackSpeed: the speed of the currently-playing audio (for correct position calc during await)
        async function processAndCrossfadeGPU(playbackSpeed) {
            if (!sourceBuffer) return;

            const buf = await runOfflineStretch();
            if (!buf) return;

            // If user switched away from offline algo while we were processing, don't crossfade
            if (currentAlgorithm !== 'cwt' && currentAlgorithm !== 'cqt' && currentAlgorithm !== 'rtpghi') return;

            if (!isPlaying) {
                // Not playing — just cache the result, ready for next Play press
                playStartPosition = 0;
                return;
            }

            // Calculate current source position
            // Use playbackSpeed if provided (old buffer plays at different rate than current slider)
            const sourcePos = getCurrentSourcePosition(playbackSpeed);

            // Fade out whatever is currently playing
            if (gpuSource) {
                fadeOutGPUSource();
            } else if (stretchNode && stretchGain) {
                // Fade out old worklet
                const oldNode = stretchNode;
                const oldGain = stretchGain;
                const now = audioContext.currentTime;
                oldGain.gain.setValueAtTime(oldGain.gain.value, now);
                oldGain.gain.linearRampToValueAtTime(0, now + CROSSFADE_DURATION);
                setTimeout(() => {
                    oldNode.port.postMessage({ type: 'pause' });
                    // Don't disconnect the worklet — we may switch back to it
                }, CROSSFADE_DURATION * 1000 + 50);
            }

            // Start new GPU buffer with crossfade (sourcePos is in source-time)
            playGPUBuffer(buf, sourcePos, true);
            startPlayheadAnimation();
            setStatus(playingStatus(), 'active');
        }

        // GPU animation removed — unified startPlayheadAnimation() handles both modes
        // since all position tracking is now in source-time

        // ===== STREAMING RENDER-AHEAD PLAYBACK =====

        /**
         * Initialize the streaming worklet for progressive wavelet playback.
         * Uses the wavelet-stretch-processor with init-buffer + append-chunk messages.
         */
        async function initStreamingWorklet(totalOutputLength) {
            if (!audioContext) audioContext = new AudioContext();
            if (audioContext.state === 'suspended') await audioContext.resume();

            // Load worklet module if not already loaded
            if (!streamingWorklet) {
                await audioContext.audioWorklet.addModule('workers/wavelet-stretch-processor.js');
                streamingWorklet = new AudioWorkletNode(audioContext, 'wavelet-stretch-processor', {
                    processorOptions: { speed: 1.0 }
                });

                // Set up gain node
                streamingGain = audioContext.createGain();
                if (!oscAnalyser) {
                    oscAnalyser = audioContext.createAnalyser();
                    oscAnalyser.fftSize = 2048;
                    oscBuffer = new Float32Array(oscAnalyser.fftSize);
                    oscAnalyser.connect(audioContext.destination);
                    startOscilloscope();
                }
                streamingWorklet.connect(streamingGain);
                streamingGain.connect(oscAnalyser);

                // Listen for worklet messages
                streamingWorklet.port.onmessage = (event) => {
                    const { type } = event.data;
                    if (type === 'underrun') {
                        console.log('%c[Streaming] Buffer underrun at position ' +
                            event.data.position, 'color: #E8A838');
                    } else if (type === 'underrun-resolved') {
                        console.log('%c[Streaming] Underrun resolved at position ' +
                            event.data.position, 'color: #7EB8B0');
                    } else if (type === 'ended') {
                        if (isPlaying && isLooping) {
                            // Loop: seek back to start
                            streamingWorklet.port.postMessage({
                                type: 'seek', data: { position: 0 }
                            });
                            streamingWorklet.port.postMessage({ type: 'play' });
                            playStartPosition = 0;
                            playStartTime = audioContext.currentTime;
                        } else {
                            isPlaying = false;
                            playBtn.textContent = '▶';
                            stopPlayheadAnimation();
                            playhead.style.left = '0%';
                            playStartPosition = 0;
                            setStatus('Playback ended.', 'active');
                        }
                    }
                };
            }

            // Initialize the buffer in the worklet
            streamingWorklet.port.postMessage({
                type: 'init-buffer',
                data: { totalLength: totalOutputLength }
            });
        }

        /**
         * Send a completed chunk to the streaming worklet.
         * The chunk data comes from the ChunkScheduler's master output buffer.
         */
        function sendChunkToWorklet(scheduler, chunkIndex, outputRange) {
            if (!streamingWorklet) return;

            // Extract the chunk region from the master output buffer
            const chunkData = scheduler.output.slice(outputRange.start, outputRange.end);

            streamingWorklet.port.postMessage({
                type: 'append-chunk',
                data: {
                    samples: chunkData,
                    offset: outputRange.start
                }
            });
        }

        /**
         * Start streaming playback — the main entry point.
         *
         * Creates a ChunkScheduler, inits the worklet, starts computing from
         * the playhead, and begins playback after the first chunk completes.
         */
        async function startStreamingPlayback(sourceOffset = 0) {
            if (!sourceBuffer || !waveletGPU) return;
            if (gpuIsProcessing) return; // prevent double-start

            gpuIsProcessing = true;
            const speed = sliderToSpeed(parseFloat(stretchSlider.value));
            const dt = 1.0 / sourceSampleRate;

            const phaseMode = document.getElementById('phaseModeSelect').value;
            const interpMode = parseInt(document.getElementById('interpModeSelect').value);
            const algo = currentAlgorithm;

            const opts = {
                dt,
                transform: algo,
                phaseMode,
                interpMode,
                w0: parseFloat(document.getElementById('w0Select').value),
                dj: parseFloat(document.getElementById('djSelect').value),
                binsPerOctave: parseInt(document.getElementById('binsPerOctaveSelect').value),
                fMin: 20,
                minBW: parseFloat(document.getElementById('minBWSelect').value)
            };

            // Initialize GPU if needed
            if (!waveletGPU.initialized) {
                setStatus('Initializing WebGPU...', 'active');
                await waveletGPU.initialize();
            }

            // Create the scheduler — computes into its own output buffer (main thread)
            // WITHOUT touching the worklet yet. Old audio keeps playing.
            chunkScheduler = new ChunkScheduler(sourceBuffer, speed, waveletGPU, opts);
            const scheduler = chunkScheduler; // local capture for closures

            // Set priority from the playhead position
            const playheadSample = Math.floor(sourceOffset * sourceSampleRate);
            scheduler.setPriority(playheadSample);

            let firstChunkSent = false;
            const startTime = performance.now();
            const oldWasPlaying = isPlaying; // remember if old audio was playing

            // On each chunk ready: first chunk triggers crossfade swap
            scheduler.onChunkReady = async (ci, total, outputRange) => {
                // Bail if a newer scheduler replaced us
                if (chunkScheduler !== scheduler) return;

                drawChunkMap();

                if (!firstChunkSent) {
                    firstChunkSent = true;
                    const elapsed = (performance.now() - startTime).toFixed(0);
                    console.log(
                        `%c[Streaming] First chunk ready in ${elapsed}ms — crossfading to new buffer`,
                        'color: #7EB8B0; font-weight: bold'
                    );

                    // Now it's safe to swap: fade out old → init new buffer → send chunks → fade in
                    await initStreamingWorklet(scheduler.totalOutputLen);

                    // Send all chunks computed so far
                    for (let i = 0; i < scheduler.numChunks; i++) {
                        if (scheduler.chunkStatus[i] === 2) {
                            const range = scheduler.chunkOutputRange(i);
                            sendChunkToWorklet(scheduler, i, range);
                        }
                    }

                    // Crossfade: fade out → seek → play → fade in
                    const now = audioContext.currentTime;
                    const fadeDur = CROSSFADE_DURATION;

                    if (oldWasPlaying && streamingGain) {
                        // Gain was already at 1 from old playback — fade out
                        streamingGain.gain.setValueAtTime(streamingGain.gain.value, now);
                        streamingGain.gain.linearRampToValueAtTime(0, now + fadeDur * 0.5);
                    }

                    // After fade-out completes, seek and start new buffer, fade in
                    const swapDelay = oldWasPlaying ? fadeDur * 0.5 : 0;
                    setTimeout(() => {
                        if (chunkScheduler !== scheduler) return; // stale
                        const seekPos = sourceOffset / speed;
                        streamingWorklet.port.postMessage({
                            type: 'seek', data: { position: seekPos }
                        });
                        streamingWorklet.port.postMessage({ type: 'play' });

                        // Fade in
                        const t = audioContext.currentTime;
                        streamingGain.gain.setValueAtTime(0, t);
                        streamingGain.gain.linearRampToValueAtTime(1, t + fadeDur);

                        // Update UI state
                        playStartPosition = sourceOffset;
                        playStartTime = audioContext.currentTime;
                        gpuPlayingSpeed = speed;
                        isPlaying = true;
                        playBtn.textContent = '⏸';
                        playBtn.disabled = false;
                        startPlayheadAnimation();
                        setStatus(`Streaming ${algoNames[algo] || algo} at ${speed < 10 ? speed.toFixed(2) : Math.round(speed)}x...`, 'active');
                    }, swapDelay * 1000);
                } else {
                    // Subsequent chunks — just send to worklet
                    sendChunkToWorklet(scheduler, ci, outputRange);
                }
            };

            scheduler.onProgress = (completed, total) => {
                if (chunkScheduler !== scheduler) return;
                showProgress(completed / total);
            };

            scheduler.onComplete = () => {
                if (chunkScheduler !== scheduler) return; // stale scheduler
                gpuIsProcessing = false;
                const totalMs = performance.now() - startTime;

                // Normalize to peak if checkbox is checked
                if (document.getElementById('normalizeCheckbox').checked) {
                    let peak = 0;
                    for (let i = 0; i < scheduler.output.length; i++) {
                        const abs = Math.abs(scheduler.output[i]);
                        if (abs > peak) peak = abs;
                    }
                    if (peak > 0 && peak !== 1) {
                        const scale = 1.0 / peak;
                        for (let i = 0; i < scheduler.output.length; i++) {
                            scheduler.output[i] *= scale;
                        }
                        // Re-send normalized buffer to worklet
                        streamingWorklet.port.postMessage({
                            type: 'load-audio',
                            data: { samples: scheduler.output }
                        });
                        // Seek back to current position (load-audio resets to 0)
                        if (isPlaying && audioContext) {
                            const elapsed = audioContext.currentTime - playStartTime;
                            const currentPos = playStartPosition + elapsed * speed;
                            const seekPos = currentPos / speed;
                            streamingWorklet.port.postMessage({
                                type: 'seek', data: { position: seekPos }
                            });
                            streamingWorklet.port.postMessage({ type: 'play' });
                        }
                    }
                }

                // Cache for the batch path
                const buf = audioContext.createBuffer(1, scheduler.output.length, sourceSampleRate);
                buf.getChannelData(0).set(scheduler.output);
                gpuProcessedBuffer = buf;

                drawWaveform(scheduler.output, { crossfade: false });
                drawChunkMap();
                hideProgress();
                updateStats({ processingMs: totalMs });

                const name = algoNames[algo] || algo;
                const val = speed < 10 ? speed.toFixed(2) : Math.round(speed);
                setStatus(`Streaming complete — ${name} at ${val}x`, 'active');
            };

            // Start computing! First chunk → playback, rest in background.
            setStatus(`Computing chunks...`, 'active');
            playBtn.disabled = true;
            showProgress(0);

            // Fire and forget — the scheduler runs asynchronously
            chunkScheduler.run();
        }

        /**
         * Handle seek in streaming mode — reprioritize the chunk scheduler.
         */
        function streamingSeek(sourcePosition) {
            if (!chunkScheduler || !streamingWorklet) return;

            // Reprioritize chunks from new position
            const playheadSample = Math.floor(sourcePosition * sourceSampleRate);
            chunkScheduler.reprioritize(playheadSample);

            // Seek the worklet
            const seekPos = sourcePosition / chunkScheduler.speed;
            streamingWorklet.port.postMessage({
                type: 'seek', data: { position: seekPos }
            });

            playStartPosition = sourcePosition;
            playStartTime = audioContext.currentTime;

            drawChunkMap();

            // If scheduler stopped (all chunks were done or aborted), restart
            if (!chunkScheduler.isRunning && chunkScheduler.queue.length > 0) {
                chunkScheduler.run();
            }
        }

        function stop() {
            const isOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');

            if (isOffline) {
                // Stop streaming mode
                if (chunkScheduler) {
                    chunkScheduler.abort();
                    chunkScheduler = null;
                }
                if (streamingWorklet) {
                    streamingWorklet.port.postMessage({ type: 'pause' });
                }
                stopGPUSource();
                gpuPlayingSpeed = null;
                document.getElementById('chunkMapCanvas').style.display = 'none';
            } else if (stretchNode) {
                stretchNode.port.postMessage({ type: 'pause' });
                stretchNode.port.postMessage({ type: 'seek', data: { position: 0 } });
            }

            gpuIsProcessing = false;
            playBtn.textContent = '▶';
            playBtn.disabled = false;
            isPlaying = false;
            stopPlayheadAnimation();
            playhead.style.left = '0%';
            playStartPosition = 0;
            setStatus('Stopped.', 'active');
        }

        // ===== PLAYHEAD ANIMATION =====

        function startPlayheadAnimation() {
            stopPlayheadAnimation();
            playStartTime = audioContext.currentTime;
            animationFrameId = requestAnimationFrame(updatePlayhead);
        }

        function stopPlayheadAnimation() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        function formatTime(seconds) {
            const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
            const ss = String(Math.floor(seconds % 60)).padStart(2, '0');
            return `${mm}:${ss}`;
        }

        function updatePlayhead() {
            if (!isPlaying || !sourceBuffer || !audioContext) return;

            // For offline/streaming: the buffer plays at the speed it was rendered at,
            // not wherever the slider is mid-drag. Use gpuPlayingSpeed if available.
            const isOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');
            const speed = (isOffline && gpuPlayingSpeed) ? gpuPlayingSpeed : sliderToSpeed(parseFloat(stretchSlider.value));
            const elapsed = audioContext.currentTime - playStartTime;

            // We advance through source at the current speed
            const sourceElapsed = elapsed * speed;
            const currentSourcePosition = playStartPosition + sourceElapsed;

            const sourceDuration = sourceBuffer.length / audioContext.sampleRate;
            const ratio = Math.min(currentSourcePosition / sourceDuration, 1);

            playhead.style.left = `${ratio * 100}%`;

            // Update time overlay
            const timeEl = document.getElementById('waveformTime');
            timeEl.textContent = `${formatTime(currentSourcePosition)} / ${formatTime(sourceDuration)}`;

            if (ratio < 1) {
                animationFrameId = requestAnimationFrame(updatePlayhead);
            }
        }

        // ===== VISUALIZATION =====

        function drawWaveform(samples, { crossfade = false } = {}) {
            const canvas = waveformCanvas;
            const container = canvas.parentElement;

            // Snapshot old waveform as background for crossfade
            if (crossfade && canvas.width > 0 && canvas.height > 0) {
                try {
                    container.style.backgroundImage = `url(${canvas.toDataURL()})`;
                    container.style.backgroundSize = '100% 100%';
                } catch (e) { /* ignore tainted canvas */ }
                canvas.style.transition = 'none';
                canvas.style.opacity = '0';
            }

            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;

            // Set canvas size
            canvas.width = canvas.offsetWidth * dpr;
            canvas.height = canvas.offsetHeight * dpr;
            ctx.scale(dpr, dpr);

            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;

            // Clear
            ctx.fillStyle = '#0A0A0E';
            ctx.fillRect(0, 0, width, height);

            // Draw waveform
            ctx.strokeStyle = '#B89870';
            ctx.lineWidth = 1;
            ctx.beginPath();

            const samplesPerPixel = Math.floor(samples.length / width);
            for (let x = 0; x < width; x++) {
                const start = x * samplesPerPixel;
                const end = start + samplesPerPixel;

                let min = 1;
                let max = -1;
                for (let i = start; i < end && i < samples.length; i++) {
                    if (samples[i] < min) min = samples[i];
                    if (samples[i] > max) max = samples[i];
                }

                const yMin = (1 - max) * height / 2;
                const yMax = (1 - min) * height / 2;

                if (x === 0) {
                    ctx.moveTo(x, yMin);
                }
                ctx.lineTo(x, yMin);
                ctx.lineTo(x, yMax);
            }

            ctx.stroke();

            // Center line
            ctx.strokeStyle = 'rgba(91, 168, 160, 0.15)';
            ctx.beginPath();
            ctx.moveTo(0, height / 2);
            ctx.lineTo(width, height / 2);
            ctx.stroke();

            // Time axis ticks
            const duration = samples.length / (sourceSampleRate || 44100);
            if (duration > 0) {
                // Pick nice tick interval based on duration
                let tickInterval;
                if (duration <= 2) tickInterval = 0.25;
                else if (duration <= 5) tickInterval = 0.5;
                else if (duration <= 15) tickInterval = 1;
                else if (duration <= 60) tickInterval = 5;
                else if (duration <= 300) tickInterval = 30;
                else tickInterval = 60;

                const tickH = 4;
                const miniTickH = 2;
                ctx.fillStyle = 'rgba(160, 160, 170, 0.5)';
                ctx.strokeStyle = 'rgba(160, 160, 170, 0.3)';
                ctx.lineWidth = 0.5;
                ctx.font = '9px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';

                // Sub-ticks (half intervals)
                const subInterval = tickInterval / 2;
                for (let t = subInterval; t < duration; t += tickInterval) {
                    const x = (t / duration) * width;
                    ctx.beginPath();
                    ctx.moveTo(x, height - miniTickH);
                    ctx.lineTo(x, height);
                    ctx.stroke();
                }

                // Main ticks with vertical guide lines and labels
                for (let t = 0; t <= duration; t += tickInterval) {
                    const x = (t / duration) * width;

                    // Faint vertical guide line (full height)
                    if (t > 0 && x < width - 10) {
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, height);
                        ctx.stroke();
                    }

                    // Bottom tick mark
                    ctx.strokeStyle = 'rgba(160, 160, 170, 0.3)';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(x, height - tickH);
                    ctx.lineTo(x, height);
                    ctx.stroke();

                    // Label — right of the line
                    if (t > 0 && x < width - 20) {
                        let label;
                        if (tickInterval >= 60) label = Math.round(t / 60) + 'm';
                        else if (t % 1 === 0) label = Math.round(t) + 's';
                        else label = t.toFixed(1) + 's';
                        ctx.textAlign = 'left';
                        ctx.fillText(label, x + 3, height - tickH - 1);
                    }
                }
                ctx.textAlign = 'center'; // restore default
            }

            // Crossfade: transition new waveform in over old background
            if (crossfade) {
                requestAnimationFrame(() => {
                    canvas.style.transition = 'opacity 0.4s ease-in-out';
                    canvas.style.opacity = '1';
                    // Clean up background after transition
                    setTimeout(() => {
                        container.style.backgroundImage = '';
                        container.style.backgroundSize = '';
                    }, 450);
                });
            }
        }

        // ===== GLASS OSCILLOSCOPE =====

        function startOscilloscope() {
            const canvas = document.getElementById('oscCanvas');
            const ctx = canvas.getContext('2d', { alpha: true });
            const w = canvas.width;
            const h = canvas.height;
            let scrollOffset = 0;
            const circBuf = new Float32Array(1024);
            let circWrite = 0;

            function renderOsc() {
                oscRAF = requestAnimationFrame(renderOsc);
                if (!oscAnalyser) return;

                // Pull fresh samples
                oscAnalyser.getFloatTimeDomainData(oscBuffer);
                for (let i = 0; i < 128; i++) {
                    circBuf[circWrite] = oscBuffer[i];
                    circWrite = (circWrite + 1) % circBuf.length;
                }

                // Measure energy for glow
                let energy = 0;
                for (let i = 0; i < 128; i++) energy += Math.abs(oscBuffer[i]);
                energy = Math.min(1, energy / 20);

                ctx.clearRect(0, 0, w, h);

                // Center line
                ctx.strokeStyle = 'rgba(80, 90, 140, 0.15)';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(0, h / 2);
                ctx.lineTo(w, h / 2);
                ctx.stroke();

                // Waveform
                const alpha = 0.15 + energy * 0.85;
                ctx.strokeStyle = `rgba(255, 130, 90, ${alpha})`;
                ctx.lineWidth = 1.2;
                ctx.shadowColor = `rgba(255, 100, 60, ${energy * 0.6})`;
                ctx.shadowBlur = energy * 8;
                ctx.beginPath();

                scrollOffset = (scrollOffset + 2) % circBuf.length;
                const samplesPerPx = circBuf.length / w;
                for (let x = 0; x < w; x++) {
                    const idx = Math.floor((scrollOffset + x * samplesPerPx) % circBuf.length);
                    const y = h / 2 - circBuf[idx] * h * 0.8;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            renderOsc();
        }

        // ===== UTILITY =====

        const algoNames = { resample: 'Resample', spectral: 'Spectral', paul: 'Paul Stretch', granular: 'Granular', cwt: 'CWT', cqt: 'CQT', rtpghi: 'RTPGHI' };

        function playingStatus() {
            const speed = sliderToSpeed(parseFloat(stretchSlider.value));
            const name = algoNames[currentAlgorithm] || currentAlgorithm;
            const val = speed < 10 ? speed.toFixed(2) : Math.round(speed);
            return `Playing ${name} at ${val}x speed...`;
        }

        function setStatus(message, type = '') {
            status.textContent = message;
            status.className = 'status ' + type;
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // ===== EVENT LISTENERS =====

        // File drop zone
        loadFileBtn.addEventListener('click', () => fileInput.click());
        const fileDrop = document.getElementById('fileDrop');
        fileDrop.addEventListener('click', () => fileInput.click());
        fileDrop.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDrop.style.borderColor = '#4A9E9E';
            fileDrop.style.color = '#4A9E9E';
        });
        fileDrop.addEventListener('dragleave', () => {
            fileDrop.style.borderColor = '#3A3B42';
            fileDrop.style.color = '#555';
        });
        fileDrop.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDrop.style.borderColor = '#3A3B42';
            fileDrop.style.color = '#555';
            if (e.dataTransfer.files.length > 0) {
                lastLoadedTrackFile = null;
                trackSelect.value = '';
                saveSettings();
                loadAudioFile(e.dataTransfer.files[0]);
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                lastLoadedTrackFile = null;
                trackSelect.value = '';
                saveSettings();
                loadAudioFile(e.target.files[0]);
            }
        });

        // Playback controls
        playBtn.addEventListener('click', togglePlay);

        loopBtn.addEventListener('click', () => {
            isLooping = !isLooping;
            loopBtn.classList.toggle('active', isLooping);
            saveSettings();
        });

        // Speed slider
        // Track last speed for playhead calculation
        let lastSpeed = sliderToSpeed(parseFloat(stretchSlider.value));

        stretchSlider.addEventListener('input', (e) => {
            const sliderValue = parseFloat(e.target.value);
            const speed = sliderToSpeed(sliderValue);
            stretchValue.textContent = (speed < 10 ? speed.toFixed(2) : Math.round(speed)) + 'x';
            updateStats({ speed });

            const isOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');
            if (isOffline) {
                // During drag: update speed label only. Status bar, playhead,
                // and audio untouched. Recompute happens on 'change' (release).
                return;
            }

            if (isPlaying) setStatus(playingStatus(), 'active');

            // Lock in current position before changing speed
            if (isPlaying && audioContext) {
                const elapsed = audioContext.currentTime - playStartTime;
                playStartPosition += elapsed * lastSpeed;
                playStartTime = audioContext.currentTime;
            }
            lastSpeed = speed;

            if (stretchNode) {
                stretchNode.port.postMessage({ type: 'set-speed', data: { speed } });
            }

            // Auto-play realtime algorithms on speed change if audio is loaded
            if (!isPlaying && sourceBuffer && stretchNode) {
                stretchNode.port.postMessage({ type: 'play' });
                isPlaying = true;
                playBtn.textContent = '⏸';
                if (!audioContext) audioContext = new AudioContext();
                playStartTime = audioContext.currentTime;
                startPlayheadAnimation();
                setStatus(playingStatus(), 'active');
            }
            saveSettings();
        });

        // Speed slider release — recompute for offline/GPU algorithms
        stretchSlider.addEventListener('change', async (e) => {
            const speed = sliderToSpeed(parseFloat(e.target.value));
            const isOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');
            if (!isOffline || !sourceBuffer) return;

            gpuProcessedBuffer = null; // invalidate cache

            // Abort any in-flight streaming computation (but keep worklet playing!)
            if (chunkScheduler && chunkScheduler.isRunning) {
                chunkScheduler.abort();
                chunkScheduler = null;
            }

            // Lock in source position using the OLD playing speed
            if (isPlaying && audioContext) {
                const rate = gpuPlayingSpeed || lastSpeed;
                const elapsed = audioContext.currentTime - playStartTime;
                playStartPosition += elapsed * rate;
                playStartTime = audioContext.currentTime;
            }
            lastSpeed = speed;

            const useStreaming = document.getElementById('streamingCheckbox').checked
                && (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt');

            if (useStreaming) {
                // Old audio keeps playing — startStreamingPlayback computes
                // in background, crossfades when first chunk is ready.
                await startStreamingPlayback(playStartPosition);
            } else if (!isPlaying) {
                playStartPosition = 0;
                const buf = await runOfflineStretch();
                if (buf && (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi')) {
                    if (!audioContext) audioContext = new AudioContext();
                    playGPUBuffer(buf, 0, true);
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                    startPlayheadAnimation();
                    setStatus(playingStatus(), 'active');
                }
            } else {
                processAndCrossfadeGPU(gpuPlayingSpeed);
            }
            saveSettings();
        });

        // Window size / Grain size
        windowSelect.addEventListener('change', (e) => {
            const value = parseInt(e.target.value);
            if (windowValue) windowValue.textContent = value;
            if (stretchNode) {
                if (currentAlgorithm === 'spectral' || currentAlgorithm === 'paul') {
                    stretchNode.port.postMessage({ type: 'set-window-size', data: { size: value } });
                } else {
                    stretchNode.port.postMessage({ type: 'set-grain-size', data: { size: value } });
                }
            }
            saveSettings();
        });

        // Overlap
        overlapSlider.addEventListener('input', (e) => {
            const value = parseFloat(e.target.value);
            overlapValue.textContent = value.toFixed(1);
            // Save value for granular (only if granular is active)
            if (currentAlgorithm === 'granular') {
                savedGranularOverlap = value;
            }
            if (stretchNode) {
                stretchNode.port.postMessage({ type: 'set-overlap', data: { overlap: value / 100 } });
            }
            saveSettings();
        });

        document.getElementById('mouseSmoothSlider').addEventListener('input', (e) => {
            mouseSmoothing = parseInt(e.target.value);
            document.getElementById('mouseSmoothValue').textContent = mouseSmoothing;
            updateSliderFill(e.target);
            if (stretchNode && currentAlgorithm === 'resample') {
                stretchNode.port.postMessage({ type: 'set-scrub-cutoff', data: { value: mouseSmoothing } });
            }
            saveSettings();
        });

        document.getElementById('platterInertiaSlider').addEventListener('input', (e) => {
            platterInertia = parseInt(e.target.value);

        function scrubPinLoop() {
            if (!isScrubbing) return;
            scrubCurrentRatio += (scrubTargetRatio - scrubCurrentRatio) * SCRUB_LERP;
            if (Math.abs(scrubTargetRatio - scrubCurrentRatio) < 0.0001) {

        // ===== DOWNLOAD =====

        function encodeWAV(samples, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const bytesPerSample = bitsPerSample / 8;
            const dataLength = samples.length * bytesPerSample;
            const buffer = new ArrayBuffer(44 + dataLength);
            const view = new DataView(buffer);

            const writeString = (offset, str) => {
                for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * bytesPerSample, true);
            view.setUint16(32, numChannels * bytesPerSample, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(36, 'data');
            view.setUint32(40, dataLength, true);

            let offset = 44;
            for (let i = 0; i < samples.length; i++) {
                const s = Math.max(-1, Math.min(1, samples[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }

            return new Blob([buffer], { type: 'audio/wav' });
        }

        async function renderAndDownload() {
            if (!sourceBuffer) return;

            const speed = sliderToSpeed(parseFloat(stretchSlider.value));
            const speedLabel = speed < 10 ? speed.toFixed(2) : Math.round(speed);
            const sampleRate = audioContext ? audioContext.sampleRate : 48000;
            const outputLength = Math.ceil(sourceBuffer.length / speed);
            const algo = algorithmSelect.value;

            downloadBtn.disabled = true;
            downloadStatus.textContent = `Rendering ${algo} at ${speedLabel}x speed...`;
            downloadStatus.className = 'status active';

            try {
                const offlineCtx = new OfflineAudioContext(1, outputLength, sampleRate);

                let processorName, processorOptions;
                if (algo === 'resample') {
                    await offlineCtx.audioWorklet.addModule('workers/resample-stretch-processor.js');
                    processorName = 'resample-stretch-processor';
                    processorOptions = { speed };
                } else if (algo === 'spectral') {
                    await offlineCtx.audioWorklet.addModule('workers/spectral-stretch-processor.js');
                    processorName = 'spectral-stretch-processor';
                    processorOptions = {
                        windowSize: parseInt(windowSelect.value),
                        speed,
                        overlap: parseFloat(overlapSlider.value) / 100
                    };
                } else if (algo === 'paul') {
                    await offlineCtx.audioWorklet.addModule('workers/paul-stretch-processor.js');
                    processorName = 'paul-stretch-processor';
                    processorOptions = {
                        windowSize: parseInt(windowSelect.value),
                        speed
                    };
                } else if (algo === 'granular') {
                    await offlineCtx.audioWorklet.addModule('workers/granular-stretch-processor.js');
                    processorName = 'granular-stretch-processor';
                    processorOptions = {
                        speed,
                        grainSize: parseInt(windowSelect.value),
                        overlap: parseFloat(overlapSlider.value) / 100,
                        scatter: 0.1
                    };
                } else if (algo === 'cwt' || algo === 'cqt' || algo === 'rtpghi') {
                    // Offline algorithms — process directly, skip OfflineAudioContext
                    downloadStatus.textContent = `Processing ${algo.toUpperCase()} at ${speedLabel}x speed...`;
                    const buf = gpuProcessedBuffer || await runOfflineStretch();
                    if (!buf) throw new Error('Processing failed');
                    const outputSamples = buf.getChannelData(0);

                    downloadStatus.textContent = 'Encoding WAV...';
                    const blob = encodeWAV(outputSamples, sampleRate);

                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `speed_${algo}_${speedLabel}x.wav`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    const sizeMB = (blob.size / (1024 * 1024)).toFixed(1);
                    const durationSec = (outputSamples.length / sampleRate).toFixed(1);
                    downloadStatus.textContent = `Downloaded! ${durationSec}s, ${sizeMB} MB`;
                    downloadStatus.className = 'status active';
                    downloadBtn.disabled = false;
                    return;
                } else {
                    throw new Error(`Download not yet supported for ${algo} algorithm`);
                }

                const node = new AudioWorkletNode(offlineCtx, processorName, { processorOptions });
                node.connect(offlineCtx.destination);

                await new Promise((resolve, reject) => {
                    node.port.onmessage = (event) => {
                        if (event.data.type === 'loaded') resolve();
                    };
                    node.port.postMessage({
                        type: 'load-audio',
                        data: { samples: Array.from(sourceBuffer) }
                    });
                    setTimeout(() => reject(new Error('Worklet load timeout')), 10000);
                });

                node.port.postMessage({ type: 'play' });

                downloadStatus.textContent = 'Rendering audio...';
                const renderedBuffer = await offlineCtx.startRendering();
                const outputSamples = renderedBuffer.getChannelData(0);

                downloadStatus.textContent = 'Encoding WAV...';
                const blob = encodeWAV(outputSamples, sampleRate);

                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const algoNames = { resample: 'resample', spectral: 'spectral', paul: 'paulstretch', granular: 'granular', cwt: 'cwt', cqt: 'cqt' };
                a.download = `speed_${algoNames[algo] || algo}_${speedLabel}x.wav`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                const sizeMB = (blob.size / (1024 * 1024)).toFixed(1);
                const durationSec = (outputSamples.length / sampleRate).toFixed(1);
                downloadStatus.textContent = `Downloaded! ${durationSec}s, ${sizeMB} MB`;
                downloadStatus.className = 'status active';

            } catch (err) {
                downloadStatus.textContent = `Export error: ${err.message}`;
                downloadStatus.className = 'status error';
                console.error('Download error:', err);
            } finally {
                downloadBtn.disabled = false;
            }
        }

        downloadBtn.addEventListener('click', renderAndDownload);

        // Upgrade all native <select> elements to custom dropdowns
        upgradeAllSelects();

        // Eagerly load RTPGHI WASM (non-blocking), refresh badge when ready
        initRTPGHIWasm().then(() => {
            updateControlVisibility(currentAlgorithm);
        }).catch(() => {});
    </script>
</body>
</html>
