        let isPlaying = false;
        let isLooping = false;
        let currentAlgorithm = 'paul';

        // GPU wavelet state
        let waveletGPU = null;
        let gpuProcessedBuffer = null;  // AudioBuffer from GPU stretch
        let gpuSource = null;           // AudioBufferSourceNode for GPU playback
        let gpuGain = null;             // GainNode for GPU playback
        let gpuIsProcessing = false;
        let gpuPlayingStretch = null;   // stretch factor of currently-playing GPU buffer

        // Crossfade settings
        const CROSSFADE_DURATION = 0.15; // 150ms crossfade

        // Playhead tracking
        let playStartTime = 0;
        let playStartPosition = 0; // Position in source (seconds)
        let animationFrameId = null;

        // For resuming after algorithm switch
        let pendingResume = null; // { position, shouldPlay }

        // Saved overlap value for granular (since Paul uses fixed 50%)
        let savedGranularOverlap = 90;

        // ===== DOM ELEMENTS =====
        const fileDrop = document.getElementById('fileDrop');
        const fileInput = document.getElementById('fileInput');
        const trackList = document.getElementById('trackList');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const loopBtn = document.getElementById('loopBtn');
        const stretchSlider = document.getElementById('stretchSlider');
        const stretchValue = document.getElementById('stretchValue');
        const windowSelect = document.getElementById('windowSelect');
        const windowValue = document.getElementById('windowValue');
        const windowLabel = document.getElementById('windowLabel');
        const overlapSlider = document.getElementById('overlapSlider');
        const overlapValue = document.getElementById('overlapValue');
        const algorithmSelect = document.getElementById('algorithmSelect');
        const waveformCanvas = document.getElementById('waveformCanvas');
        const playhead = document.getElementById('playhead');
        const status = document.getElementById('status');
        const downloadPanel = document.getElementById('downloadPanel');
        const downloadBtn = document.getElementById('downloadBtn');
        const downloadStatus = document.getElementById('downloadStatus');

        // ===== UTILITY FUNCTIONS =====

        // Exponential mapping for stretch slider: more resolution at low values
        // slider 0-100 → stretch 0.1-10 exponentially (slider 50 = 1x)
        function sliderToStretch(sliderValue) {
            return Math.pow(10, sliderValue / 50 - 1);
        }

        // ===== INITIALIZATION =====

        async function initAudio() {
            if (audioContext) return;

            audioContext = new AudioContext();

            // Load all worklet modules
            await audioContext.audioWorklet.addModule('workers/resample-stretch-processor.js');
            await audioContext.audioWorklet.addModule('workers/spectral-stretch-processor.js');
            await audioContext.audioWorklet.addModule('workers/paul-stretch-processor.js');
            await audioContext.audioWorklet.addModule('workers/granular-stretch-processor.js');

            createStretchNode();
        }

        function createStretchNode(startGain = 1, skipDisconnect = false) {
            // Disconnect old node if exists (skip when doing crossfade)
            if (!skipDisconnect) {
                if (stretchNode) {
                    stretchNode.disconnect();
                }
                if (stretchGain) {
                    stretchGain.disconnect();
                }
            }

            currentAlgorithm = algorithmSelect.value;

            if (currentAlgorithm === 'resample') {
                stretchNode = new AudioWorkletNode(audioContext, 'resample-stretch-processor', {
                    processorOptions: {
                        stretchFactor: sliderToStretch(parseFloat(stretchSlider.value))
                    }
                });
            } else if (currentAlgorithm === 'spectral') {
                stretchNode = new AudioWorkletNode(audioContext, 'spectral-stretch-processor', {
                    processorOptions: {
                        windowSize: parseInt(windowSelect.value),
                        stretchFactor: sliderToStretch(parseFloat(stretchSlider.value)),
                        overlap: parseFloat(overlapSlider.value) / 100
                    }
                });
            } else if (currentAlgorithm === 'paul') {
                stretchNode = new AudioWorkletNode(audioContext, 'paul-stretch-processor', {
                    processorOptions: {
                        windowSize: parseInt(windowSelect.value),
                        stretchFactor: sliderToStretch(parseFloat(stretchSlider.value))
                    }
                });
            } else {
                stretchNode = new AudioWorkletNode(audioContext, 'granular-stretch-processor', {
                    processorOptions: {
                        stretchFactor: sliderToStretch(parseFloat(stretchSlider.value)),
                        grainSize: parseInt(windowSelect.value),
                        overlap: parseFloat(overlapSlider.value) / 100,
                        scatter: 0.1
                    }
                });
            }

            // Create gain node for crossfade control
            stretchGain = audioContext.createGain();
            stretchGain.gain.value = startGain;
            stretchNode.connect(stretchGain);
            stretchGain.connect(audioContext.destination);
            setupWorkletListeners();

            // Re-send audio if we had some loaded
            if (sourceBuffer) {
                stretchNode.port.postMessage({
                    type: 'load-audio',
                    data: { samples: Array.from(sourceBuffer) }
                });
            }
        }

        function setupWorkletListeners() {
            // Listen for messages from worklet
            stretchNode.port.onmessage = (event) => {
                const { type } = event.data;
                if (type === 'loaded') {
                    setStatus('Audio loaded. Ready to play.', 'active');
                    playBtn.disabled = false;
                    stopBtn.disabled = false;
                    playBtn.classList.add('pulse');

                    // Check for pending resume after algorithm switch
                    if (pendingResume) {
                        stretchNode.port.postMessage({ type: 'seek', data: { position: pendingResume.position } });
                        playStartPosition = pendingResume.position;
                        if (pendingResume.shouldPlay) {
                            stretchNode.port.postMessage({ type: 'play' });
                            isPlaying = true;
                            playBtn.textContent = '⏸';
                            playBtn.classList.remove('pulse');
                            startPlayheadAnimation();
                            setStatus('Playing...', 'active');
                        }
                        pendingResume = null;
                    }
                } else if (type === 'ended') {
                    // Reset to beginning
                    stretchNode.port.postMessage({ type: 'seek', data: { position: 0 } });
                    playhead.style.left = '0%';
                    playStartPosition = 0;

                    if (isLooping) {
                        // Restart playback
                        stretchNode.port.postMessage({ type: 'play' });
                        playStartTime = audioContext.currentTime;
                        setStatus('Looping...', 'active');
                    } else {
                        setStatus('Playback ended.', 'active');
                        isPlaying = false;
                        playBtn.textContent = '▶';
                        stopPlayheadAnimation();
                    }
                }
            };

            setStatus('Audio engine initialized.', 'active');
        }

        // ===== FILE LOADING =====

        async function loadAudioFile(file) {
            try {
                setStatus('Loading...');
                await initAudio();

                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                // Get mono samples (mix down if stereo)
                let samples;
                if (audioBuffer.numberOfChannels === 1) {
                    samples = audioBuffer.getChannelData(0);
                } else {
                    // Mix to mono
                    const left = audioBuffer.getChannelData(0);
                    const right = audioBuffer.getChannelData(1);
                    samples = new Float32Array(left.length);
                    for (let i = 0; i < left.length; i++) {
                        samples[i] = (left[i] + right[i]) / 2;
                    }
                }

                sourceBuffer = samples;
                sourceSampleRate = audioBuffer.sampleRate;
                gpuProcessedBuffer = null; // invalidate any cached GPU result

                // Stop any active GPU playback
                if (gpuSource) stopGPUSource();

                // Reset playhead and clear any pending resume from algorithm switch
                playStartPosition = 0;
                gpuPlayingStretch = null;
                playStartTime = audioContext ? audioContext.currentTime : 0;
                playhead.style.left = '0%';
                pendingResume = null;
                isPlaying = false;
                playBtn.textContent = '▶';
                stopPlayheadAnimation();

                // Show duration in time overlay
                const dur = sourceBuffer.length / sourceSampleRate;
                document.getElementById('waveformTime').textContent = `00:00 / ${formatTime(dur)}`;

                const isOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');

                if (isOffline) {
                    // GPU mode: enable play button directly (no worklet needed)
                    playBtn.disabled = false;
                    stopBtn.disabled = false;
                    playBtn.classList.add('pulse');
                } else {
                    // Send to worklet
                    stretchNode.port.postMessage({
                        type: 'load-audio',
                        data: { samples: Array.from(samples) }
                    });
                }

                // Draw waveform
                drawWaveform(samples);

                setStatus(`Loaded (${(samples.length / audioBuffer.sampleRate).toFixed(1)}s). Ready to play.`, 'active');

                // Show download panel
                downloadPanel.style.display = '';
                downloadStatus.textContent = 'Ready to export.';
                downloadStatus.className = 'status';

            } catch (err) {
                setStatus(`Error loading file: ${err.message}`, 'error');
                console.error(err);
            }
        }

        async function loadTestTrack(filename) {
            try {
                setStatus('Loading...');
                const response = await fetch(filename);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const blob = await response.blob();
                const file = new File([blob], filename, { type: 'audio/wav' });
                await loadAudioFile(file);

            } catch (err) {
                setStatus(`Error loading track: ${err.message}`, 'error');
                console.error(err);
            }
        }

        // ===== PLAYBACK CONTROLS =====

        function togglePlay() {
            const isOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');

            if (isOffline) {
                togglePlayGPU();
                return;
            }

            console.log(`togglePlay called, stretchNode=${!!stretchNode}, isPlaying=${isPlaying}`);
            if (!stretchNode) return;

            playBtn.classList.remove('pulse');

            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (isPlaying) {
                stretchNode.port.postMessage({ type: 'pause' });
                playBtn.textContent = '▶';
                stopPlayheadAnimation();
                const stretchFactor = sliderToStretch(parseFloat(stretchSlider.value));
                const elapsed = audioContext.currentTime - playStartTime;
                playStartPosition += elapsed / stretchFactor;
                setStatus('Paused.', 'active');
            } else {
                stretchNode.port.postMessage({ type: 'play' });
                playBtn.textContent = '⏸';
                startPlayheadAnimation();
                setStatus('Playing...', 'active');
            }

            isPlaying = !isPlaying;
        }

        // ===== GPU WAVELET PLAYBACK =====

        async function runOfflineStretch() {
            if (!sourceBuffer || gpuIsProcessing) return null;
            gpuIsProcessing = true;

            const stretchFactor = sliderToStretch(parseFloat(stretchSlider.value));
            const algo = currentAlgorithm; // 'cwt', 'cqt', or 'rtpghi'

            try {
                if (!audioContext) audioContext = new AudioContext();

                const t0 = performance.now();
                let stretched;

                if (algo === 'rtpghi') {
                    // RTPGHI — CPU-based STFT phase gradient stretch
                    const M = parseInt(document.getElementById('rtpghiMSelect').value);
                    const hopDiv = parseInt(document.getElementById('rtpghiHopSelect').value);
                    const windowType = document.getElementById('rtpghiWindowSelect').value;
                    const phaseMode = document.getElementById('rtpghiPhaseSelect').value;
                    const tol = parseFloat(document.getElementById('rtpghiTolSelect').value);
                    const gamma = parseFloat(document.getElementById('rtpghiGammaSelect').value);

                    setStatus(`Processing RTPGHI stretch (${stretchFactor.toFixed(1)}x)...`, 'active');

                    const stretcher = new RTPGHIStretcher({ M, hopDiv, windowType, phaseMode, tol, gamma });
                    stretched = stretcher.stretch(sourceBuffer, stretchFactor);
                } else {
                    // CWT / CQT — GPU wavelet stretch
                    const dt = 1.0 / sourceSampleRate;

                    if (!waveletGPU) {
                        setStatus('Initializing WebGPU...', 'active');
                        waveletGPU = new WaveletGPUCompute();
                        await waveletGPU.initialize();
                    }

                    const phaseMode = document.getElementById('phaseModeSelect').value;
                    const interpMode = parseInt(document.getElementById('interpModeSelect').value);
                    const opts = { dt, transform: algo, phaseMode, interpMode };
                    if (algo === 'cwt') {
                        opts.w0 = parseFloat(document.getElementById('w0Select').value);
                        opts.dj = parseFloat(document.getElementById('djSelect').value);
                    } else {
                        opts.binsPerOctave = parseInt(document.getElementById('binsPerOctaveSelect').value);
                        opts.minBW = parseFloat(document.getElementById('minBWSelect').value);
                    }

                    setStatus(`Processing ${algo.toUpperCase()} stretch (${stretchFactor.toFixed(1)}x)...`, 'active');

                    stretched = await waveletGPU.waveletStretchChunked(
                        sourceBuffer, stretchFactor, opts
                    );
                }

                // Normalize
                let peak = 0;
                for (let i = 0; i < stretched.length; i++) {
                    const abs = Math.abs(stretched[i]);
                    if (abs > peak) peak = abs;
                }
                if (peak > 0) {
                    const scale = 1.0 / peak;
                    for (let i = 0; i < stretched.length; i++) stretched[i] *= scale;
                }

                const elapsed = performance.now() - t0;
                const buf = audioContext.createBuffer(1, stretched.length, sourceSampleRate);
                buf.getChannelData(0).set(stretched);
                gpuProcessedBuffer = buf;

                // Update stats panel
                const inputDuration = sourceBuffer.length / sourceSampleRate;
                const outputDuration = stretched.length / sourceSampleRate;
                const realtimeRatio = (elapsed / 1000) / inputDuration;
                const wavSize = 44 + stretched.length * 2; // 16-bit WAV header + PCM data

                document.getElementById('statTotal').textContent = elapsed < 1000 ? elapsed.toFixed(0) + 'ms' : (elapsed/1000).toFixed(2) + 's';
                document.getElementById('statRealtime').textContent = realtimeRatio.toFixed(2) + 'x';
                document.getElementById('statLength').textContent = outputDuration.toFixed(1) + 's';
                document.getElementById('statSize').textContent = wavSize > 1048576 ? (wavSize / 1048576).toFixed(1) + ' MB' : (wavSize / 1024).toFixed(0) + ' KB';
                document.getElementById('statsPanel').style.display = '';

                setStatus(`${algo.toUpperCase()} stretch done in ${elapsed < 1000 ? elapsed.toFixed(0) + 'ms' : (elapsed/1000).toFixed(2) + 's'}. Playing...`, 'active');
                drawWaveform(stretched);
                return buf;
            } catch (err) {
                setStatus(`Processing error: ${err.message}`, 'error');
                console.error(err);
                return null;
            } finally {
                gpuIsProcessing = false;
            }
        }

        function playGPUBuffer(buffer, sourceOffset = 0, fadeIn = true) {
            if (!audioContext || !buffer || !sourceBuffer) return;
            if (audioContext.state === 'suspended') audioContext.resume();

            // Stop previous GPU source (hard stop — use fadeOutGPUSource for crossfade)
            stopGPUSource();

            gpuGain = audioContext.createGain();
            gpuGain.connect(audioContext.destination);

            gpuSource = audioContext.createBufferSource();
            gpuSource.buffer = buffer;
            gpuSource.connect(gpuGain);
            gpuSource.onended = () => {
                if (!isPlaying) return;
                if (isLooping) {
                    playGPUBuffer(buffer, 0);
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                    startPlayheadAnimation();
                } else {
                    isPlaying = false;
                    playBtn.textContent = '▶';
                    stopPlayheadAnimation();
                    playhead.style.left = '0%';
                    playStartPosition = 0;
                    setStatus('Playback ended.', 'active');
                }
            };

            // All position tracking in source-time
            const stretchFactor = sliderToStretch(parseFloat(stretchSlider.value));
            const sourceDuration = sourceBuffer.length / audioContext.sampleRate;
            playStartPosition = Math.max(0, Math.min(sourceOffset, sourceDuration - 0.01));
            playStartTime = audioContext.currentTime;
            gpuPlayingStretch = stretchFactor;

            // Convert source position → output position for buffer seek
            const outputOffset = Math.min(playStartPosition * stretchFactor, buffer.duration - 0.01);

            if (fadeIn) {
                gpuGain.gain.setValueAtTime(0, audioContext.currentTime);
                gpuGain.gain.linearRampToValueAtTime(1, audioContext.currentTime + CROSSFADE_DURATION);
            } else {
                gpuGain.gain.setValueAtTime(1, audioContext.currentTime);
            }
            gpuSource.start(0, outputOffset);
        }

        function fadeOutGPUSource() {
            const oldSrc = gpuSource;
            const oldGain = gpuGain;
            gpuSource = null;
            gpuGain = null;
            if (!oldSrc || !oldGain || !audioContext) return;
            oldSrc.onended = null; // prevent stale ended event
            const now = audioContext.currentTime;
            oldGain.gain.setValueAtTime(oldGain.gain.value, now);
            oldGain.gain.linearRampToValueAtTime(0, now + CROSSFADE_DURATION);
            setTimeout(() => {
                try { oldSrc.stop(); } catch {}
                try { oldSrc.disconnect(); } catch {}
                try { oldGain.disconnect(); } catch {}
            }, CROSSFADE_DURATION * 1000 + 50);
        }

        function stopGPUSource() {
            if (gpuSource) {
                gpuSource.onended = null; // prevent stale ended event from killing new playback
                try { gpuSource.stop(); } catch {}
                try { gpuSource.disconnect(); } catch {}
                gpuSource = null;
            }
            if (gpuGain) {
                try { gpuGain.disconnect(); } catch {}
                gpuGain = null;
            }
        }

        // Get current playback position in source-seconds (unified for both modes)
        // For GPU: optionally pass the stretch factor of the currently-playing buffer
        function getCurrentSourcePosition(overrideStretch) {
            if (!audioContext) return 0;
            const elapsed = audioContext.currentTime - playStartTime;
            const rate = overrideStretch || sliderToStretch(parseFloat(stretchSlider.value));
            return playStartPosition + elapsed / rate;
        }

        async function togglePlayGPU() {
            if (!sourceBuffer) return;
            playBtn.classList.remove('pulse');

            if (isPlaying) {
                // Pause — lock in source-time position
                const stretchFactor = gpuPlayingStretch || sliderToStretch(parseFloat(stretchSlider.value));
                const elapsed = audioContext.currentTime - playStartTime;
                playStartPosition += elapsed / stretchFactor;
                stopGPUSource();
                isPlaying = false;
                playBtn.textContent = '▶';
                stopPlayheadAnimation();
                setStatus('Paused.', 'active');
                return;
            }

            // Need to process first?
            if (!gpuProcessedBuffer) {
                playBtn.disabled = true;
                playBtn.textContent = 'Processing...';
                const buf = await runOfflineStretch();
                playBtn.disabled = false;
                if (!buf) {
                    playBtn.textContent = '▶';
                    return;
                }
                playStartPosition = 0; // fresh process starts from beginning
            }

            // Play (sourceOffset in source-time)
            playGPUBuffer(gpuProcessedBuffer, playStartPosition);
            isPlaying = true;
            playBtn.textContent = '⏸';
            startPlayheadAnimation(); // unified animation works for both modes
            setStatus('Playing...', 'active');
        }

        // Process GPU stretch in background, then crossfade from whatever is currently playing.
        // playbackStretch: the stretch factor of the currently-playing audio (for correct position calc during await)
        async function processAndCrossfadeGPU(playbackStretch) {
            if (!sourceBuffer) return;

            const buf = await runOfflineStretch();
            if (!buf) return;

            // If user switched away from offline algo while we were processing, don't crossfade
            if (currentAlgorithm !== 'cwt' && currentAlgorithm !== 'cqt' && currentAlgorithm !== 'rtpghi') return;

            if (!isPlaying) {
                // Not playing — just cache the result, ready for next Play press
                playStartPosition = 0;
                return;
            }

            // Calculate current source position
            // Use playbackStretch if provided (old buffer plays at different rate than current slider)
            const sourcePos = getCurrentSourcePosition(playbackStretch);

            // Fade out whatever is currently playing
            if (gpuSource) {
                fadeOutGPUSource();
            } else if (stretchNode && stretchGain) {
                // Fade out old worklet
                const oldNode = stretchNode;
                const oldGain = stretchGain;
                const now = audioContext.currentTime;
                oldGain.gain.setValueAtTime(oldGain.gain.value, now);
                oldGain.gain.linearRampToValueAtTime(0, now + CROSSFADE_DURATION);
                setTimeout(() => {
                    oldNode.port.postMessage({ type: 'pause' });
                    // Don't disconnect the worklet — we may switch back to it
                }, CROSSFADE_DURATION * 1000 + 50);
            }

            // Start new GPU buffer with crossfade (sourcePos is in source-time)
            playGPUBuffer(buf, sourcePos, true);
            startPlayheadAnimation();
            setStatus('Playing...', 'active');
        }

        // GPU animation removed — unified startPlayheadAnimation() handles both modes
        // since all position tracking is now in source-time

        function stop() {
            const isOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');

            if (isOffline) {
                stopGPUSource();
                gpuPlayingStretch = null;
            } else if (stretchNode) {
                stretchNode.port.postMessage({ type: 'pause' });
                stretchNode.port.postMessage({ type: 'seek', data: { position: 0 } });
            }

            playBtn.textContent = '▶';
            isPlaying = false;
            stopPlayheadAnimation();
            playhead.style.left = '0%';
            playStartPosition = 0;
            setStatus('Stopped.', 'active');
        }

        // ===== PLAYHEAD ANIMATION =====

        function startPlayheadAnimation() {
            stopPlayheadAnimation();
            playStartTime = audioContext.currentTime;
            animationFrameId = requestAnimationFrame(updatePlayhead);
        }

        function stopPlayheadAnimation() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        function formatTime(seconds) {
            const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
            const ss = String(Math.floor(seconds % 60)).padStart(2, '0');
            return `${mm}:${ss}`;
        }

        function updatePlayhead() {
            if (!isPlaying || !sourceBuffer || !audioContext) return;

            const stretchFactor = sliderToStretch(parseFloat(stretchSlider.value));
            const elapsed = audioContext.currentTime - playStartTime;

            // In stretched time, we advance through source at 1/stretchFactor rate
            const sourceElapsed = elapsed / stretchFactor;
            const currentSourcePosition = playStartPosition + sourceElapsed;

            const sourceDuration = sourceBuffer.length / audioContext.sampleRate;
            const ratio = Math.min(currentSourcePosition / sourceDuration, 1);

            playhead.style.left = `${ratio * 100}%`;

            // Update time overlay
            const timeEl = document.getElementById('waveformTime');
            timeEl.textContent = `${formatTime(currentSourcePosition)} / ${formatTime(sourceDuration)}`;

            if (ratio < 1) {
                animationFrameId = requestAnimationFrame(updatePlayhead);
            }
        }

        // ===== VISUALIZATION =====

        function drawWaveform(samples) {
            const canvas = waveformCanvas;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;

            // Set canvas size
            canvas.width = canvas.offsetWidth * dpr;
            canvas.height = canvas.offsetHeight * dpr;
            ctx.scale(dpr, dpr);

            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;

            // Clear
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, width, height);

            // Draw waveform
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 1;
            ctx.beginPath();

            const samplesPerPixel = Math.floor(samples.length / width);
            for (let x = 0; x < width; x++) {
                const start = x * samplesPerPixel;
                const end = start + samplesPerPixel;

                let min = 1;
                let max = -1;
                for (let i = start; i < end && i < samples.length; i++) {
                    if (samples[i] < min) min = samples[i];
                    if (samples[i] > max) max = samples[i];
                }

                const yMin = (1 - max) * height / 2;
                const yMax = (1 - min) * height / 2;

                if (x === 0) {
                    ctx.moveTo(x, yMin);
                }
                ctx.lineTo(x, yMin);
                ctx.lineTo(x, yMax);
            }

            ctx.stroke();

            // Center line
            ctx.strokeStyle = '#333';
            ctx.beginPath();
            ctx.moveTo(0, height / 2);
            ctx.lineTo(width, height / 2);
            ctx.stroke();
        }

        // ===== UTILITY =====

        function setStatus(message, type = '') {
            status.textContent = message;
            status.className = 'status ' + type;
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // ===== EVENT LISTENERS =====

        // File drop zone
        fileDrop.addEventListener('click', () => fileInput.click());
        fileDrop.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDrop.classList.add('dragover');
        });
        fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragover'));
        fileDrop.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDrop.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                loadAudioFile(e.dataTransfer.files[0]);
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                loadAudioFile(e.target.files[0]);
            }
        });

        // Playback controls
        playBtn.addEventListener('click', togglePlay);
        stopBtn.addEventListener('click', stop);
        loopBtn.addEventListener('click', () => {
            isLooping = !isLooping;
            loopBtn.classList.toggle('active', isLooping);
        });

        // Stretch slider
        // Track last stretch value for playhead calculation
        let lastStretchFactor = sliderToStretch(parseFloat(stretchSlider.value));

        let gpuRestretchTimeout = null;

        stretchSlider.addEventListener('input', (e) => {
            const sliderValue = parseFloat(e.target.value);
            const stretch = sliderToStretch(sliderValue);
            stretchValue.textContent = stretch.toFixed(1);

            const isOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');
            if (isOffline) {
                // Lock in source position using the PLAYING buffer's stretch rate
                if (isPlaying && audioContext) {
                    const rate = gpuPlayingStretch || lastStretchFactor;
                    const elapsed = audioContext.currentTime - playStartTime;
                    playStartPosition += elapsed / rate;
                    playStartTime = audioContext.currentTime;
                }
                lastStretchFactor = stretch;
                gpuProcessedBuffer = null; // invalidate — needs re-processing
                if (isPlaying) {
                    // Debounce: wait for slider to settle before GPU re-processing
                    clearTimeout(gpuRestretchTimeout);
                    gpuRestretchTimeout = setTimeout(() => {
                        processAndCrossfadeGPU(gpuPlayingStretch);
                    }, 300);
                }
                return;
            }

            // Lock in current position before changing stretch factor
            if (isPlaying && audioContext) {
                const elapsed = audioContext.currentTime - playStartTime;
                playStartPosition += elapsed / lastStretchFactor;
                playStartTime = audioContext.currentTime;
            }
            lastStretchFactor = stretch;

            if (stretchNode) {
                stretchNode.port.postMessage({ type: 'set-stretch', data: { factor: stretch } });
            }
        });

        // Window size / Grain size
        windowSelect.addEventListener('change', (e) => {
            const value = parseInt(e.target.value);
            windowValue.textContent = value;
            if (stretchNode) {
                if (currentAlgorithm === 'spectral' || currentAlgorithm === 'paul') {
                    stretchNode.port.postMessage({ type: 'set-window-size', data: { size: value } });
                } else {
                    stretchNode.port.postMessage({ type: 'set-grain-size', data: { size: value } });
                }
            }
        });

        // Overlap
        overlapSlider.addEventListener('input', (e) => {
            const value = parseFloat(e.target.value);
            overlapValue.textContent = value.toFixed(1);
            // Save value for granular (only if granular is active)
            if (currentAlgorithm === 'granular') {
                savedGranularOverlap = value;
            }
            if (stretchNode) {
                stretchNode.port.postMessage({ type: 'set-overlap', data: { overlap: value / 100 } });
            }
        });

        // GPU parameter changes — auto re-render when settings change
        let gpuParamRestretchTimeout = null;
        function onGPUParamChange() {
            const isOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');
            if (!isOffline || !sourceBuffer) return;

            gpuProcessedBuffer = null; // invalidate
            clearTimeout(gpuParamRestretchTimeout);
            gpuParamRestretchTimeout = setTimeout(() => {
                if (isPlaying) {
                    processAndCrossfadeGPU(gpuPlayingStretch);
                } else {
                    // Not playing — still re-render so it's ready when they press Play
                    runOfflineStretch();
                }
            }, 150);
        }

        document.getElementById('phaseModeSelect').addEventListener('change', onGPUParamChange);
        document.getElementById('w0Select').addEventListener('change', onGPUParamChange);
        document.getElementById('djSelect').addEventListener('change', onGPUParamChange);
        document.getElementById('binsPerOctaveSelect').addEventListener('change', onGPUParamChange);
        document.getElementById('minBWSelect').addEventListener('change', onGPUParamChange);
        document.getElementById('interpModeSelect').addEventListener('change', onGPUParamChange);
        document.getElementById('rtpghiMSelect').addEventListener('change', onGPUParamChange);
        document.getElementById('rtpghiHopSelect').addEventListener('change', onGPUParamChange);
        document.getElementById('rtpghiWindowSelect').addEventListener('change', onGPUParamChange);
        document.getElementById('rtpghiPhaseSelect').addEventListener('change', onGPUParamChange);
        document.getElementById('rtpghiTolSelect').addEventListener('change', onGPUParamChange);
        document.getElementById('rtpghiGammaSelect').addEventListener('change', onGPUParamChange);

        // Algorithm switch — show only relevant controls per mode
        const windowGroup = document.getElementById('windowGroup');
        const overlapGroup = document.getElementById('overlapGroup');
        const cwtControls = document.getElementById('cwtControls');
        const cqtControls = document.getElementById('cqtControls');
        const rtpghiControls = document.getElementById('rtpghiControls');
        const gpuPhaseControls = document.getElementById('gpuPhaseControls');
        const gpuBadge = document.getElementById('gpuBadge');

        function updateControlVisibility(algo) {
            const isOffline = (algo === 'cwt' || algo === 'cqt' || algo === 'rtpghi');

            // Window size: paul, granular, spectral only
            if (algo === 'paul' || algo === 'granular' || algo === 'spectral') {
                windowGroup.style.display = '';
                windowLabel.textContent = algo === 'granular' ? 'Grain Size' : 'Window Size';
                windowSelect.disabled = false;
                windowValue.textContent = windowSelect.value;
            } else {
                windowGroup.style.display = 'none';
            }

            // Overlap: granular only
            if (algo === 'granular') {
                overlapGroup.style.display = '';
                overlapSlider.disabled = false;
                overlapSlider.value = savedGranularOverlap;
                overlapValue.textContent = savedGranularOverlap.toFixed(1);
            } else {
                overlapGroup.style.display = 'none';
            }

            // CWT params: cwt only
            cwtControls.style.display = algo === 'cwt' ? 'flex' : 'none';

            // CQT params: cqt only
            cqtControls.style.display = algo === 'cqt' ? 'flex' : 'none';

            // RTPGHI params: rtpghi only
            rtpghiControls.style.display = algo === 'rtpghi' ? 'flex' : 'none';

            // GPU phase mode: cwt or cqt
            gpuPhaseControls.style.display = (algo === 'cwt' || algo === 'cqt') ? 'flex' : 'none';

            // GPU badge
            gpuBadge.style.display = (algo === 'cwt' || algo === 'cqt') ? 'inline' : 'none';
        }

        algorithmSelect.addEventListener('change', (e) => {
            // Save granular overlap before switching away
            if (currentAlgorithm === 'granular') {
                savedGranularOverlap = parseFloat(overlapSlider.value);
            }

            const algo = e.target.value;
            const isOffline = (algo === 'cwt' || algo === 'cqt' || algo === 'rtpghi');
            updateControlVisibility(algo);

            const wasOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');
            const wasPlaying = isPlaying;

            if (isOffline && sourceBuffer) {
                // Switching TO a GPU algorithm
                gpuProcessedBuffer = null; // new algorithm = needs re-processing

                // Lock in source position (unified — works from any mode)
                const currentStretch = wasOffline ? gpuPlayingStretch : null;
                const sourcePos = wasPlaying ? getCurrentSourcePosition(currentStretch) : playStartPosition;

                if (wasPlaying) {
                    currentAlgorithm = algo;
                    // Lock position before async processing
                    playStartPosition = sourcePos;
                    playStartTime = audioContext.currentTime;
                    const algoNames = { cwt: 'CWT (Original Morlet Wavelet)', cqt: 'CQT (Constant-Q)', rtpghi: 'RTPGHI (Phase Gradient)' };
                    setStatus(`Processing ${algoNames[algo]}...`, 'active');
                    // Old audio keeps playing, crossfade when GPU is ready
                    processAndCrossfadeGPU(wasOffline ? gpuPlayingStretch : sliderToStretch(parseFloat(stretchSlider.value)));
                } else {
                    currentAlgorithm = algo;
                    // Auto-render in background so it's ready when they press Play
                    runOfflineStretch();
                }
            } else if (!isOffline && audioContext) {
                // Switching TO a worklet algorithm
                // Get source position (unified — same calculation for both GPU and worklet source)
                const currentStretch = wasOffline ? gpuPlayingStretch : null;
                const currentPosition = wasPlaying ? getCurrentSourcePosition(currentStretch) : playStartPosition;

                currentAlgorithm = algo;

                // Fade out GPU source if it was playing
                if (wasOffline && gpuSource) {
                    fadeOutGPUSource();
                }
                // Free GPU buffer when leaving GPU mode
                if (wasOffline) {
                    gpuProcessedBuffer = null;
                    gpuPlayingStretch = null;
                    // Redraw waveform with source audio (GPU mode drew the stretched output)
                    if (sourceBuffer) drawWaveform(sourceBuffer);
                }

                // Crossfade to new worklet
                const oldNode = stretchNode;
                const oldGain = stretchGain;
                createStretchNode(0, true);

                const now = audioContext.currentTime;
                if (!wasOffline && oldGain) {
                    // Fade out old worklet
                    oldGain.gain.setValueAtTime(oldGain.gain.value, now);
                    oldGain.gain.linearRampToValueAtTime(0, now + CROSSFADE_DURATION);
                    setTimeout(() => {
                        oldNode.port.postMessage({ type: 'pause' });
                        oldNode.disconnect();
                        oldGain.disconnect();
                    }, CROSSFADE_DURATION * 1000 + 50);
                }

                stretchGain.gain.setValueAtTime(0, now);
                stretchGain.gain.linearRampToValueAtTime(1, now + CROSSFADE_DURATION);

                if (sourceBuffer) {
                    pendingResume = { position: currentPosition, shouldPlay: wasPlaying };
                }

                const algoNames = { resample: 'Resample', spectral: 'FFT (Spectral)', paul: 'Paul Stretch (STFT)', granular: 'Granular' };
                setStatus(`Switched to ${algoNames[algo]} algorithm`, 'active');
            } else {
                currentAlgorithm = algo;
            }
        });

        // ===== LOAD TEST TRACKS LIST =====

        const testTracks = [
            { file: 'stretch_test_audio/FF_AS_bird_chirp_run_it_back_1.wav', name: 'Bird Chirp' },
            { file: 'stretch_test_audio/Julia_Run_8.wav', name: 'Vocal Run' },
            { file: 'stretch_test_audio/FF_CA_60_foley_ticking_clock_slight_variation.wav', name: 'Clock Tick' },
            { file: 'stretch_test_audio/5_goesr_V_befilteredV_norm_20260119_20260119_paulstretch1_pre-arrival-boost_30kHz_Master.wav', name: 'GOES CME Shock' },
            { file: 'stretch_test_tracks/GOLDEN HOUR - TRIM.wav', name: 'Golden Hour Trimmed' }
        ];

        /* OLD LOCAL TEST TRACKS (commented out for later)
        const testTracks = [
            '1. Lullaby for the Heart.wav',
            '4230385_Ilium_(Original Mix).wav',
            'Fearofdark - The Coffee Zone - 01 Lovesickness.wav',
            'GOLDEN HOUR Sun & Stars Remix MASTER.wav',
            'Robert Alexander - Mist (Mastered).wav'
        ];
        */

        testTracks.forEach(track => {
            const item = document.createElement('div');
            item.className = 'track-item';
            item.innerHTML = `<span class="track-name">${track.name}</span>`;
            item.addEventListener('click', () => {
                document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                loadTestTrack(track.file, track.name);
            });
            trackList.appendChild(item);
        });

        // Set initial UI state for default algorithm (Paul Stretch)
        updateControlVisibility('paul');

        // Handle window resize
        window.addEventListener('resize', () => {
            if (sourceBuffer) {
                drawWaveform(sourceBuffer);
            }
        });

        // Click waveform to seek (and start playing if not already)
        waveformCanvas.addEventListener('click', (e) => {
            if (!sourceBuffer) return;
            const isOffline = (currentAlgorithm === 'cwt' || currentAlgorithm === 'cqt' || currentAlgorithm === 'rtpghi');

            const rect = waveformCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const ratio = x / rect.width;

            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (isOffline) {
                // GPU seek: convert click ratio to source-time
                if (!gpuProcessedBuffer) return;
                const sourceDuration = sourceBuffer.length / audioContext.sampleRate;
                const sourcePos = ratio * sourceDuration;
                playStartPosition = sourcePos;
                playhead.style.left = `${ratio * 100}%`;
                playGPUBuffer(gpuProcessedBuffer, sourcePos);
                if (!isPlaying) {
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                    playBtn.classList.remove('pulse');
                    setStatus('Playing...', 'active');
                }
                startPlayheadAnimation();
            } else {
                if (!stretchNode) return;
                const positionInSeconds = (sourceBuffer.length / audioContext.sampleRate) * ratio;

                stretchNode.port.postMessage({ type: 'seek', data: { position: positionInSeconds } });
                playStartPosition = positionInSeconds;
                playStartTime = audioContext.currentTime;
                playhead.style.left = `${ratio * 100}%`;

                if (!isPlaying) {
                    stretchNode.port.postMessage({ type: 'play' });
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                    playBtn.classList.remove('pulse');
                    startPlayheadAnimation();
                    setStatus('Playing...', 'active');
                }
            }
        });

        // Make waveform cursor indicate clickability
        waveformCanvas.style.cursor = 'pointer';

        // Spacebar to toggle play/pause
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.target.matches('input, textarea, select')) {
                e.preventDefault();
                if (sourceBuffer) {
                    togglePlay();
                }
            }
            // Enter: first press loads Golden Hour Trimmed, second press plays
            if (e.code === 'Enter' && !e.target.matches('input, textarea, select')) {
                e.preventDefault();
                if (!sourceBuffer) {
                    // Load Golden Hour Trimmed
                    const goldenHourItem = trackList.querySelector('.track-item:last-child');
                    if (goldenHourItem) goldenHourItem.click();
                } else if (!isPlaying) {
                    togglePlay();
                }
            }
        });

        // ===== DOWNLOAD =====

        function encodeWAV(samples, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const bytesPerSample = bitsPerSample / 8;
            const dataLength = samples.length * bytesPerSample;
            const buffer = new ArrayBuffer(44 + dataLength);
            const view = new DataView(buffer);

            const writeString = (offset, str) => {
                for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * bytesPerSample, true);
            view.setUint16(32, numChannels * bytesPerSample, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(36, 'data');
            view.setUint32(40, dataLength, true);

            let offset = 44;
            for (let i = 0; i < samples.length; i++) {
                const s = Math.max(-1, Math.min(1, samples[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }

            return new Blob([buffer], { type: 'audio/wav' });
        }

        async function renderAndDownload() {
            if (!sourceBuffer) return;

            const stretchFactor = sliderToStretch(parseFloat(stretchSlider.value));
            const sampleRate = audioContext ? audioContext.sampleRate : 48000;
            const outputLength = Math.ceil(sourceBuffer.length * stretchFactor);
            const algo = algorithmSelect.value;

            downloadBtn.disabled = true;
            downloadStatus.textContent = `Rendering ${algo} at ${stretchFactor.toFixed(1)}x stretch...`;
            downloadStatus.className = 'status active';

            try {
                const offlineCtx = new OfflineAudioContext(1, outputLength, sampleRate);

                let processorName, processorOptions;
                if (algo === 'resample') {
                    await offlineCtx.audioWorklet.addModule('workers/resample-stretch-processor.js');
                    processorName = 'resample-stretch-processor';
                    processorOptions = { stretchFactor };
                } else if (algo === 'spectral') {
                    await offlineCtx.audioWorklet.addModule('workers/spectral-stretch-processor.js');
                    processorName = 'spectral-stretch-processor';
                    processorOptions = {
                        windowSize: parseInt(windowSelect.value),
                        stretchFactor,
                        overlap: parseFloat(overlapSlider.value) / 100
                    };
                } else if (algo === 'paul') {
                    await offlineCtx.audioWorklet.addModule('workers/paul-stretch-processor.js');
                    processorName = 'paul-stretch-processor';
                    processorOptions = {
                        windowSize: parseInt(windowSelect.value),
                        stretchFactor
                    };
                } else if (algo === 'granular') {
                    await offlineCtx.audioWorklet.addModule('workers/granular-stretch-processor.js');
                    processorName = 'granular-stretch-processor';
                    processorOptions = {
                        stretchFactor,
                        grainSize: parseInt(windowSelect.value),
                        overlap: parseFloat(overlapSlider.value) / 100,
                        scatter: 0.1
                    };
                } else if (algo === 'cwt' || algo === 'cqt' || algo === 'rtpghi') {
                    // Offline algorithms — process directly, skip OfflineAudioContext
                    downloadStatus.textContent = `Processing ${algo.toUpperCase()} stretch...`;
                    const buf = gpuProcessedBuffer || await runOfflineStretch();
                    if (!buf) throw new Error('Processing failed');
                    const outputSamples = buf.getChannelData(0);

                    downloadStatus.textContent = 'Encoding WAV...';
                    const blob = encodeWAV(outputSamples, sampleRate);

                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `stretched_${algo}_${stretchFactor.toFixed(1)}x.wav`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    const sizeMB = (blob.size / (1024 * 1024)).toFixed(1);
                    const durationSec = (outputSamples.length / sampleRate).toFixed(1);
                    downloadStatus.textContent = `Downloaded! ${durationSec}s, ${sizeMB} MB`;
                    downloadStatus.className = 'status active';
                    downloadBtn.disabled = false;
                    return;
                } else {
                    throw new Error(`Download not yet supported for ${algo} algorithm`);
                }

                const node = new AudioWorkletNode(offlineCtx, processorName, { processorOptions });
                node.connect(offlineCtx.destination);

                await new Promise((resolve, reject) => {
                    node.port.onmessage = (event) => {
                        if (event.data.type === 'loaded') resolve();
                    };
                    node.port.postMessage({
                        type: 'load-audio',
                        data: { samples: Array.from(sourceBuffer) }
                    });
                    setTimeout(() => reject(new Error('Worklet load timeout')), 10000);
                });

                node.port.postMessage({ type: 'play' });

                downloadStatus.textContent = 'Rendering audio...';
                const renderedBuffer = await offlineCtx.startRendering();
                const outputSamples = renderedBuffer.getChannelData(0);

                downloadStatus.textContent = 'Encoding WAV...';
                const blob = encodeWAV(outputSamples, sampleRate);

                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const algoNames = { resample: 'resample', spectral: 'spectral', paul: 'paulstretch', granular: 'granular', cwt: 'cwt', cqt: 'cqt' };
                a.download = `stretched_${algoNames[algo] || algo}_${stretchFactor.toFixed(1)}x.wav`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                const sizeMB = (blob.size / (1024 * 1024)).toFixed(1);
                const durationSec = (outputSamples.length / sampleRate).toFixed(1);
                downloadStatus.textContent = `Downloaded! ${durationSec}s, ${sizeMB} MB`;
                downloadStatus.className = 'status active';

            } catch (err) {
                downloadStatus.textContent = `Export error: ${err.message}`;
                downloadStatus.className = 'status error';
                console.error('Download error:', err);
            } finally {
                downloadBtn.disabled = false;
            }
        }

        downloadBtn.addEventListener('click', renderAndDownload);
    </script>
