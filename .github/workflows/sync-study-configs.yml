name: Sync study configs & keep edge warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  keep-warm:
    runs-on: ubuntu-latest
    steps:
      - name: Ping study page to keep Cloudflare edge warm
        run: |
          curl -sf -o /dev/null -w "study.html: %{http_code} %{time_total}s\n" "https://spaceweather.now.audio/study.html?s=emic-pilot-demo"
          curl -sf -o /dev/null -w "index.html: %{http_code} %{time_total}s\n" "https://spaceweather.now.audio/"

  sync-configs:
    runs-on: ubuntu-latest
    # Only sync configs every 30 minutes (runs 0, 30)
    if: github.event_name == 'workflow_dispatch' || endsWith(github.event.schedule, '0 * * * *') || endsWith(github.event.schedule, '30 * * * *')
    steps:
      - uses: actions/checkout@v4

      - name: Fetch study configs from R2
        run: |
          mkdir -p study-json-live

          STUDIES=$(curl -sf "https://spaceweather.now.audio/api/studies" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for s in d.get('studies', []):
              print(s['id'])
          ")

          for slug in $STUDIES; do
            resp=$(curl -sf "https://spaceweather.now.audio/api/study/${slug}/r2-config" 2>/dev/null)
            if [ $? -eq 0 ] && [ -n "$resp" ]; then
              echo "$resp" | python3 -m json.tool > "study-json-live/${slug}.json"
              echo "Updated: ${slug}"
            fi
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add study-json-live/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: sync study configs from R2"
            git push
          fi
